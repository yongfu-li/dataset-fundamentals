  notes: Example 7.14 illustrates measurement bias through self-reported income. Respondents
    may overstate or withhold information because of privacy concerns or social desirability.
    The resulting values are not merely noisy if the error follows a systematic pattern
    across groups. Audit work must examine how a variable was produced, not only whether
    its column is complete.
- type: bullets
  title: Example 7.17 — Entrenched Societal Biases in Historical Records
  bullets:
  - Example 7.17 — hands-on module
  - Example 7.17 shows historical bias
  - Hiring, lending, judicial
  - A model can reproduce those patterns even when collection and measurement are
    technically
  - Historical data describes what happened
  - 'View files: `modules/chapter7/example17/`'
  notes: Example 7.17 shows historical bias. Hiring, lending, judicial, and policing
    records may accurately document decisions that were themselves inequitable. A
    model can reproduce those patterns even when collection and measurement are technically
    correct. Historical data describes what happened, but it does not automatically
    define what should happen next.
- type: bullets
  title: Example 7.21 — Labeling Bias in Sentiment Annotation
  bullets:
  - Example 7.21 — hands-on module
  - Example 7.21 shows label bias
  - Annotators may interpret tone differently because of cultural background
  - If these disagreements systematically affect some dialects or groups
  - 'View files: `modules/chapter7/example21/`'
  notes: Example 7.21 shows label bias. Annotators may interpret tone differently
    because of cultural background, ambiguous guidelines, or inconsistent handling
    of edge cases. If these disagreements systematically affect some dialects or groups,
    the target labels teach the model an unfair pattern. Clear guidance, diverse annotators,
    agreement checks, and adjudication reduce this risk.
