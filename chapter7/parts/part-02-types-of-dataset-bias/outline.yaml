    )"
- type: bullets
  title: Aggregation and confirmation bias
  bullets:
  - Aggregation bias appears when diverse subgroups are treated as homogeneous and
    important
  - Confirmation bias appears when data is selected or interpreted to support an existing
  - One masks variation through pooling; the other narrows evidence through expectation
  notes: Aggregation bias appears when diverse subgroups are treated as homogeneous
    and important differences are hidden by an overall average. Confirmation bias
    appears when data is selected or interpreted to support an existing belief while
    contradictory evidence is neglected. One masks variation through pooling; the
    other narrows evidence through expectation.
- type: bullets
  title: Diagnosing overlapping mechanisms
  bullets:
  - A single system may combine several mechanisms
  - Encourage confirmation of an assumed crime pattern
  - Analyst decisions rather than assigning one convenient label
  notes: A single system may combine several mechanisms. Historical policing records
    may reflect unequal enforcement, oversample heavily policed areas, use subjective
    labels, and encourage confirmation of an assumed crime pattern. Diagnosis should
    trace the chain from population and collection through measurement, labeling,
    aggregation, and analyst decisions rather than assigning one convenient label.
- type: bullets
  title: Takeaways
  bullets:
  - Label bias concerns target construction
  - Aggregation bias hides subgroup differences
  - Precise diagnosis guides intervention and prevents the mistaken assumption that
    more data
  notes: Sampling bias concerns representation, measurement bias concerns capture,
    historical bias concerns inherited inequity, and label bias concerns target construction.
    Aggregation bias hides subgroup differences, while confirmation bias filters evidence
    through prior beliefs. Precise diagnosis guides intervention and prevents the
    mistaken assumption that more data alone will solve the problem.
