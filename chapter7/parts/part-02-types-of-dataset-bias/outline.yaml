  notes: Example 7.12 illustrates sampling bias. A facial recognition dataset dominated
    by light-skinned faces gives a model too little evidence about darker-skinned
    faces. Performance can therefore vary sharply across groups. Adding more images
    from the already dominant group increases dataset size without correcting the
    missing representation.
