  title: Example 7.21 — listing
  code: "\"\"\"Example 7.21 — chi-squared test of gender distribution across performance\
    \ categories.\"\"\"\n\nfrom __future__ import annotations\n\n\ndef main() -> None:\n\
    \    \"\"\"Run a 2x2 chi-squared test on gender vs performance category.\"\"\"\
    \n    # Observed contingency table: rows = gender, cols = (high, low) performers.\n\
