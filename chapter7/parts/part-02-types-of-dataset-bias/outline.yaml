title: Chapter 7 — Types of dataset bias
footer: Chapter 7 — Types Of Dataset Bias
slides:
- type: title
  title: Chapter 7 — Types of dataset bias
  subtitle: Bias is easier to detect and mitigate when its mechanism is named precisely
  notes: Bias is easier to detect and mitigate when its mechanism is named precisely.
    This clip separates six common forms of dataset bias. Several can occur together,
    so the taxonomy is not a set of mutually exclusive boxes. It is a diagnostic vocabulary
    for asking where distortion entered and which intervention is likely to help.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this clip
  notes: By the end of this clip, learners should distinguish sampling, measurement,
    historical, label, aggregation, and confirmation bias; recognize each form in
    a practical setting; and explain why collecting more data does not automatically
    correct every type of bias.
- type: bullets
  title: Sampling and measurement bias
  bullets:
  - Sampling bias occurs when collected records do not represent the population or
    conditions
  - Measurement bias occurs when instruments
  - Sampling changes who or what is observed
  notes: Sampling bias occurs when collected records do not represent the population
    or conditions in which a model will operate. Measurement bias occurs when instruments,
    surveys, sensors, or observation procedures systematically distort what is recorded.
    Sampling changes who or what is observed; measurement changes the accuracy or
    meaning of the observation.
