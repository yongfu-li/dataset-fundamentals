title: Chapter 7 — Introduction to bias and fairness
footer: Chapter 7 — Introduction To Bias And Fairness
slides:
- type: title
  title: Chapter 7 — Introduction to bias and fairness
  subtitle: Earlier chapters established how datasets are collected, labeled, cleaned,
    and explored
  notes: 'Earlier chapters established how datasets are collected, labeled, cleaned,
    and explored. This chapter adds a necessary question: do the resulting data and
    systems distribute errors and opportunities justly? The answer affects technical
    quality, public trust, and whether an organization can defend its decisions.'
- type: bullets
  title: Learning objectives
  bullets:
  - Identify policy and governance pressures that make fairness an operational requirement
  notes: By the end of this clip, learners should be able to define dataset bias and
    fairness, explain why subgroup performance matters even when average accuracy
    appears strong, connect fairness to trust and accountability, and identify policy
    and governance pressures that make fairness an operational requirement.
- type: bullets
  title: Dataset bias and fairness
  bullets:
  - Dataset bias is a systematic error or imbalance that skews training or evaluation
    data
  - Fairness is the operational goal of selecting, measuring
  - Fairness is therefore a measurable design constraint
  notes: Dataset bias is a systematic error or imbalance that skews training or evaluation
    data toward particular groups or outcomes. Fairness is the operational goal of
    selecting, measuring, and documenting criteria so that such skews do not create
    unjust allocations of error or opportunity. Fairness is therefore a measurable
    design constraint, not a vague claim that a system has good intentions.
- type: bullets
  title: Trust and accountability
  bullets:
  - Trust declines when people cannot determine whether a recommendation
  - Accountability requires named owners, documented data and metrics, mechanisms
    for review
  - Deployment, and monitoring
  notes: Trust declines when people cannot determine whether a recommendation, hiring
    decision, diagnosis, or risk score treats comparable cases consistently. Accountability
    requires named owners, documented data and metrics, mechanisms for review, and
    a practical route for correction. Fairness audits and impact assessments make
    these responsibilities visible throughout design, deployment, and monitoring.
- type: bullets
  title: Example 7.4 — GDPR & ECOA Policies
  bullets:
  - Example 7.4 — hands-on module
  - Example 7.4 shows that fairness has a policy context
  - European data protection rules place duties around consequential automated decisions
  - A technically impressive model can still create legal, financial
  - 'View files: `modules/chapter7/example4/`'
  notes: Example 7.4 shows that fairness has a policy context. European data protection
    rules place duties around consequential automated decisions, while United States
    fair-lending rules prohibit discrimination against protected groups in credit
    decisions. A technically impressive model can still create legal, financial, and
    reputational exposure when its data or outcomes produce unjustified disparities.
- type: bullets
  title: Example 7.6 — Gender Shades Project
  bullets:
  - Example 7.6 — hands-on module
  - Example 7.6 records subgroup evidence from commercial facial analysis systems
  - With underrepresentation in training data identified as an important cause
  - The practical lesson is to report disaggregated errors before deployment rather
    than
  - 'View files: `modules/chapter7/example6/`'
  notes: Example 7.6 records subgroup evidence from commercial facial analysis systems.
    Error rates were substantially higher for darker-skinned and female faces than
    for lighter-skinned and male faces, with underrepresentation in training data
    identified as an important cause. The practical lesson is to report disaggregated
    errors before deployment rather than relying on one overall accuracy value.
- type: bullets
  title: Example 7.9 — OECD AI Principles
  bullets:
  - Example 7.9 — hands-on module
  - Example 7.9 places fairness within a broader governance framework
  - The OECD principles emphasize transparent, fair, inclusive
  - Corrective action
  - 'View files: `modules/chapter7/example9/`'
  notes: Example 7.9 places fairness within a broader governance framework. The OECD
    principles emphasize transparent, fair, inclusive, and accountable artificial
    intelligence while seeking to minimize harm. Such principles become useful only
    when organizations translate them into concrete practices, including representative
    data, subgroup evaluation, documentation, human oversight, and corrective action.
- type: bullets
  title: Fairness across the lifecycle
  bullets:
  - Bias can enter through collection
  - It can then be amplified during model training and deployment
  - Fairness work must therefore span the lifecycle
  notes: 'Bias can enter through collection, measurement, historical records, annotation,
    aggregation, or human assumptions. It can then be amplified during model training
    and deployment. Fairness work must therefore span the lifecycle: define affected
    groups and harms, inspect the data, choose suitable metrics, test interventions,
    document trade-offs, and monitor outcomes after release.'
- type: bullets
  title: Takeaways
  bullets:
  - Dataset bias describes systematic skew
  - Average performance can conceal serious subgroup failures
  - Trust depends on transparency and consistent treatment
  - Policy principles and legal duties make these concerns part of routine engineering
  notes: Dataset bias describes systematic skew, while fairness describes the criteria
    and controls used to prevent unjust consequences. Average performance can conceal
    serious subgroup failures. Trust depends on transparency and consistent treatment,
    and accountability depends on review, ownership, and correction. Policy principles
    and legal duties make these concerns part of routine engineering practice.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - The next clip moves from the general definition to a practical taxonomy
  notes: The next clip moves from the general definition to a practical taxonomy.
    It distinguishes sampling, measurement, historical, label, aggregation, and confirmation
    bias so that an observed problem can be traced to a specific mechanism.
