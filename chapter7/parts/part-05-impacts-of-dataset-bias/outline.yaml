title: Chapter 7 — Impacts of dataset bias
footer: Chapter 7 — Impacts Of Dataset Bias
slides:
- type: title
  title: Chapter 7 — Impacts of dataset bias
  subtitle: Bias detection is not merely a technical quality exercise
  notes: Bias detection is not merely a technical quality exercise. Disparities can
    change access to employment, credit, healthcare, liberty, and public services.
    This clip organizes those consequences into ethical, social, legal, and business
    dimensions while showing how one high-stakes system can create several forms of
    harm at once.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this clip
  notes: By the end of this clip, learners should distinguish four impact dimensions,
    trace how biased data can amplify existing inequities, explain why intent is not
    required for harmful impact, and identify the subgroup evidence and accountability
    records needed for high-stakes deployment.
- type: bullets
  title: Example 7.38 — Inequitable Treatment in Credit and Justice Decisions
  bullets:
  - Example 7.38 — hands-on module
  - Example 7.38 illustrates the ethical impact of unequal treatment
  - While biased justice data may produce unfair risk assessments
  - Such errors affect opportunities and liberty
  - 'View files: `modules/chapter7/example38/`'
  notes: Example 7.38 illustrates the ethical impact of unequal treatment. Biased
    credit data may deny loans for demographic reasons rather than genuine creditworthiness,
    while biased justice data may produce unfair risk assessments. Such errors affect
    opportunities and liberty, so fairness cannot be treated as optional polish added
    after average accuracy is maximized.
- type: code
  title: Example 7.38 — listing
  code: "\"\"\"Example 7.38 — enforcing demographic parity on loan approvals and its\
    \ accuracy cost.\"\"\"\n\nfrom __future__ import annotations\n\nApplicant = tuple[str,\
    \ float, int]  # (group, score, actually_repays)\n\n\ndef approve(data: list[Applicant],\
    \ thresholds: dict[str, float]) -> tuple[float, dict[str, float], float]:\n  \
    \  \"\"\"Return (accuracy, approval rate per group, default rate among approved).\"\
    \"\"\n    correct = 0\n    approved: dict[str, int] = {\"A\": 0, \"B\": 0}\n \
    \   counts: dict[str, int] = {\"A\": 0, \"B\": 0}\n    approved_total = 0\n  \
    \  approved_defaults = 0\n    for group, score, repays in data:\n        counts[group]\
    \ += 1\n        decision = 1 if score >= thresholds[group] else 0\n        approved[group]\
    \ += decision\n        if decision == repays:\n            correct += 1"
- type: bullets
  title: Example 7.40 — Amplification of Policing and Hiring Disparities
  bullets:
  - Example 7.40 — hands-on module
  - Example 7.40 shows social amplification
  - Which then directs still more policing there
  - Historical hiring patterns can similarly teach a ranking system to favor men
  - Repeated automated decisions scale and reinforce the pattern
  - 'View files: `modules/chapter7/example40/`'
  notes: Example 7.40 shows social amplification. Historical over-policing can generate
    more recorded incidents in already monitored communities, which then directs still
    more policing there. Historical hiring patterns can similarly teach a ranking
    system to favor men. Repeated automated decisions scale and reinforce the pattern,
    creating a feedback loop that appears data-driven.
- type: bullets
  title: Example 7.42 — Compliance Exposure Under GDPR and CCPA
  bullets:
  - Example 7.42 — hands-on module
  - Example 7.42 connects unfair outcomes with legal and regulatory exposure
  - Recruitment and credit systems must comply with anti-discrimination duties
  - Organizations need more than a claim of neutral intent
  - 'View files: `modules/chapter7/example42/`'
  notes: Example 7.42 connects unfair outcomes with legal and regulatory exposure.
    Recruitment and credit systems must comply with anti-discrimination duties, while
    privacy frameworks require fair and transparent processing of personal data. Organizations
    need more than a claim of neutral intent; they need documented data provenance,
    subgroup testing, explanations, and corrective procedures.
- type: bullets
  title: Example 7.45 — Financial Penalties from Biased Hiring and Credit Systems
  bullets:
  - Example 7.45 — hands-on module
  - Example 7.45 presents the business consequences
  - Lasting reputational damage
  - Fairness investment can therefore reduce risk and protect market legitimacy
  - Delayed mitigation is often more expensive because deployed decisions and public
    harms are
  - 'View files: `modules/chapter7/example45/`'
  notes: Example 7.45 presents the business consequences. Biased systems can generate
    fines, lawsuits, project cancellations, remediation costs, customer loss, and
    lasting reputational damage. Fairness investment can therefore reduce risk and
    protect market legitimacy. Delayed mitigation is often more expensive because
    deployed decisions and public harms are difficult to reverse.
- type: bullets
  title: The COMPAS bridge
  bullets:
  - Recidivism risk assessment provides a bridge across all four dimensions
  - Weaken institutional legitimacy
  - Overall accuracy does not settle these issues because false positives and false
    negatives
  notes: Recidivism risk assessment provides a bridge across all four dimensions.
    Unequal error rates can change detention or parole exposure, reproduce historical
    arrest disparities, raise due-process and discrimination concerns, and weaken
    institutional legitimacy. Overall accuracy does not settle these issues because
    false positives and false negatives carry different consequences for different
    groups.
- type: bullets
  title: From impact to accountability
  bullets:
  - Monitoring after deployment
  - Impact assessments should ask who can be harmed, how severe and reversible the
    harm is
  - These questions connect technical metrics to organizational responsibility
  notes: High-stakes systems require documented subgroup error rates, known limitations,
    decision owners, appeal mechanisms, and monitoring after deployment. Impact assessments
    should ask who can be harmed, how severe and reversible the harm is, and whether
    a less risky alternative exists. These questions connect technical metrics to
    organizational responsibility.
- type: bullets
  title: Takeaways
  bullets:
  - Ethical impacts concern justice and individual treatment
  - Social impacts concern stereotypes, feedback loops, and unequal access
  - Legal impacts concern rights, discrimination, privacy, and explainability
  - Business impacts include cost, reputation, and legitimacy
  - A single disparity can cross all four dimensions, especially in consequential
    decisions
  notes: Ethical impacts concern justice and individual treatment. Social impacts
    concern stereotypes, feedback loops, and unequal access. Legal impacts concern
    rights, discrimination, privacy, and explainability. Business impacts include
    cost, reputation, and legitimacy. A single disparity can cross all four dimensions,
    especially in consequential decisions.
