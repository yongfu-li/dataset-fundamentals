- type: bullets
  title: Example 7.28 — Distribution Comparison Across Demographics
  bullets:
  - Example 7.28 — hands-on module
  - Example 7.28 compares features such as age, gender
  - Differences in counts
  - Explore the chapter example module
  - 'View files: `modules/chapter7/example28/`'
  notes: Example 7.28 compares features such as age, gender, and race across groups
    and against the intended population. Differences in counts, proportions, ranges,
    or missingness can reveal underrepresentation and uneven data quality. Learners
    can inspect the runnable example 19 module for this chapter to see a compact distribution
