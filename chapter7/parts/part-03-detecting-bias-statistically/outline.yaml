- type: bullets
  title: Statistical tests and practical significance
  bullets:
  - Formal tests can assess whether observed distribution differences are unlikely
    under a
  - A chi-squared test is suitable for categorical counts
  - Statistical significance does not establish harm or practical importance
  - Effect size and context remain essential
  notes: Formal tests can assess whether observed distribution differences are unlikely
    under a stated null hypothesis. A chi-squared test is suitable for categorical
    counts, while other tests may compare continuous distributions. Statistical significance
    does not establish harm or practical importance, and very large samples can make
    small differences significant. Effect size and context remain essential.
- type: bullets
  title: Example 7.30 — Chi-Squared Test for Gender Distribution
  bullets:
  - Example 7.30 — hands-on module
  - Example 7.30 asks whether gender distribution differs across outcome categories
  - The test compares observed counts with counts expected under independence
  - Explore the chapter example module
  - 'View files: `modules/chapter7/example30/`'
  notes: Example 7.30 asks whether gender distribution differs across outcome categories,
    such as high-performing and low-performing candidates. The test compares observed
    counts with counts expected under independence. Learners can inspect the runnable
    example 21 module for this chapter to follow the calculation, assumptions, and
    interpretation without treating the result as proof of discrimination.
- type: bullets
  title: Correlations and proxy features
  bullets:
  - Correlation analysis can reveal features that encode sensitive attributes indirectly
  - Names, neighborhoods, schools, or purchasing patterns may act as proxies even
    after race
  - Subgroup outcomes
  notes: Correlation analysis can reveal features that encode sensitive attributes
    indirectly. Names, neighborhoods, schools, or purchasing patterns may act as proxies
    even after race or gender is removed. Correlation is a screening tool rather than
    a causal verdict, but a strong relationship warrants closer examination of feature
    necessity, historical context, and subgroup outcomes.
- type: bullets
  title: Example 7.33 — The 80% Rule in Hiring
  bullets:
  - Example 7.33 — hands-on module
  - Example 7.33 calculates a disparate-impact ratio by dividing one group's selection
    rate by
  - A ratio below zero point eight is commonly used as a screening threshold for potential
  - Explore the chapter example module
  - 'View files: `modules/chapter7/example33/`'
  notes: Example 7.33 calculates a disparate-impact ratio by dividing one group's
    selection rate by the comparison group's rate. A ratio below zero point eight
    is commonly used as a screening threshold for potential adverse impact. Learners
    can inspect the runnable example 24 module for this chapter to compute the rates
    and see why the threshold prompts review rather than automatically proving illegality.
- type: bullets
  title: Building a defensible audit
  bullets:
  - Chosen reference group
  - It reports both absolute rates and relative ratios, checks small groups carefully
  - Results should be repeatable and linked to a decision about further analysis or
    mitigation
  notes: A defensible statistical audit records the target population, protected or
    otherwise relevant groups, outcome definitions, sample sizes, uncertainty, and
    chosen reference group. It reports both absolute rates and relative ratios, checks
    small groups carefully, and tests multiple plausible explanations. Results should
    be repeatable and linked to a decision about further analysis or mitigation.
- type: bullets
  title: Takeaways
  bullets:
  - Distribution checks reveal representation and data-quality gaps
  - Statistical tests formalize comparisons but must be paired with effect size and
    context
  - Correlation can uncover proxy pathways
  - Disparate-impact ratios summarize unequal selection rates
  notes: Distribution checks reveal representation and data-quality gaps. Statistical
    tests formalize comparisons but must be paired with effect size and context. Correlation
    can uncover proxy pathways. Disparate-impact ratios summarize unequal selection
    rates, and the eighty-percent rule is a screening convention rather than a universal
    fairness certificate.
