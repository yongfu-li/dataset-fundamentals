title: Chapter 7 — Detecting bias statistically
footer: Chapter 7 — Detecting Bias Statistically
slides:
- type: title
  title: Chapter 7 — Detecting bias statistically
  subtitle: A bias taxonomy identifies possible mechanisms, but an audit needs measurable
    evidence
  notes: A bias taxonomy identifies possible mechanisms, but an audit needs measurable
    evidence. Statistical detection begins by defining relevant groups, outcomes,
    and deployment populations. It then compares representation, distributions, relationships,
    and decision rates to locate disparities that require explanation or intervention.
- type: bullets
  title: Learning objectives
  bullets:
  - Calculate and cautiously interpret a disparate-impact ratio using the eighty-percent
    rule
  notes: By the end of this clip, learners should be able to plan a disaggregated
    bias screen, compare subgroup distributions, interpret the role of statistical
    tests, identify proxy relationships with sensitive attributes, and calculate and
    cautiously interpret a disparate-impact ratio using the eighty-percent rule.
- type: bullets
  title: Example 7.27 — Multiple Manifestations of Dataset Bias
  bullets:
  - Example 7.27 — hands-on module
  - Example 7.27 establishes why one metric is insufficient
  - Bias may appear in demographic representation
  - An audit should therefore inspect both inputs and decisions, compare several subgroups
  - 'View files: `modules/chapter7/example27/`'
  notes: Example 7.27 establishes why one metric is insufficient. Bias may appear
    in demographic representation, processing, labels, aggregation, or outcomes. An
    audit should therefore inspect both inputs and decisions, compare several subgroups,
    and preserve context about how each variable was created. A flag is evidence for
    investigation, not a complete causal explanation.
