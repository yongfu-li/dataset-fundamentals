title: Chapter 11 — Hybrid annotation pipelines
footer: Chapter 11 — Hybrid Annotation Pipelines
slides:
- type: title
  title: Chapter 11 — Hybrid annotation pipelines
  subtitle: Neither crowd-only nor expert-only staffing is optimal for mixed schemas
  notes: 'Neither crowd-only nor expert-only staffing is optimal for mixed schemas.
    This final part shows hybrid patterns: expert gold then crowd scale-up, crowd
    for routine objects and experts for pathology, active routing of hard cases, and
    cost–quality–speed benefits that close the chapter.'
- type: bullets
  title: Learning objectives
  bullets:
  - Speed benefits of hybrid staffing
  notes: By the end of this part, learners should be able to describe hybrid pipelines
    that seed gold with experts and scale with crowds; split routine versus expert-critical
    items; integrate active learning to route hard cases; and summarize cost, quality,
    and speed benefits of hybrid staffing.
- type: bullets
  title: Why hybrid approaches
  bullets:
  - Hybrid approaches balance cost, speed
  - A useful pattern invests scarce experts where schema and gold labels are defined
  notes: Hybrid approaches balance cost, speed, and quality by using crowdsourcing
    for large-scale simpler tasks and experts for complex or high-stakes tasks. A
    useful pattern invests scarce experts where schema and gold labels are defined,
    then uses crowd or open throughput where volume—not raw clinical judgment—is the
    bottleneck.
- type: bullets
  title: Example 11.25 — Expert Gold Then Crowd Scale-Up
  bullets:
  - Example 11.25 — hands-on module
  - Example 11.25 seeds crowd work with an expert gold set
  - Experts first label a small medical-image gold set
  - Crowds then label the remainder
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example25/`'
  notes: Example 11.25 seeds crowd work with an expert gold set. Experts first label
    a small medical-image gold set. Crowds then label the remainder, while experts
    audit random batches and adjudicate disagreements against that gold set. The example
    25 module for this chapter summarizes that two-phase pattern.
- type: bullets
  title: Example 11.26 — Crowd Objects Expert Pathology
  bullets:
  - Example 11.26 — hands-on module
  - Example 11.26 splits simple objects to the crowd and pathology to experts
  - Crowd workers tag cars and trees in street scenes
  - Difficulty, not platform preference alone, drives who sees which item
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example26/`'
  notes: Example 11.26 splits simple objects to the crowd and pathology to experts.
    Crowd workers tag cars and trees in street scenes, while pathologists label rare
    lesion types in the same campaign’s medical subset. Difficulty—not platform preference
    alone—drives who sees which item. The example 26 module for this chapter frames
    that split.
- type: bullets
  title: Active learning in the hybrid queue
  bullets:
  - Active learning can sit inside the hybrid workforce
  - A model trained on a small expert seed set queries the most uncertain items for
    experts
  - That routing shrinks expert hours while protecting hard cases that would otherwise
    pollute
  notes: Active learning can sit inside the hybrid workforce. A model trained on a
    small expert seed set queries the most uncertain items for experts and sends high-confidence
    items to crowds. That routing shrinks expert hours while protecting hard cases
    that would otherwise pollute training if labeled carelessly.
- type: bullets
  title: Example 11.28 — Active Learning Routes Hard Cases
  bullets:
  - Example 11.28 — hands-on module
  - Example 11.28 routes uncertain NLP items to experts via active learning
  - Shrinking expert hours while protecting hard cases
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example28/`'
  notes: Example 11.28 routes uncertain NLP items to experts via active learning.
    An NLP model trained on a small expert seed set queues low-confidence sentences
    to experts and high-confidence ones to crowds, shrinking expert hours while protecting
    hard cases. The example 28 module for this chapter describes that routing loop.
- type: bullets
  title: Example 11.29 — Hybrid Cost Savings Pattern
  bullets:
  - Example 11.29 — hands-on module
  - Hybrid benefits include cost efficiency
  - Example 11.29 summarizes the hybrid cost pattern
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example29/`'
  notes: 'Hybrid benefits include cost efficiency: crowds handle routine boxes while
    experts adjudicate. Example 11.29 summarizes the hybrid cost pattern: a hybrid
    plan pays crowds for routine boxes and experts for adjudication, cutting total
    labeling spend without dropping gold-set quality. The example 29 module for this
    chapter covers that cost pattern.'
- type: bullets
  title: Quality, speed, and looking ahead
  bullets:
  - Hybrid quality control uses expert oversight of crowd batches and guideline updates
    when
  - Crowds deliver overnight throughput on easy items while a smaller expert pool
    clears the
  - Move next to scalable storage and lineage for large labeled corpora
  notes: Hybrid quality control uses expert oversight of crowd batches and guideline
    updates when systematic errors appear. Crowds deliver overnight throughput on
    easy items while a smaller expert pool clears the uncertain queue. Pair these
    strategies with synthetic augmentation only after validation, keep fairness and
    QC checks on weak or crowd labels, and move next to scalable storage and lineage
    for large labeled corpora.
- type: bullets
  title: Takeaways
  bullets:
  - Hybrid pipelines assign routine volume to crowds and reserve experts for gold
  - Active learning can route uncertainty to the right workforce tier
  - Cost, quality
  notes: Hybrid pipelines assign routine volume to crowds and reserve experts for
    gold, adjudication, and hard cases. Active learning can route uncertainty to the
    right workforce tier. Cost, quality, and speed improve together when difficulty
    drives staffing—not when one workforce does everything.
