title: Chapter 11 — Techniques in active learning
footer: Chapter 11 — Active Learning Techniques
slides:
- type: title
  title: Chapter 11 — Techniques in active learning
  subtitle: Uncertainty sampling alone can over-focus on odd or redundant cases
  notes: 'Uncertainty sampling alone can over-focus on odd or redundant cases. This
    part covers complementary techniques that keep the labeling queue informative
    and affordable: least-confidence selection near decision boundaries, diversity
    sampling across clusters, cost-sensitive routing of expensive experts, and model-in-the-loop
    review.'
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to explain least-confidence
    uncertainty near decision boundaries; describe diversity-based sampling via clustering;
    apply cost-sensitive routing when labeling cost varies; and outline model-in-the-loop
    workflows where humans correct model proposals.
- type: bullets
  title: Least confidence and related uncertainty measures
  bullets:
  - Uncertainty sampling queries samples where the model is least predictable
  - Least confidence focuses on near-ties such as 0.55 versus 0.45 in binary classification
  - Margin sampling uses the top-two probability gap
  - Entropy sampling uses the full output distribution
  - These measures work well on complex boundaries but can skew the labeled set toward
    hard
  notes: Uncertainty sampling queries samples where the model is least predictable.
    Least confidence focuses on near-ties such as 0.55 versus 0.45 in binary classification.
    Margin sampling uses the top-two probability gap. Entropy sampling uses the full
    output distribution. These measures work well on complex boundaries but can skew
    the labeled set toward hard outliers if used alone.
