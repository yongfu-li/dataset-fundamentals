- type: bullets
  title: Diversity-based sampling
  bullets:
  - Diversity-based sampling ensures selected samples represent the data distribution
  - A common approach clusters unlabeled data and draws from underrepresented or highly
  - The goal is coverage across scenarios so the model does not overfit a narrow subset
    of
  notes: Diversity-based sampling ensures selected samples represent the data distribution,
    not only the hardest outliers. A common approach clusters unlabeled data and draws
    from underrepresented or highly diverse clusters. The goal is coverage across
    scenarios so the model does not overfit a narrow subset of uncertain cases.
- type: bullets
  title: Example 11.6 — Diversity Sampling Across Review Clusters
  bullets:
  - Example 11.6 — hands-on module
  - Example 11.6 uses clustering so sentiment labels cover mixed and neutral reviews
  - Diversity-based sampling draws reviews from multiple clusters
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example6/`'
  notes: Example 11.6 uses clustering so sentiment labels cover mixed and neutral
    reviews. Diversity-based sampling draws reviews from multiple clusters, including
    subtle or mixed sentiment, so the model does not overfit to only strongly positive
    or negative text. The example 6 module for this chapter summarizes that cluster
    coverage idea.
- type: bullets
  title: Cost-sensitive active learning
  bullets:
  - Cost-sensitive active learning incorporates labeling cost into selection
  - A cost-impact model ranks samples by expected performance gain relative to annotation
  - Under a fixed budget, the system selects the most impactful points within that
    budget
  - This matters when some items need expensive experts and others can use cheaper
    annotators
  notes: Cost-sensitive active learning incorporates labeling cost into selection.
    A cost-impact model ranks samples by expected performance gain relative to annotation
    effort. Under a fixed budget, the system selects the most impactful points within
    that budget. This matters when some items need expensive experts and others can
    use cheaper annotators.
- type: bullets
  title: Example 11.7 — Cost-Sensitive Routing in Legal Labeling
  bullets:
  - Example 11.7 — hands-on module
  - Example 11.7 allocates expensive expert labels only where they change the model
    most
  - Maximizing accuracy gain per labeling dollar
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example7/`'
  notes: Example 11.7 allocates expensive expert labels only where they change the
    model most. Cost-sensitive active learning sends ambiguous contracts to legal
    experts and simpler documents to non-experts, maximizing accuracy gain per labeling
    dollar. The example 7 module for this chapter frames that routing pattern.
- type: bullets
  title: Example 11.8 — Model-in-the-Loop Tumor Review
  bullets:
  - Example 11.8 — hands-on module
  - Model-in-the-loop annotation emphasizes human–machine collaboration
  - The model proposes preliminary labels or highlights uncertain regions
  - So later rounds need fewer human edits
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example8/`'
  notes: Model-in-the-loop annotation emphasizes human–machine collaboration. The
    model proposes preliminary labels or highlights uncertain regions; humans correct
    or validate; corrections retrain the model. Example 11.8 shows the model proposing
    tumor locations on X-rays while experts review only ambiguous cases, so later
    rounds need fewer human edits. The example 8 module for this chapter describes
    that interactive medical loop.
- type: bullets
  title: Takeaways
  bullets:
  - Least-confidence, margin
  - Cost-sensitive routing protects scarce expert budgets
  - Model-in-the-loop workflows let humans focus on corrections rather than labeling
    every
  notes: Least-confidence, margin, and entropy remain core uncertainty tools but need
    diversity to avoid skewed queues. Cost-sensitive routing protects scarce expert
    budgets. Model-in-the-loop workflows let humans focus on corrections rather than
    labeling every item from scratch.
