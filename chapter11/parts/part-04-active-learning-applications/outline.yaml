  - 'View files: `modules/chapter11/example12/`'
  notes: Example 11.12 sends atypical chest X-rays to radiologists via active learning.
    Uncertainty sampling surfaces X-rays with atypical pneumonia or overlapping pathologies
    for radiologist review, improving edge-case detection with fewer labeled studies.
    The example 12 module for this chapter frames that pneumonia queue.
