- type: bullets
  title: Takeaways
  bullets:
  - Across NLP, driving perception
  - Seed models plus selective expert review cut annotation volume while improving
    edge-case
  - Routine easy items need not consume expert hours
  notes: Across NLP, driving perception, and medical imaging, active learning concentrates
    human effort on uncertain, atypical, or safety-critical cases. Seed models plus
    selective expert review cut annotation volume while improving edge-case performance.
    Routine easy items need not consume expert hours.
