title: Chapter 11 — Active learning applications
footer: Chapter 11 — Active Learning Applications
slides:
- type: title
  title: Chapter 11 — Active learning applications
  subtitle: Query strategies matter only when they change real labeling queues
  notes: Query strategies matter only when they change real labeling queues. This
    part walks active-learning applications in natural language processing, driving
    perception, and medical imaging, showing how uncertain items reach human experts
    while easy cases stay unlabeled.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to describe active learning
    for review sentiment and related NLP tasks; explain uncertainty-driven queues
    for driving perception; and interpret medical examples for pneumonia X-rays and
    dermoscopic lesions.
- type: bullets
  title: Active learning in NLP
  bullets:
  - Related tasks
  - Annotating large corpora is expensive, especially for legal or medical text
  - The model focuses labeling on informative or uncertain samples such as ironic
  notes: In NLP, active learning reduces labeled volume for classification, named
    entity recognition, sentiment analysis, and related tasks. Annotating large corpora
    is expensive, especially for legal or medical text. The model focuses labeling
    on informative or uncertain samples such as ironic, mixed, or domain-specific
    phrases.
- type: bullets
  title: Example 11.9 — Active Learning for Review Sentiment
  bullets:
  - Example 11.9 — hands-on module
  - Example 11.9 queues uncertain reviews for human sentiment labels
  - Improving nuance with fewer total annotations
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example9/`'
  notes: Example 11.9 queues uncertain reviews for human sentiment labels. A sentiment
    model trained on a small seed set uses uncertainty or entropy sampling to request
    labels on ironic or mixed reviews, improving nuance with fewer total annotations.
    The example 9 module for this chapter summarizes that sentiment queue.
- type: bullets
  title: Active learning in vision
  bullets:
  - In computer vision
  - Active learning focuses annotators on frames that most improve performance
  notes: In computer vision, labeling images or videos for detection, segmentation,
    or action recognition is time-consuming. Active learning focuses annotators on
    frames that most improve performance, such as occlusions, weather degradation,
    or ambiguous poses, instead of labeling every fleet frame or every video frame.
- type: bullets
  title: Example 11.10 — Active Learning for Driving Perception
  bullets:
  - Example 11.10 — hands-on module
  - Example 11.10 focuses annotators on occluded or foggy driving scenes
  - So perception models learn rare hard cases without labeling every fleet frame
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example10/`'
  notes: Example 11.10 focuses annotators on occluded or foggy driving scenes. Uncertainty
    sampling queries frames where pedestrians or signs are occluded or weather-degraded,
    so perception models learn rare hard cases without labeling every fleet frame.
    The example 10 module for this chapter describes that perception queue.
- type: bullets
  title: Healthcare case study
  bullets:
  - Medical image labeling requires domain expertise and is costly
  - Active learning reduces the number of expert annotations while routing the most
  - Experts spend limited time on atypical or overlapping pathologies rather than
    routine easy
  notes: Medical image labeling requires domain expertise and is costly. Active learning
    reduces the number of expert annotations while routing the most informative studies
    to clinicians. Experts spend limited time on atypical or overlapping pathologies
    rather than routine easy cases.
- type: bullets
  title: Example 11.12 — Pneumonia Detection with Uncertain X-rays
  bullets:
  - Example 11.12 — hands-on module
  - Example 11.12 sends atypical chest X-rays to radiologists via active learning
  - Improving edge-case detection with fewer labeled studies
