  bullets:
  - Example 11.2 — hands-on module
  - Example 11.2 refines the idea for multi-class settings
  - Signaling weak class separation that a new label can sharpen
  - This differs from absolute least-confidence alone by focusing on the competing
    pair of
  - 'View files: `modules/chapter11/example2/`'
  notes: Example 11.2 refines the idea for multi-class settings. Margin sampling prioritizes
    instances where the top two predicted probabilities are closest, signaling weak
    class separation that a new label can sharpen. This differs from absolute least-confidence
    alone by focusing on the competing pair of classes. The example 2 module for this
    chapter frames that margin criterion.
- type: code
  title: Example 11.2 — listing
  code: "\"\"\"Example 11.2 — margin sampling prioritizes the smallest top-two gap.\"\
    \"\"\n\nfrom __future__ import annotations\n\n\ndef margin(probs: dict[str, float])\
    \ -> float:\n    \"\"\"Return the gap between the top two class probabilities.\"\
    \"\"\n    ordered = sorted(probs.values(), reverse=True)\n    return ordered[0]\
    \ - ordered[1]\n\n\ndef main() -> None:\n    \"\"\"Rank multi-class predictions\
    \ by margin (smaller margin => query first).\"\"\"\n    pool: list[tuple[str,\
    \ dict[str, float]]] = [\n        (\"doc_clear\", {\"sports\": 0.80, \"politics\"\
    : 0.12, \"biz\": 0.08}),\n        (\"doc_close\", {\"sports\": 0.41, \"politics\"\
    : 0.39, \"biz\": 0.20}),\n        (\"doc_flatish\", {\"sports\": 0.36, \"politics\"\
    : 0.34, \"biz\": 0.30}),\n    ]\n    ranked = sorted(pool, key=lambda row: margin(row[1]))\n\
    \    print(\"Multi-class pool; smaller top-two margin => higher labeling priority\\\
    n\")"
- type: bullets
  title: Example 11.3 — High-Entropy Multi-Class Prediction
  bullets:
  - Example 11.3 — hands-on module
  - Example 11.3 illustrates entropy sampling
  - If the model predicts class A at 0.4 and classes B and C at 0.3 each
  - Flat distributions across many classes are informative even when no single probability
    is
  - 'View files: `modules/chapter11/example3/`'
  notes: Example 11.3 illustrates entropy sampling. If the model predicts class A
    at 0.4 and classes B and C at 0.3 each, entropy is high because no class dominates,
    so such instances are prioritized for labeling. Flat distributions across many
    classes are informative even when no single probability is near 0.5. The example
    3 module for this chapter covers this high-entropy case.
- type: code
  title: Example 11.3 — listing
  code: "\"\"\"Example 11.3 — entropy sampling selects the flattest predictive distribution.\"\
    \"\"\n\nfrom __future__ import annotations\n\nimport math\n\n\ndef entropy(probs:\
    \ list[float]) -> float:\n    \"\"\"Return Shannon entropy of a discrete probability\
    \ distribution.\"\"\"\n    return -sum(p * math.log2(p) for p in probs if p >\
    \ 0)\n\n\ndef main() -> None:\n    \"\"\"Compare entropy for peaked vs flat multi-class\
    \ predictions.\"\"\"\n    cases: list[tuple[str, list[float]]] = [\n        (\"\
    peaked (A=0.90)\", [0.90, 0.05, 0.05]),\n        (\"book example (A=0.4, B=C=0.3)\"\
    , [0.40, 0.30, 0.30]),\n        (\"uniform (1/3 each)\", [1 / 3, 1 / 3, 1 / 3]),\n\
    \    ]\n    print(f\"{'Distribution':<32}{'Entropy (bits)':>16}{'Priority':>10}\"\
    )"
- type: bullets
  title: Active-learning pipeline steps
  bullets:
  - The pipeline is incremental
  - The loop stops when the model meets a performance threshold or the labeling budget
    is
  - Effort concentrates on informative cases rather than easy majority examples
  notes: 'The pipeline is incremental: train on the seed set, query the most informative
    unlabeled items, send them to human annotators, retrain on the expanded labeled
    set, and iterate. The loop stops when the model meets a performance threshold
    or the labeling budget is exhausted. Effort concentrates on informative cases
    rather than easy majority examples.'
