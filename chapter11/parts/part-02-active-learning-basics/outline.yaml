  notes: Example 11.4 applies the full loop to expert MRI labeling. A tumor detector
    starts from a small labeled MRI seed set, then repeatedly queries ambiguous or
    rare-tumor scans for radiologist labels, cutting expert hours while improving
    detection on hard cases. The example 4 module for this chapter describes that
    medical active-learning pattern.
