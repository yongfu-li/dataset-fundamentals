title: Chapter 11 — Active learning basics
footer: Chapter 11 — Active Learning Basics
slides:
- type: title
  title: Chapter 11 — Active learning basics
  subtitle: Active learning attacks the labeling bottleneck by letting the model choose
    which unlabeled items humans should label
  notes: Active learning attacks the labeling bottleneck by letting the model choose
    which unlabeled items humans should label next. Instead of treating every instance
    as equally important, the model uses its own uncertainty to focus annotator effort
    where new labels most improve performance.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to define the active-learning
    iterative loop; contrast uncertainty, margin, and entropy sampling as query strategies;
    and interpret short examples that apply those strategies to vision and medical
    imaging queues.
- type: bullets
  title: The iterative feedback loop
  bullets:
  - Active learning starts from a small labeled seed set
  - The cycle repeats until performance or budget stops the loop
  - The goal is better generalization with fewer total labels than random annotation
  notes: Active learning starts from a small labeled seed set. The model then selects
    unlabeled points it is most uncertain about, humans label those points, the model
    retrains, and the cycle repeats until performance or budget stops the loop. The
    goal is better generalization with fewer total labels than random annotation.
- type: bullets
  title: Query strategies overview
  bullets:
  - A query strategy defines how the model ranks unlabeled items for human labeling
  - Uncertainty sampling targets low-confidence predictions near decision boundaries
  - Margin sampling ranks by the gap between the top two class probabilities
  - Entropy sampling ranks by predictive entropy over the full class distribution
  - Strategies can be combined or adapted to the task
  notes: A query strategy defines how the model ranks unlabeled items for human labeling.
    Uncertainty sampling targets low-confidence predictions near decision boundaries.
    Margin sampling ranks by the gap between the top two class probabilities. Entropy
    sampling ranks by predictive entropy over the full class distribution. Strategies
    can be combined or adapted to the task.
