  - Explore the chapter example module
  - 'View files: `modules/chapter11/example1/`'
  notes: Example 11.1 shows uncertainty sampling on a binary vision task. An image
    with predicted probabilities near 0.51 and 0.49 for cat versus dog is queued for
    a human label because that near-tie is where a new label most reshapes the decision
    boundary. The example 1 module for this chapter summarizes that near-tie selection
    idea.
- type: code
  title: Example 11.1 — listing
  code: "\"\"\"Example 11.1 — uncertainty sampling queues near-tie binary predictions.\"\
    \"\"\n\nfrom __future__ import annotations\n\n\ndef uncertainty_score(p_positive:\
    \ float) -> float:\n    \"\"\"Return distance from a 0.5 decision boundary (lower\
    \ => more uncertain).\"\"\"\n    return abs(p_positive - 0.5)\n\n\ndef main()\
    \ -> None:\n    \"\"\"Rank unlabeled images by binary prediction uncertainty.\"\
    \"\"\n    pool: list[tuple[str, float]] = [\n        (\"img_clear_dog.jpg\", 0.92),\n\
    \        (\"img_clear_cat.jpg\", 0.11),\n        (\"img_blurry_pet.jpg\", 0.51),\n\
    \        (\"img_night_pet.jpg\", 0.48),\n        (\"img_toy_animal.jpg\", 0.67),\n\
    \    ]\n    ranked = sorted(pool, key=lambda row: uncertainty_score(row[1]))"
