title: Chapter 11 — Introduction to self-supervised learning
footer: Chapter 11 — Self Supervised Learning
slides:
- type: title
  title: Chapter 11 — Introduction to self-supervised learning
  subtitle: Weak supervision still invents labels
  notes: Weak supervision still invents labels. Self-supervised learning postpones
    task labels by training on unlabeled structure through pretext tasks. This part
    defines self-supervision, contrasts it with supervised learning, and introduces
    contrastive pretraining before fine-tuning.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to define self-supervised
    learning and how it differs from supervised learning; explain the role of pretext
    tasks in learning transferable representations; and describe contrastive pretraining
    followed by fine-tuning on a small labeled set.
- type: bullets
  title: Definition versus supervised learning
  bullets:
  - Supervised learning trains on input–label pairs, such as images tagged cat or
    dog
  - Self-supervised learning does not require manual task labels during pretraining
  - Instead, the model creates its own supervisory signal from the data by solving
    a pretext
  notes: Supervised learning trains on input–label pairs, such as images tagged cat
    or dog. Self-supervised learning does not require manual task labels during pretraining.
    Instead, the model creates its own supervisory signal from the data by solving
    a pretext task that exploits inherent structure, then transfers the learned representation
    to a downstream task.
- type: bullets
  title: Why pretext tasks matter
  bullets:
  - Pretext tasks force the model to learn useful features
  - After pretraining
  - This reduces labeling cost and can improve generalization when unlabeled corpora
    are
  notes: Pretext tasks force the model to learn useful features—spatial relationships,
    object structure, or contextual semantics—from unlabeled data. After pretraining,
    a smaller labeled set fine-tunes the model for classification, detection, or language
    understanding. This reduces labeling cost and can improve generalization when
    unlabeled corpora are abundant.
- type: bullets
  title: Vision pretext examples
  bullets:
  - Rotation prediction of randomly rotated images
  - Solving these proxies teaches spatial and semantic structure that later supports
    detection
  notes: In computer vision, common pretext tasks include jigsaw puzzle reassembly
    of shuffled patches, context prediction of masked image regions, and rotation
    prediction of randomly rotated images. Solving these proxies teaches spatial and
    semantic structure that later supports detection or classification without requiring
    class labels during pretraining.
- type: bullets
  title: Language pretext examples
  bullets:
  - In natural language processing
  - Next-sentence prediction and text infilling teach discourse and local coherence
  - These tasks turn large unlabeled text corpora into representation learners before
    any
  notes: In natural language processing, masked language modeling asks the model to
    predict hidden tokens from context, as in BERT-style pretraining. Next-sentence
    prediction and text infilling teach discourse and local coherence. These tasks
    turn large unlabeled text corpora into representation learners before any sentiment
    or entity labels are collected.
- type: bullets
  title: Contrastive learning idea
  bullets:
  - Contrastive methods learn representations by pulling similar views of the same
    instance
  - In vision, two augmented crops of one image form a positive pair
  - The resulting encoder captures discriminative features that transfer well when
    a linear
  notes: Contrastive methods learn representations by pulling similar views of the
    same instance together and pushing dissimilar instances apart in embedding space.
    In vision, two augmented crops of one image form a positive pair. The resulting
    encoder captures discriminative features that transfer well when a linear head
    is fine-tuned on limited labels.
- type: bullets
  title: Example 11.15 — Contrastive Pretraining Then Fine-Tune
  bullets:
  - Example 11.15 — hands-on module
  - Example 11.15 illustrates contrastive pretraining before fine-tuning
  - A vision encoder is pretrained with SimCLR-style contrastive loss on unlabeled
    product
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example15/`'
  notes: Example 11.15 illustrates contrastive pretraining before fine-tuning. A vision
    encoder is pretrained with SimCLR-style contrastive loss on unlabeled product
    photos, then a small labeled set fine-tunes a linear head for category recognition,
    cutting the labels needed for competitive accuracy. The example 15 module for
    this chapter summarizes that pretrain-then-fine-tune pattern.
- type: bullets
  title: Takeaways
  bullets:
  - Self-supervised learning creates supervision from unlabeled structure via pretext
    tasks
  - It sits between supervised and unsupervised learning
  - Contrastive pretraining plus light fine-tuning is a practical recipe when downstream
  notes: 'Self-supervised learning creates supervision from unlabeled structure via
    pretext tasks. It sits between supervised and unsupervised learning: unlabeled
    scale with structured objectives. Contrastive pretraining plus light fine-tuning
    is a practical recipe when downstream labels remain scarce.'
- type: bullets
  title: Next
