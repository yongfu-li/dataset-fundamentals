title: Chapter 11 — Crowdsourcing versus expert annotation
footer: Chapter 11 — Crowd Versus Expert
slides:
- type: title
  title: Chapter 11 — Crowdsourcing versus expert annotation
  subtitle: 'Representation learning and weak labels still leave a workforce question:
    who should annotate which items?'
  notes: 'Representation learning and weak labels still leave a workforce question:
    who should annotate which items? This part compares crowd scale, cost, and turnaround
    with expert quality for radiology, legal, and other high-stakes schemas.'
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to list operational advantages
    of crowdsourcing for simple schemas; explain quality and reliability challenges
    of crowd labels; contrast expert strengths on domain-critical tasks; and recognize
    cost and scalability limits of expert-only staffing.
- type: bullets
  title: Crowdsourcing advantages
  bullets:
  - For annotation, crowdsourcing offers scale, lower per-item cost, fast turnaround
  - Those advantages matter most when the schema is simple, guidelines are clear
  - This section emphasizes when experts must own labels rather than restating platform
  notes: For annotation, crowdsourcing offers scale, lower per-item cost, fast turnaround,
    and diverse raters for subjective tasks. Those advantages matter most when the
    schema is simple, guidelines are clear, and gold checks from Chapter 4 are in
    place. This section emphasizes when experts must own labels rather than restating
    platform tutorials.
- type: bullets
  title: Example 11.16 — Crowd Scale for Attribute Labels
  bullets:
  - Example 11.16 — hands-on module
  - Example 11.16 shows crowd scale for high-volume attribute labeling
  - A vision team needs millions of face images tagged with age band, expression
  - Crowdsourcing platforms distribute the schema across many workers so labeling
    finishes in
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example16/`'
  notes: Example 11.16 shows crowd scale for high-volume attribute labeling. A vision
    team needs millions of face images tagged with age band, expression, and accessories.
    Crowdsourcing platforms distribute the schema across many workers so labeling
    finishes in days rather than months. The example 16 module for this chapter frames
    that scale pattern.
- type: bullets
  title: Example 11.17 — Crowd Cost for Product Images
  bullets:
  - Example 11.17 — hands-on module
  - Example 11.17 contrasts crowd cost with expert-only product labeling
  - A retailer needs thousands of product photos labeled for category and attributes
  - Paying only domain experts would blow the budget
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example17/`'
  notes: Example 11.17 contrasts crowd cost with expert-only product labeling. A retailer
    needs thousands of product photos labeled for category and attributes. Paying
    only domain experts would blow the budget; crowd microtasks make the volume affordable
    when gold checks are in place. The example 17 module for this chapter summarizes
    that cost trade-off.
- type: bullets
  title: Crowdsourcing challenges
  bullets:
  - Crowd workers may be inconsistently trained or motivated, producing noisy annotations
  - Mitigation requires ground-truth checks, gold questions, and redundancy
  - Platform ethics and inter-annotator agreement controls from earlier chapters should
    be in
  notes: Crowd workers may be inconsistently trained or motivated, producing noisy
    annotations. Mitigation requires ground-truth checks, gold questions, and redundancy.
    Platform ethics and inter-annotator agreement controls from earlier chapters should
    be in place before scaling crowd labels into training sets.
- type: bullets
  title: Example 11.20 — Expert Quality for Radiology Labels
  bullets:
  - Example 11.20 — hands-on module
  - Expert annotation uses specialists for tasks that need deep domain knowledge
  - Example 11.20 shows why expert quality matters for clinical images
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example20/`'
  notes: 'Expert annotation uses specialists for tasks that need deep domain knowledge.
    Example 11.20 shows why expert quality matters for clinical images: when labeling
    tumor boundaries on MRI slices, board-certified radiologists produce higher-precision
    masks than general crowd workers who lack clinical training. The example 20 module
    for this chapter covers that radiology quality gap.'
- type: bullets
  title: Example 11.22 — Legal Experts for Contract Clauses
  bullets:
  - Example 11.22 — hands-on module
  - Experts also improve consistency on complex legal schemas
  - Example 11.22 keeps legal clause labeling with domain experts
  - Explore the chapter example module
  - 'View files: `modules/chapter11/example22/`'
  notes: 'Experts also improve consistency on complex legal schemas. Example 11.22
    keeps legal clause labeling with domain experts: in contract classification, legal
    experts identify operative clauses and defined terms that non-experts routinely
    misread, reducing label noise before models train. The example 22 module for this
    chapter describes that legal expert path.'
- type: bullets
  title: Expert challenges
  bullets:
  - Expert annotation is expensive and hard to scale because skilled professionals
    are scarce
  - Careful analysis also slows throughput
  - Which motivates hybrid designs in the next part
  notes: Expert annotation is expensive and hard to scale because skilled professionals
    are scarce. Careful analysis also slows throughput. Pure expert staffing therefore
    struggles on million-item corpora even when quality is excellent, which motivates
    hybrid designs in the next part.
- type: bullets
  title: Takeaways
  bullets:
  - Crowds excel at scale, cost, and speed on clear schemas with gold checks
  - Experts excel at precision and consistency on radiology, legal
  - Expert-only staffing hits cost and capacity walls
  notes: Crowds excel at scale, cost, and speed on clear schemas with gold checks.
    Experts excel at precision and consistency on radiology, legal, and other high-stakes
    tasks. Expert-only staffing hits cost and capacity walls; the chapter next shows
    hybrid pipelines that combine both.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - The next part covers hybrid annotation pipelines
  notes: 'The next part covers hybrid annotation pipelines: expert gold then crowd
    scale-up, splitting routine objects from pathology, active routing of hard cases,
    and cost–quality–speed benefits.'
