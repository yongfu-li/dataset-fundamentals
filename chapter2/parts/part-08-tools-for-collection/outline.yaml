  - A full-featured survey platform is chosen over a bare email form because branching
    and
  - Explore the chapter example module
  - 'View files: `modules/chapter2/example16/`'
  notes: Example 2.16 shows a tool choice after the campus Wi-Fi instrument from an
    earlier example. The IT office needs branching so that only respondents who report
    failures see location follow-ups, plus a comma-separated export into the same
    warehouse as ticket logs. A full-featured survey platform is chosen over a bare
    email form because branching and export matter more than layout polish for this
    study. Open the example 16 module to compare requirements against platform capabilities.
- type: bullets
  title: Web scraping stacks
  bullets:
  - Scraping stacks extract fields from HTML when no API is offered
  - Large crawl graphs may use a framework designed for scalable spiders
  - At scholarly scale
  - Method-level trade-offs
  notes: Scraping stacks extract fields from HTML when no API is offered. Large crawl
    graphs may use a framework designed for scalable spiders; static pages parse well
    with a lightweight HTML library; browser drivers are needed when content appears
    only after interaction. At scholarly scale, staged pipelines with cross-repository
    validation separate research-grade harvests from brittle personal scripts. Method-level
    trade-offs—fragility, robots policies, terms of service—remain those of scraping
    as a method.
- type: bullets
  title: Example 2.17 — Static parser vs browser driver for catalog pages
  bullets:
  - Example 2.17 — hands-on module
  - Example 2.17 pairs a library choice with the course-catalog harvest from an earlier
  - If course titles appear in the initial HTML, a static parser is enough and cheaper
    to run
  - If titles load only after clicking a term filter
  - Explore the chapter example module
  - 'View files: `modules/chapter2/example17/`'
  notes: Example 2.17 pairs a library choice with the course-catalog harvest from
    an earlier example. If course titles appear in the initial HTML, a static parser
    is enough and cheaper to run. If titles load only after clicking a term filter,
    the team switches to a browser driver, accepting slower jobs and a higher chance
    of anti-bot blocks. Try the example 17 module to decide which stack fits a given
    page behavior.
- type: bullets
  title: API clients and schedulers
  bullets:
  - API tools are the clients, keys, and schedulers that call endpoints introduced
    earlier
  - Relative to scraping stacks, they usually offer clearer contracts
  - Operational polling loops must survive daily quotas
  - Survey platforms, scrapers
  notes: 'API tools are the clients, keys, and schedulers that call endpoints introduced
    earlier. Relative to scraping stacks, they usually offer clearer contracts: authenticate,
    respect rate limits, parse JSON or XML fields, and append rows to a growing store.
    Operational polling loops must survive daily quotas—backing off when limits are
    reached rather than retrying aggressively. Survey platforms, scrapers, and API
    clients are implementations of earlier method choices, not substitutes for them.'
- type: bullets
  title: Takeaways
  bullets:
  - Choose tools after methods and instruments are defined
  - Survey platforms encode branching and export workflows
  - Even with good tools
  notes: Choose tools after methods and instruments are defined. Survey platforms
    encode branching and export workflows; scraping stacks match page behavior; API
    clients encode authentication and quota discipline. Even with good tools, collection
    still fails when quality, bias, or integration are ignored—topics for the final
    part.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - How design questions reappear across domains
  notes: Complete the quiz, then continue to the final part on challenges and case
    studies—quality defects, channel bias, and how design questions reappear across
    domains.
