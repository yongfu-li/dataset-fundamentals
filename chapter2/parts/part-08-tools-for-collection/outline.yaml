title: Chapter 2 — Tools for data collection
footer: Chapter 2 — Tools For Collection
slides:
- type: title
  title: Chapter 2 — Tools for data collection
  subtitle: Method choices become operational through platforms and libraries
  notes: Method choices become operational through platforms and libraries. This part
    maps survey form builders, scraping stacks, and API clients to the instruments
    already introduced—and stresses that tools encode workflow, not research design.
- type: bullets
  title: Learning objectives
  bullets:
  - Map survey platforms, scraping libraries
  - API clients to the methods from earlier parts
  - Recognize that platforms cannot fix poor instrument design
  notes: By the end of this part, you should map survey platforms, scraping libraries,
    and API clients to the methods from earlier parts, justify tool choices using
    workflow requirements rather than brand familiarity, and recognize that platforms
    cannot fix poor instrument design.
- type: bullets
  title: Tools implement earlier choices
  bullets:
  - The chapter already decided which method fits the question
  - This section asks which products and libraries implement that choice
  - Official API clients for structured feeds
  - Observation remains largely protocol- and people-driven
  notes: The chapter already decided which method fits the question. This section
    asks which products and libraries implement that choice. Modern collection stacks
    typically combine survey platforms for human responses, scraping libraries for
    web content without APIs, and official API clients for structured feeds. Observation
    remains largely protocol- and people-driven; sensor tooling is deferred to later
    chapters on streaming architectures.
- type: bullets
  title: Survey platforms
  bullets:
  - Survey platforms automate instrument design, distribution
  - Lightweight tools suit quick internal polls
  - Strengths include low technical barriers, automatic tabular exports
  - Limits echo the method-level risks
  notes: 'Survey platforms automate instrument design, distribution, and response
    storage once the questionnaire plan exists. Lightweight tools suit quick internal
    polls; conversational layouts emphasize engagement; full-featured platforms add
    branding, branching logic, and richer analytics. Strengths include low technical
    barriers, automatic tabular exports, and reusable templates. Limits echo the method-level
    risks: voluntary response bias, fatigue on long instruments, and poor item design
    that no platform can fix.'
