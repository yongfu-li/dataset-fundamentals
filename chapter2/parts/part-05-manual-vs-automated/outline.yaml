  - 'View files: `modules/chapter2/example8/`'
  notes: Example 2.8 shows a setting where replacing people with sensors too early
    would lose the judgment the study needs. A grocer piloting a new layout asks associates
    to walk each aisle once per hour and record out-of-stock stock-keeping units on
    a tablet form. Associates can note temporary displays and damaged packaging that
    a ceiling camera would misclassify. The trade-off is that coverage drops when
    staffing is thin. Open the example 8 module to compare situational awareness against
    scale.
- type: bullets
  title: Automated data collection
  bullets:
  - Analytics platforms that emit event streams
  - Once configured
  - Privacy governance
  - Teams must also filter overload
  notes: 'Automated collection uses software and devices to capture data with minimal
    ongoing human effort: IoT sensors, scheduled scrapers, API pollers, and analytics
    platforms that emit event streams. Once configured, these systems can run continuously
    and feed the real-time sources discussed earlier. Automation scales and reduces
    some classes of human error, but it shifts cost into setup, maintenance, and privacy
    governance. Teams must also filter overload: a sensor that records every second
    can bury the rare event that matters unless retention and alerting rules are designed
    carefully.'
- type: bullets
  title: Example 2.9 — Automated cold-room temperature logging
  bullets:
  - Example 2.9 — hands-on module
  - Example 2.9 pairs with the shelf-audit case by showing when continuous sensing
    is the
  - The same grocer logs cold-room temperature every minute through wired sensors
    that write
  - No associate could sample that frequently without neglecting other work
  - Explore the chapter example module
  - 'View files: `modules/chapter2/example9/`'
  notes: Example 2.9 pairs with the shelf-audit case by showing when continuous sensing
    is the better fit. The same grocer logs cold-room temperature every minute through
    wired sensors that write to a central store. No associate could sample that frequently
    without neglecting other work, but the pipeline still needs alert thresholds and
    missing-packet checks before the stream is trusted. Try the example 9 module to
    see how automation trades human throughput for infrastructure discipline.
- type: bullets
  title: Takeaways
  bullets:
  - Choosing between manual and automated execution is a design decision, not a moral
    one
  - Manual methods fit audits, interviews, and early exploratory studies
  - Automated methods fit production monitoring, large web harvests, and streaming
    analytics
  - Mature programs often combine both
  notes: 'Choosing between manual and automated execution is a design decision, not
    a moral one. Manual methods fit audits, interviews, and early exploratory studies.
    Automated methods fit production monitoring, large web harvests, and streaming
    analytics. Mature programs often combine both: humans write protocols and review
    edge cases, while automation gathers the bulk stream.'
