title: Chapter 2 — Manual vs automated collection
footer: Chapter 2 — 05 Manual Vs Automated
slides:
- type: title
  title: Chapter 2 — Manual vs automated collection
  subtitle: The same survey can be filled by hand or ingested from a form API
  notes: The same survey can be filled by hand or ingested from a form API. This part
    separates which method you use from who or what executes it, comparing manual
    precision with automated scale.
- type: bullets
  title: Learning objectives
  bullets:
  - Distinguish the method axis from the execution axis
  - Error profile
  - Recognize when hybrid programs combine both approaches
  notes: By the end of this part, you should distinguish the method axis from the
    execution axis, contrast manual and automated collection on scale, cost, and error
    profile, and recognize when hybrid programs combine both approaches.
- type: bullets
  title: Method versus execution
  bullets:
  - The previous parts chose which method to use, survey, observation, scraping, or
    API
  - This section asks who or what executes it
  - The same survey can be filled by hand or ingested from an online form API
  - Manual execution suits small, high-precision, or highly contextual tasks
  - Automated execution suits large, repetitive, or real-time workloads
  - Most production programs sit on a hybrid continuum between the two poles
  notes: The previous parts chose which method to use—survey, observation, scraping,
    or API. This section asks who or what executes it. The same survey can be filled
    by hand or ingested from an online form API; the same observation protocol can
    be a field notebook or a camera feed. Manual execution suits small, high-precision,
    or highly contextual tasks. Automated execution suits large, repetitive, or real-time
    workloads. Most production programs sit on a hybrid continuum between the two
    poles.
- type: bullets
  title: Manual data collection
  bullets:
  - Manual collection relies on human intervention
  - It remains appropriate when cases are unique
  - Precision and flexibility are strengths
  - Even manual campaigns benefit from written protocols so that later analysts can
    interpret
  notes: 'Manual collection relies on human intervention: paper or digital forms,
    field notes, or keyboard entry into spreadsheets and databases. It remains appropriate
    when cases are unique, volumes are modest, or contextual judgment matters more
    than throughput. Precision and flexibility are strengths; time cost, fatigue-induced
    error, and poor scalability are the recurring limits. Even manual campaigns benefit
    from written protocols so that later analysts can interpret how each field was
    produced.'
