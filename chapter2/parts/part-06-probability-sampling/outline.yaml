- type: title
  title: Chapter 2 — Probability sampling
  subtitle: Collection instruments gather answers; sampling decides whose answers
    count for inference
  notes: Collection instruments gather answers; sampling decides whose answers count
    for inference. This part introduces simple random, stratified, and cluster designs
    and when each fits a usable frame.
- type: bullets
  title: Learning objectives
  bullets:
  - Explain why sampling underpins generalization, describe simple random, stratified
  - Cluster probability designs
  - Match each design to a typical population and logistics profile
  notes: By the end of this part, you should explain why sampling underpins generalization,
    describe simple random, stratified, and cluster probability designs, and match
    each design to a typical population and logistics profile.
- type: bullets
  title: Why sampling matters
  bullets:
  - Sampling lets researchers learn about a population from a manageable subset of
    cases
  - A well-chosen sample supports generalization
  - This part covers three probability designs that appear repeatedly in practice
  - Each assumes a usable sampling frame unless noted otherwise
  notes: 'Sampling lets researchers learn about a population from a manageable subset
    of cases. A well-chosen sample supports generalization; a poorly chosen one quietly
    embeds bias into every downstream model and report. This part covers three probability
    designs that appear repeatedly in practice: simple random, stratified, and cluster
    sampling. Each assumes a usable sampling frame unless noted otherwise.'
- type: bullets
  title: Simple random sampling
  bullets:
  - In simple random sampling, each population member has an equal chance of selection
  - The method reduces selection bias when a complete frame exists and when the sample
    is
  - Operationally, teams build a complete list, draw units with a random process
  - Its practical limits are incomplete frames and non-response
  notes: 'In simple random sampling, each population member has an equal chance of
    selection. The method reduces selection bias when a complete frame exists and
    when the sample is large enough to support the desired margin of error. Operationally,
    teams build a complete list, draw units with a random process, and invite participation.
    Its practical limits are incomplete frames and non-response: people who ignore
    invitations may differ systematically from those who answer.'
