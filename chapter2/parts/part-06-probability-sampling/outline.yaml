  - A firm with two thousand employees on a complete human-resources roster wants
    feedback on
  - Analysts draw two hundred employee identifiers uniformly at random and invite
    those people
  - If response is high
  - 'View files: `modules/chapter2/example10/`'
  notes: Example 2.10 shows a clean frame case. A firm with two thousand employees
    on a complete human-resources roster wants feedback on a new benefits portal.
    Analysts draw two hundred employee identifiers uniformly at random and invite
    those people by email. If response is high, portal satisfaction can be generalized
    to the workforce, but non-respondents may still differ from respondents. Open
    the example 10 module to review the draw mechanics.
- type: bullets
  title: Stratified sampling
  bullets:
  - Stratified sampling first partitions the population into meaningful subgroups
  - The design improves precision when subgroups differ on the outcome of interest
    and
  - Costs include planning complexity and the need for prior knowledge to define strata
  notes: Stratified sampling first partitions the population into meaningful subgroups—strata
    such as age bands, regions, or device classes—then draws a random sample within
    each stratum. The design improves precision when subgroups differ on the outcome
    of interest and guarantees representation of smaller but important segments. Costs
    include planning complexity and the need for prior knowledge to define strata
    correctly.
- type: bullets
  title: Example 2.11 — Stratified sample of cart abandoners
  bullets:
  - Example 2.11 — hands-on module
  - Example 2.11 mirrors the retail cart-abandonment study from the chapter opener
  - Analysts divide recent abandoners into mobile and desktop strata
  - The design ensures that device-specific checkout friction is visible even if one
    device
  - Explore the chapter example module
  - 'View files: `modules/chapter2/example11/`'
  notes: Example 2.11 mirrors the retail cart-abandonment study from the chapter opener.
    Analysts divide recent abandoners into mobile and desktop strata, then draw random
    samples of equal size from each. The design ensures that device-specific checkout
    friction is visible even if one device class is rarer in the population. Try the
    example 11 module to see how stratification protects rare segments.
- type: bullets
  title: Cluster sampling
  bullets:
  - Cluster sampling selects groups of units, schools, clinics, city blocks
  - It is attractive when individual frames are unavailable or when travel costs make
    visiting
  - Clusters can be efficient
  - Prefer clusters that still reflect population diversity when logistics dominate
  notes: Cluster sampling selects groups of units—schools, clinics, city blocks—and
    then observes all or some members inside chosen clusters. It is attractive when
    individual frames are unavailable or when travel costs make visiting scattered
    individuals impractical. Clusters can be efficient, yet they often reduce precision
    when units inside a cluster are similar. Prefer clusters that still reflect population
    diversity when logistics dominate.
- type: bullets
  title: Takeaways
  bullets:
  - Use random sampling when the population is relatively homogeneous and a complete
    list
  - Use stratified sampling when key subgroups must appear in sufficient numbers
  - Use cluster sampling when logistics dominate and entire sites can be visited as
    units
  - Non-probability options for weak frames appear in the next part
  notes: Use random sampling when the population is relatively homogeneous and a complete
    list exists. Use stratified sampling when key subgroups must appear in sufficient
    numbers. Use cluster sampling when logistics dominate and entire sites can be
    visited as units. Non-probability options for weak frames appear in the next part.
