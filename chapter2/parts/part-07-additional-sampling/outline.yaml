title: Chapter 2 — Additional sampling techniques
footer: Chapter 2 — Additional Sampling
slides:
- type: title
  title: Chapter 2 — Additional sampling techniques
  subtitle: Not every study has a complete frame or the budget for probability draws
  notes: Not every study has a complete frame or the budget for probability draws.
    This part adds systematic sampling on ordered lists and two non-probability designs—convenience
    and snowball—used when access, not inference, is the binding constraint.
- type: bullets
  title: Learning objectives
  bullets:
  - Implement systematic sampling on an ordered frame with awareness of periodicity
  - State when each design is defensible versus when generalizable claims are inappropriate
  notes: By the end of this part, you should implement systematic sampling on an ordered
    frame with awareness of periodicity, contrast convenience and snowball non-probability
    designs, and state when each design is defensible versus when generalizable claims
    are inappropriate.
- type: bullets
  title: Beyond the three probability designs
  bullets:
  - The previous part covered simple random, stratified
  - Convenience and snowball sampling
  - The decision rule is whether inference to a population is required or whether
    exploratory
  notes: 'The previous part covered simple random, stratified, and cluster sampling
    from usable frames. This section adds one more probability option—systematic sampling
    on an ordered list—and two non-probability options that trade external validity
    for access: convenience and snowball sampling. The decision rule is whether inference
    to a population is required or whether exploratory access is the binding constraint.'
- type: bullets
  title: Systematic sampling
  bullets:
  - Systematic sampling selects every nth unit from an ordered frame after choosing
    a random
  - If a population of five hundred must yield fifty interviews, the interval is ten
  - Administration is often faster than drawing many independent random numbers
  notes: Systematic sampling selects every nth unit from an ordered frame after choosing
    a random start. If a population of five hundred must yield fifty interviews, the
    interval is ten; a random start of four yields units four, fourteen, twenty-four,
    and so on. When the start is random and the frame is complete, each unit still
    has a known chance of selection, and administration is often faster than drawing
    many independent random numbers.
- type: bullets
  title: Example 2.13 — Systematic draw from a membership directory
  bullets:
  - Example 2.13 — hands-on module
  - Example 2.13 shows a clean use case and the periodicity trap on the same kind
    of list
  - A professional society wants fifty interview slots from a five-hundred-person
    alphabetical
  - With interval ten and a random start of four, members four, fourteen, twenty-four
  - Shuffling before the draw removes that risk
  - 'View files: `modules/chapter2/example13/`'
  notes: Example 2.13 shows a clean use case and the periodicity trap on the same
    kind of list. A professional society wants fifty interview slots from a five-hundred-person
    alphabetical directory. With interval ten and a random start of four, members
    four, fourteen, twenty-four, and so on are invited. If the directory had instead
    been sorted by chapter in a repeating urban–rural pattern every ten rows, the
    same stride could over-represent one chapter type; shuffling before the draw removes
    that risk. Open the example 13 module to rehearse the interval calculation.
- type: bullets
  title: Convenience sampling
  bullets:
  - Convenience sampling recruits whoever is easiest to reach
  - Inclusion chances are unknown
  - Convenience samples buy access at the cost of bias and limited diversity
  - They scaffold instrument testing, not population claims
  notes: 'Convenience sampling recruits whoever is easiest to reach: a classroom,
    walk-in customers, or the first respondents to an online form. It is useful for
    pilots and formative work where speed matters more than population inference,
    and it is explicitly non-probability: inclusion chances are unknown. Convenience
    samples buy access at the cost of bias and limited diversity. They scaffold instrument
    testing, not population claims.'
- type: bullets
  title: Example 2.14 — Convenience sample on a university campus
  bullets:
  - Example 2.14 — hands-on module
  - Example 2.14 shows a typical campus intercept study and why its estimates should
    be
  - A researcher surveys the first one hundred students entering the library during
    exam week
  - The design is cheap and fast, but evening commuters, remote students
  - Explore the chapter example module
  - 'View files: `modules/chapter2/example14/`'
  notes: Example 2.14 shows a typical campus intercept study and why its estimates
    should be labeled exploratory. A researcher surveys the first one hundred students
    entering the library during exam week. The design is cheap and fast, but evening
    commuters, remote students, and non-library users are missing, so findings should
    not be treated as campus-wide rates. Try the example 14 module to document who
    is excluded from the frame.
- type: bullets
  title: Snowball sampling
  bullets:
  - Snowball sampling starts with a few eligible seeds and asks them to refer others
    who meet
  - The sample grows through social ties
  - Referrals lower recruitment cost, yet they concentrate homogeneity
  - Privacy protections for both participants and referrals are essential
  notes: 'Snowball sampling starts with a few eligible seeds and asks them to refer
    others who meet study criteria. The sample grows through social ties, which is
    often the only practical way to reach hidden or stigmatized populations when no
    frame exists. Referrals lower recruitment cost, yet they concentrate homogeneity:
    seeds recruit people like themselves. Findings should be interpreted as network-conditioned
    evidence rather than as population parameters, and privacy protections for both
    participants and referrals are essential.'
- type: bullets
  title: Takeaways
  bullets:
  - Use systematic sampling for efficient probability draws on clean lists
  - Reserve convenience and snowball designs for exploratory or hard-to-reach settings
  - When generalizable claims are required
  notes: Use systematic sampling for efficient probability draws on clean lists, but
    inspect ordering for periodicity first. Reserve convenience and snowball designs
    for exploratory or hard-to-reach settings, and report their limits openly. When
    generalizable claims are required, return to the probability designs from the
    previous part.
- type: bullets
  title: Next
  bullets:
