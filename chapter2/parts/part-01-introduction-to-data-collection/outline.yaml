title: Chapter 2 — Introduction to data collection
footer: Chapter 2 — Introduction To Data Collection
slides:
- type: title
  title: Chapter 2 — Introduction to data collection
  subtitle: Chapter 1 defined what a dataset is
  notes: Chapter 1 defined what a dataset is. This chapter asks how records enter
    one in the first place. This opening part frames data collection as a planned
    process—objectives, sources, methods, sampling, and storage—before any tool is
    chosen.
- type: bullets
  title: Learning objectives
  bullets:
  - Define data collection as a systematic
  - Name the three process traits that distinguish rigorous campaigns from ad hoc
    gathering
  notes: By the end of this part, you should define data collection as a systematic,
    objective-oriented process, outline the five linked decisions in a practical collection
    plan, and name the three process traits that distinguish rigorous campaigns from
    ad hoc gathering.
- type: bullets
  title: What is data collection?
  bullets:
  - Hypotheses, or operational decisions can be answered with evidence rather than
    anecdote
  - How sampling choices shape what later analysts can claim
  notes: Data collection is the systematic process of gathering and measuring information
    so that research questions, hypotheses, or operational decisions can be answered
    with evidence rather than anecdote. Where the previous chapter described curated
    datasets, this chapter focuses on which sources to trust, which instruments to
    use, and how sampling choices shape what later analysts can claim.
- type: bullets
  title: The five-step collection plan
  bullets:
  - A practical collection plan usually proceeds through five linked decisions
  - Teams first define objectives, research, monitoring, or model training
  - They identify sources, such as primary experiments and surveys versus secondary
    archives
  - Next they select methods, execute collection with quality checks
  notes: A practical collection plan usually proceeds through five linked decisions.
    Teams first define objectives—research, monitoring, or model training. They identify
    sources, such as primary experiments and surveys versus secondary archives. Next
    they select methods, execute collection with quality checks, and finally store
    and manage the resulting files so they remain usable after the campaign ends.
- type: bullets
  title: Process traits of effective collection
  bullets:
  - Effective collection programs share three process traits
  - 'They are systematic: procedures are specified so another team could reproduce
    the protocol'
  - They are objective-oriented
  - They are dynamic
  notes: 'Effective collection programs share three process traits, distinct from
    the dataset quality dimensions introduced earlier. They are systematic: procedures
    are specified so another team could reproduce the protocol. They are objective-oriented:
    every instrument and sample rule maps to a research or business question. They
    are dynamic: methods evolve as new sensors, APIs, and streaming platforms appear,
    especially in Internet of Things settings where continuous feeds replace one-shot
    surveys.'
- type: bullets
  title: Example 2.1 — Collection plan for a retail satisfaction study
  bullets:
  - Example 2.1 — hands-on module
  - Example 2.1 converts a vague request into a collectable specification
  - A retailer wants to know why online shoppers abandon carts
  - The plan might specify an objective to identify checkout friction
  - Explore the chapter example module
  - 'View files: `modules/chapter2/example1/`'
  notes: Example 2.1 converts a vague request into a collectable specification. A
    retailer wants to know why online shoppers abandon carts. The plan might specify
    an objective to identify checkout friction; sources that combine a primary post-purchase
    survey with secondary web analytics; methods such as an email questionnaire and
    server logs; a sample of recent cart abandoners stratified by device type; and
    storage as an anonymized table with a documented schema. Open the example 1 module
    for this chapter to walk through the checklist.
- type: bullets
  title: Why collection design matters
  bullets:
  - Collection quality constrains everything that follows
  - Analysis cannot recover information that was never measured
  - When protocols are designed well
  notes: Collection quality constrains everything that follows. Analysis cannot recover
    information that was never measured, and biased samples or inconsistent instruments
    can produce models that look accurate on paper yet fail for underrepresented groups.
    When protocols are designed well, decisions rest on observed evidence, avoidable
    measurement error shrinks, and later estimates gain precision—but only after the
    hard design work of choosing sources, methods, automation level, and samples that
    match the question.
- type: bullets
  title: Takeaways
  bullets:
  - Data collection is systematic and tied to objectives, not opportunistic gathering
  - A five-step plan links purpose, sources, methods, execution, and storage
  - Clarity about purpose and source comes before tool selection
  notes: Remember three points. Data collection is systematic and tied to objectives,
    not opportunistic gathering. A five-step plan links purpose, sources, methods,
    execution, and storage. Clarity about purpose and source comes before tool selection;
    without it, teams often gather data that is abundant yet irrelevant.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to the next part on sources of data, primary, secondary
  notes: Pause for the quiz, then continue to the next part on sources of data—primary,
    secondary, and real-time—and how each shapes collection trade-offs.
