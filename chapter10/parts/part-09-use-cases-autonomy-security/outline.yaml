title: Chapter 10 — Use cases in autonomy and security
footer: Chapter 10 — Use Cases Autonomy Security
slides:
- type: title
  title: Chapter 10 — Use cases in autonomy and security
  subtitle: Healthcare and finance are not the only high-stakes domains
  notes: Healthcare and finance are not the only high-stakes domains. This part covers
    pedestrian-in-rain edge cases for autonomous systems, computer-vision augmentation,
    and ransomware attack simulation for cybersecurity training.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to explain synthetic scenario
    generation for self-driving perception and planning; describe vision augmentation
    for generalization; and outline cyberattack simulation for anomaly detection and
    blue-team drills.
- type: bullets
  title: Autonomous systems data demands
  bullets:
  - Self-driving stacks require vast labeled coverage across weather, lighting, traffic
  - Logging every dangerous or rare combination on public roads is impractical and
    costly
  - Synthetic environments generate diverse driving clips for navigation, decision-making
  notes: Self-driving stacks require vast labeled coverage across weather, lighting,
    traffic, and pedestrian behavior. Logging every dangerous or rare combination
    on public roads is impractical and costly. Synthetic environments generate diverse
    driving clips for navigation, decision-making, and obstacle avoidance training
    before deployment.
- type: bullets
  title: Example 10.15 — Pedestrian-in-Rain Edge Case
  bullets:
  - Example 10.15 — hands-on module
  - A combination rarely present in fleet logs
  - Edge-case synthesis improves robustness where real collection is sparse or unsafe
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example15/`'
  notes: Example 10.15 trains perception on synthetic clips of pedestrians emerging
    from heavy rain at night—a combination rarely present in fleet logs. Edge-case
    synthesis improves robustness where real collection is sparse or unsafe. The example
    15 module for this chapter summarizes this autonomy scenario.
- type: bullets
  title: Edge cases and safety
  bullets:
  - Rare events, jaywalking, sudden obstacles, or unusual road geometry, may never
    appear
  - Synthetic simulation supplies critical scenarios at scale
  - Over-reliance remains a risk if generators omit plausible human actions
  notes: Rare events—jaywalking, sudden obstacles, or unusual road geometry—may never
    appear enough in real logs. Synthetic simulation supplies critical scenarios at
    scale, reducing the chance that planners fail on first contact with chaotic real-world
    behavior. Over-reliance remains a risk if generators omit plausible human actions.
- type: bullets
  title: Augmenting vision and other modalities
  bullets:
  - Synthetic data augments sparse or imbalanced real sets across computer vision
  - Rendered product photos under varied lighting and clutter diversify backgrounds
    beyond
  - Modified or generated text expands corpora for sentiment and translation tasks
  notes: Synthetic data augments sparse or imbalanced real sets across computer vision,
    natural language processing, and speech. Rendered product photos under varied
    lighting and clutter diversify backgrounds beyond warehouse photography. Modified
    or generated text expands corpora for sentiment and translation tasks.
- type: bullets
  title: Example 10.16 — Computer-Vision Augmentation
  bullets:
  - Example 10.16 — hands-on module
  - Example 10.16 shows a vision team rendering synthetic product photos with varied
    lighting
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example16/`'
  notes: Example 10.16 shows a vision team rendering synthetic product photos with
    varied lighting and clutter so classifiers see more backgrounds than warehouse
    photography provides. The example 16 module for this chapter frames augmentation
    for improved generalization.
- type: bullets
  title: Cybersecurity and evolving threats
  bullets:
  - Cyber threats evolve quickly; real attack logs are incomplete and sensitive
  - Insider-threat models without waiting for live incidents
  notes: Cyber threats evolve quickly; real attack logs are incomplete and sensitive.
    Synthetic normal and anomalous network activity expands training for intrusion
    detection, phishing recognition, and insider-threat models without waiting for
    live incidents.
- type: bullets
  title: Example 10.17 — Ransomware Attack Simulation
  bullets:
  - Example 10.17 — hands-on module
  - Example 10.17 describes a security operations center replaying synthetic ransomware
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example17/`'
  notes: Example 10.17 describes a security operations center replaying synthetic
    ransomware encryption patterns against backup workflows to test detection latency
    before a live incident. The example 17 module for this chapter outlines attack
    simulation for defensive readiness.
- type: bullets
  title: Takeaways
  bullets:
  - Autonomy benefits from synthetic rare-scenario coverage
  - All three require validation that synthetic behavior matches plausible real threats
    and
  notes: Autonomy benefits from synthetic rare-scenario coverage; vision and language
    pipelines benefit from diversified augmentation; cybersecurity benefits from simulated
    attacks and anomalies. All three require validation that synthetic behavior matches
    plausible real threats and environments.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Regulatory considerations
  notes: The final part asks when synthetic data truly protects people and when it
    creates new harms—covering privacy claims under GDPR, manipulated reporting, bias
    amplification, mitigation practices, and regulatory considerations.
