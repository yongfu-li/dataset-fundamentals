  - Success depends on balanced generator–discriminator training and appropriate loss
  - Architectural variants, evaluation metrics, and ethical risks are covered in the
    next part
  notes: Generative adversarial networks learn synthesis through adversarial feedback
    rather than explicit distributional assumptions. Success depends on balanced generator–discriminator
    training and appropriate loss functions. Architectural variants, evaluation metrics,
    and ethical risks are covered in the next part.
