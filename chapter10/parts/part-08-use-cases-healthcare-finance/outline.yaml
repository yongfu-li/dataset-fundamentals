  notes: Example 10.12 describes a hospital consortium releasing synthetic electronic
    health record tables with diagnosis codes, lab ranges, and visit counts. External
    researchers prototype models without accessing raw patient files. The example
    12 module for this chapter frames privacy-preserving medical sharing scenarios.
- type: bullets
  title: Simulating rare conditions
  bullets:
  - Low-prevalence diseases yield too few real cases for robust machine learning
  - Synthetic generation can augment rare oncology or genetic presentations while
    preserving
  - The goal is better classifiers and simulators
  notes: Low-prevalence diseases yield too few real cases for robust machine learning.
    Synthetic generation can augment rare oncology or genetic presentations while
    preserving clinically relevant feature patterns. The goal is better classifiers
    and simulators—not fictional patients that misrepresent treatment pathways.
