slides:
- type: title
  title: Chapter 10 — Use cases in healthcare and finance
  subtitle: Synthesis methods become concrete in domain settings
  notes: Synthesis methods become concrete in domain settings. This part walks privacy-preserving
    medical records, rare-disease simulation, and synthetic fraud patterns for financial
    model training.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to explain how synthetic
    health data supports research under HIPAA and GDPR constraints; describe rare-condition
    augmentation for low-prevalence diseases; and outline fraud-detection training
    with synthetic transaction patterns.
- type: bullets
  title: Healthcare privacy barriers
  bullets:
  - Healthcare data face strict privacy rules in the United States and Europe
  - Real electronic health records often cannot be shared freely for external research
    or
  - Provided re-identification risk is validated, not assumed away
  notes: Healthcare data face strict privacy rules in the United States and Europe.
    Real electronic health records often cannot be shared freely for external research
    or vendor benchmarking. Synthetic medical tables can preserve cohort-level statistics
    and clinical relationships while removing direct identifiers—provided re-identification
    risk is validated, not assumed away.
