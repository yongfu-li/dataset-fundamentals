- type: bullets
  title: Finance and confidentiality
  bullets:
  - Financial institutions handle sensitive transactional data restricted by security
    and
  - Synthetic data offers an alternative for fraud modeling and strategy simulation
    without
  notes: Financial institutions handle sensitive transactional data restricted by
    security and privacy policies. Synthetic data offers an alternative for fraud
    modeling and strategy simulation without exposing customer identifiers or proprietary
    trading histories.
- type: bullets
  title: Fraud detection with synthetic patterns
  bullets:
  - 'Fraud is a rare-event problem: historical logs contain few positive examples'
  - Synthetic generators can emit diverse fraudulent sequences
  notes: 'Fraud is a rare-event problem: historical logs contain few positive examples.
    Synthetic generators can emit diverse fraudulent sequences—unusual merchant categories,
    velocity spikes, or card-not-present patterns—that expand detector training beyond
    sparse real labels.'
- type: bullets
  title: Example 10.14 — Synthetic Fraud Transaction Patterns
  bullets:
  - Example 10.14 — hands-on module
  - Example 10.14 describes a payments provider synthesizing card-not-present fraud
    sequences
  - Detectors gain positive examples absent from historical logs
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example14/`'
  notes: Example 10.14 describes a payments provider synthesizing card-not-present
    fraud sequences with unusual merchant categories and velocity spikes. Detectors
    gain positive examples absent from historical logs. The example 14 module for
    this chapter outlines synthetic fraud augmentation for model training.
- type: bullets
  title: Trading simulations
  bullets:
  - Edge conditions underrepresented in limited historical windows
  - Synthetic finance use cases still require validation against live macro regimes
    before
  notes: Beyond fraud, synthetic market data can stress investment and risk models
    with crashes, booms, and edge conditions underrepresented in limited historical
    windows. Synthetic finance use cases still require validation against live macro
    regimes before deployment decisions rely on them.
- type: bullets
  title: Takeaways
  bullets:
  - Healthcare synthesis targets privacy-preserving sharing and rare-disease coverage
  - Both domains demand regulatory awareness and fidelity checks beyond aggregate
    similarity
  - Autonomy and cybersecurity use cases follow in the next part
  notes: Healthcare synthesis targets privacy-preserving sharing and rare-disease
    coverage; finance synthesis targets confidential fraud and trading simulation.
    Both domains demand regulatory awareness and fidelity checks beyond aggregate
    similarity. Autonomy and cybersecurity use cases follow in the next part.
