title: Chapter 10 — Ethics and regulation
footer: Chapter 10 — Ethics And Regulation
slides:
- type: title
  title: Chapter 10 — Ethics and regulation
  subtitle: The chapter closes by asking when synthetic data truly protects people
    and when it creates new harms
  notes: The chapter closes by asking when synthetic data truly protects people and
    when it creates new harms. This final part covers privacy claims under GDPR, manipulated
    reporting, bias amplification, mitigation practices, and regulatory considerations
    for synthetic releases.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to evaluate privacy claims
    for synthetic corpora under GDPR and HIPAA; recognize misuse, over-reliance, and
    quality risks; explain bias amplification in generated hiring data; and list transparency,
    validation, and oversight practices before deployment.
- type: bullets
  title: Generator-specific ethical tensions
  bullets:
  - Synthetic data adds risks beyond general privacy law
  - Documentation and validation are ethical obligations, not optional metadata
  notes: 'Synthetic data adds risks beyond general privacy law: re-identification
    through memorization, bias amplification from skewed sources, deceptive realistic
    media, and accountability when models trained on simulations fail live. Documentation
    and validation are ethical obligations, not optional metadata.'
- type: bullets
  title: Privacy claims and GDPR
  bullets:
  - Organizations often treat synthetic tables as lower risk because direct identifiers
    are
  - That claim fails if generators memorize rare individuals or adversaries can link
    rows back
  - Under GDPR, whether synthetic outputs escape personal-data duties depends on residual
  notes: Organizations often treat synthetic tables as lower risk because direct identifiers
    are removed. That claim fails if generators memorize rare individuals or adversaries
    can link rows back to real people. Under GDPR, whether synthetic outputs escape
    personal-data duties depends on residual identifiability, not the label synthetic
    alone.
- type: bullets
  title: Example 10.18 — GDPR-Compliant Synthetic Patients
  bullets:
  - Example 10.18 — hands-on module
  - Example 10.18 describes a cross-border research project sharing synthetic patient
    cohorts
  - Wide sharing is justified only when unlinkability is demonstrated
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example18/`'
  notes: Example 10.18 describes a cross-border research project sharing synthetic
    patient cohorts for algorithm benchmarking while identifiable European health
    records remain inside the controller environment. Wide sharing is justified only
    when unlinkability is demonstrated. The example 18 module for this chapter frames
    GDPR-aware synthetic patient release.
- type: bullets
  title: Misuse and manipulated reporting
  bullets:
  - Poorly generated or deliberately skewed synthetic sets can mislead stakeholders
  - Leading to harmful deployment in banking or healthcare
  notes: Poorly generated or deliberately skewed synthetic sets can mislead stakeholders.
    Vendors may report strong accuracy on synthetic-only benchmarks that omit recent
    macro shocks or rare behaviors, leading to harmful deployment in banking or healthcare.
- type: bullets
  title: Example 10.19 — Manipulated Performance Reporting
  bullets:
  - Example 10.19 — hands-on module
  - Downstream banks discover failure on live portfolios
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example19/`'
  notes: Example 10.19 warns of a vendor reporting strong loan-default accuracy using
    synthetic data that omits recent macro shocks; downstream banks discover failure
    on live portfolios. The example 19 module for this chapter summarizes performance
    reporting integrity risks.
- type: bullets
  title: Over-reliance and quality concerns
  bullets:
  - Over-reliance treats synthetic corpora as complete substitutes for real-world
    evidence
  - Autonomy planners trained mostly on synthetic intersections may fail when pedestrians
  - Low-quality tabular generators can emit impossible joint values that teach spurious
    rules
  notes: Over-reliance treats synthetic corpora as complete substitutes for real-world
    evidence. Autonomy planners trained mostly on synthetic intersections may fail
    when pedestrians behave in ways absent from the generator library. Low-quality
    tabular generators can emit impossible joint values that teach spurious rules.
- type: bullets
  title: Bias amplification
  bullets:
  - Generators trained on skewed historical data can emit apparently diverse yet
  - Amplifying unfair outcomes in high-stakes decisions
  notes: Generators trained on skewed historical data can emit apparently diverse
    yet systematically biased samples. Synthetic hiring resumes from male-dominated
    source data may over-represent the same career paths the organization hoped to
    correct—amplifying unfair outcomes in high-stakes decisions.
- type: bullets
  title: Example 10.22 — Bias Amplification in Hiring Data
  bullets:
  - Example 10.22 — hands-on module
  - Example 10.22 illustrates synthetic resumes from historically male-dominated hiring
    data
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example22/`'
  notes: Example 10.22 illustrates synthetic resumes from historically male-dominated
    hiring data reinforcing the same career-path skew. The example 22 module for this
    chapter connects amplification to fairness audits on both source and synthetic
    cohorts.
- type: bullets
  title: 'Mitigation: transparency, validation, oversight'
  bullets:
  - Ethics review or automated fairness checks
  - Provenance and retention policies should support accountability when regulators
    or data
  notes: Best practices include diverse training sources, fairness constraints, disclosed
    generation methods, benchmark validation against real data, and ethics review
    or automated fairness checks. Provenance and retention policies should support
    accountability when regulators or data subjects challenge synthetic derivatives.
- type: bullets
  title: Example 10.23 — Synthetic Data Under GDPR Rights
  bullets:
  - Example 10.23 — hands-on module
  - Pushing teams to document provenance and retention
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example23/`'
  notes: Example 10.23 notes regulators asking whether individuals can challenge inferences
    trained on synthetic derivatives of personal data—pushing teams to document provenance
    and retention. The example 23 module for this chapter summarizes evolving regulatory
    scrutiny.
- type: bullets
  title: Takeaways
  bullets:
  - Synthetic data is a privacy tool only when validation shows acceptable re-identification
  - Misuse, over-reliance
  - Document generators, validate against real benchmarks
  notes: Synthetic data is a privacy tool only when validation shows acceptable re-identification
    risk. Misuse, over-reliance, and bias amplification require governance alongside
    technical metrics. Document generators, validate against real benchmarks, and
    apply fairness oversight before release—then carry those practices into advanced
    annotation and storage chapters ahead.
- type: bullets
  title: Chapter complete
  bullets:
  - This chapter positioned statistical sampling, generative adversarial networks
  - Continue to annotation and corpus-scale storage topics in subsequent chapters
  notes: This chapter positioned statistical sampling, generative adversarial networks,
    and language models as complements to real collection when data are scarce, sensitive,
    or imbalanced—provided fidelity and ethics checks pass. Continue to annotation
    and corpus-scale storage topics in subsequent chapters.
