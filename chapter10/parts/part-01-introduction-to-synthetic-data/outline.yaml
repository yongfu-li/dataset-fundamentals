  notes: Example 10.2 shows privacy-preserving medical records. A healthcare provider
    can generate synthetic patient tables that mimic real diagnostic and treatment
    patterns without exposing actual individuals. This supports research and model
    development under regulations such as HIPAA and GDPR. The example 2 module for
    this chapter frames the privacy benefit.
- type: bullets
  title: Cost efficiency and scalability
  bullets:
  - Collecting real-world data
  - Synthetic generation scales volume on demand and can fill underrepresented classes
    or edge
  - Fraud detection and rare-disease modeling are common cases where synthetic volume
    helps
  notes: Collecting real-world data—especially annotated driving footage or rare clinical
    cases—can be expensive and slow. Synthetic generation scales volume on demand
    and can fill underrepresented classes or edge scenarios that real logs rarely
    capture. Fraud detection and rare-disease modeling are common cases where synthetic
    volume helps balance training sets.
