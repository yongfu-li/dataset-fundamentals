title: Chapter 10 — Introduction to synthetic data
footer: Chapter 10 — Introduction To Synthetic Data
slides:
- type: title
  title: Chapter 10 — Introduction to synthetic data
  subtitle: Chapters 2 through 9 covered how real records are collected, labeled,
    cleaned, documented, and scaled
  notes: Chapters 2 through 9 covered how real records are collected, labeled, cleaned,
    documented, and scaled. This chapter asks when artificially generated data can
    supplement or replace scarce or sensitive observations. Synthetic data is created
    by algorithms, models, or simulations rather than direct measurement, yet it should
    preserve enough statistical structure to support analysis and model training.
- type: bullets
  title: Learning objectives
  bullets:
  - Scalability benefits that motivate synthetic generation
  notes: By the end of this part, learners should be able to define synthetic data
    and explain how it differs from directly observed records; describe cross-modal
    fidelity requirements for images versus tabular finance data; and summarize privacy,
    cost, and scalability benefits that motivate synthetic generation.
- type: bullets
  title: Definition and analytical value
  bullets:
  - Patterns, or structure of real data
  - The primary requirement is analytical value
  - Synthetic outputs may still miss some real-world noise and edge complexity
  notes: 'Synthetic data refers to artificially generated records designed to mirror
    the statistical properties, patterns, or structure of real data. The primary requirement
    is analytical value: generated rows or images should resemble the original distribution
    closely enough for training, testing, or sharing, while omitting direct identifiers.
    Synthetic outputs may still miss some real-world noise and edge complexity.'
- type: bullets
  title: Example 10.1 — Cross-Modal Fidelity in Synthetic Data
  bullets:
  - Example 10.1 — hands-on module
  - Example 10.1 contrasts fidelity across modalities
  - Trends seen in real markets
  - The same generator cannot be judged by one universal rule; fidelity is modality-specific
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example1/`'
  notes: Example 10.1 contrasts fidelity across modalities. Synthetic images should
    show realistic textures and object relationships, while synthetic financial transactions
    should preserve correlations, distributions, and trends seen in real markets.
    The same generator cannot be judged by one universal rule; fidelity is modality-specific.
    The example 1 module for this chapter summarizes these contrasts.
- type: bullets
  title: Generation methods at a glance
  bullets:
  - Simulation engines
  - Statistical approaches draw from fitted distributions or Monte Carlo models
  - Machine learning methods learn an underlying data distribution and emit new samples
    that
  - The method choice depends on modality, privacy goals, and validation capacity
  notes: Teams create synthetic data through statistical sampling, machine learning
    generators such as generative adversarial networks, and simulation engines. Statistical
    approaches draw from fitted distributions or Monte Carlo models. Machine learning
    methods learn an underlying data distribution and emit new samples that fit it.
    The method choice depends on modality, privacy goals, and validation capacity.
