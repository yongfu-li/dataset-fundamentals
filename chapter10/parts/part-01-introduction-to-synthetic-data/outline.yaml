  - Simulations can produce varied weather, lighting
  - Synthetic clips let perception and planning stacks encounter diverse conditions
    before
  - Explore the chapter example module
  - 'View files: `modules/chapter10/example3/`'
  notes: Example 10.3 illustrates synthetic autonomous-driving scenarios. Simulations
    can produce varied weather, lighting, and road layouts that are hard to log safely
    at scale in the real world. Synthetic clips let perception and planning stacks
    encounter diverse conditions before deployment. The example 3 module for this
    chapter describes this cost and coverage rationale.
- type: bullets
  title: Takeaways
  bullets:
  - Synthetic data is algorithmically generated yet must preserve analytical structure
  - Fidelity requirements differ by modality
  - Key benefits include privacy preservation, lower collection cost
  - Benefits do not remove the need for validation, which the next part addresses
  notes: Synthetic data is algorithmically generated yet must preserve analytical
    structure. Fidelity requirements differ by modality. Key benefits include privacy
    preservation, lower collection cost, and scalable coverage of rare or expensive
    scenarios. Benefits do not remove the need for validation, which the next part
    addresses.
