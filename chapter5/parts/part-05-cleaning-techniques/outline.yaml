title: Chapter 5 — Techniques for data cleaning
footer: Chapter 5 — Cleaning Techniques
slides:
- type: title
  title: Chapter 5 — Techniques for data cleaning
  subtitle: This part turns defect taxonomy into repair methods
  notes: 'This part turns defect taxonomy into repair methods: deletion and imputation
    for missing values, deduplication, format standardization, outlier handling, and
    correlation-based feature drops.'
- type: bullets
  title: Learning objectives
  bullets:
  - Compare listwise deletion with available-case analysis, choose mean, median
  - Hot-deck imputation, remove duplicates in pandas-style workflows
  - Flag outliers with IQR rules
  notes: By the end of this part, you should compare listwise deletion with available-case
    analysis, choose mean, median, and hot-deck imputation, remove duplicates in pandas-style
    workflows, and flag outliers with IQR rules.
- type: bullets
  title: Handling missing data — deletion
  bullets:
  - Listwise deletion drops any row with a missing value in selected columns
  - Available-case analysis keeps rows for each analysis using the fields present
  - Choose based on mechanism and how much data you can afford to lose
  notes: Listwise deletion drops any row with a missing value in selected columns—Example
    5.37 shows aggressive loss of sample size. Available-case analysis keeps rows
    for each analysis using the fields present—Example 5.38 preserves more data but
    complicates comparison across models. Choose based on mechanism and how much data
    you can afford to lose.
- type: bullets
  title: Imputation methods
  bullets:
  - Mean imputation, Example 5.39 for age, preserves the sample mean but shrinks variance
  - Median imputation, Example 5.41 for skewed square footage, is robust to tails
  - Hot-deck imputation
  - Document imputation inside train splits to avoid leakage
  notes: Mean imputation—Example 5.39 for age—preserves the sample mean but shrinks
    variance. Median imputation—Example 5.41 for skewed square footage—is robust to
    tails. Hot-deck imputation—Example 5.40—copies values from similar donor rows
    and preserves multivariate structure better than single-column means. Document
    imputation inside train splits to avoid leakage.
- type: bullets
  title: Example 5.39 — Mean impute missing age
  bullets:
  - Example 5.39 — hands-on module
  - The simple numeric fill
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example39/`'
  notes: Example 5.39 is the simple numeric fill. Open the example 39 module for this
    chapter to compare mean, median, and model-based imputation on the same column.
    MNAR settings may invalidate all three without extra modeling.
- type: bullets
  title: Removing duplicates
  bullets:
  - Near-duplicate customer names and repeated transaction keys should be collapsed
    with
  - Example 5.42 shows fuzzy duplicate risk
  - Use stable keys when available
  notes: Near-duplicate customer names and repeated transaction keys should be collapsed
    with explicit keep rules. Example 5.42 shows fuzzy duplicate risk. Use stable
    keys when available; otherwise combine normalized text fields and timestamps before
    drop_duplicates.
- type: bullets
  title: Standardizing formats
  bullets:
  - Example 5.43 normalizes currency symbols across markets before modeling
  - Date parsing, lowercasing product names
  - Record parsing rules in preprocessing metadata
  notes: Example 5.43 normalizes currency symbols across markets before modeling.
    Date parsing, lowercasing product names, and canonical unit conversion belong
    here—not in the model trainer. Record parsing rules in preprocessing metadata.
- type: bullets
  title: Outliers and feature selection
  bullets:
  - Example 5.44 flags extreme income with the interquartile range
  - Winsorization caps tails instead of deleting rows
  - Example 5.45 drops one of two highly correlated bathroom features to reduce redundancy
  - Pair outlier rules with domain review
  notes: Example 5.44 flags extreme income with the interquartile range. Winsorization
    caps tails instead of deleting rows. Example 5.45 drops one of two highly correlated
    bathroom features to reduce redundancy. Pair outlier rules with domain review.
- type: bullets
  title: Takeaways
  bullets:
  - Match the repair to the defect and mechanism
  - Deletion is simple but costly; imputation carries bias risk
  - Standardization enables joins; IQR and correlation pruning stabilize training
  notes: Match the repair to the defect and mechanism. Deletion is simple but costly;
    imputation carries bias risk. Standardization enables joins; IQR and correlation
    pruning stabilize training.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to preprocessing, scaling and encoding cleaned columns
  notes: Pause for the quiz, then continue to preprocessing—scaling and encoding cleaned
    columns.
