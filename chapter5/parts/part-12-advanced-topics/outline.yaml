title: Chapter 5 — Advanced topics
footer: Chapter 5 — 12 Advanced Topics
slides:
- type: title
  title: Chapter 5 — Advanced topics
  subtitle: Batch CSV cleaning is the baseline
  notes: Batch CSV cleaning is the baseline; production systems add streaming velocity,
    automated synthesis, and explainability requirements. This final part previews
    advanced imputation, real-time preprocessing, pipelines at scale, and cleaning
    for interpretable models.
- type: bullets
  title: Learning objectives
  bullets:
  - Contrast Bayesian and deep imputation, describe sliding-window streaming preprocessing
  - Explain how documentation supports explainable AI
  notes: By the end of this part, you should contrast Bayesian and deep imputation,
    describe sliding-window streaming preprocessing, and explain how documentation
    supports explainable AI.
- type: bullets
  title: Advanced imputation
  bullets:
  - Bayesian imputation models missing values with uncertainty
  - Autoencoder imputation, Example 5.71, learns nonlinear reconstructions for retail
    baskets
  - Both beat naive means when patterns are complex but need more data and compute
  notes: Bayesian imputation models missing values with uncertainty—Example 5.70 combines
    vitals and clinical priors for blood pressure gaps. Autoencoder imputation—Example
    5.71—learns nonlinear reconstructions for retail baskets. Both beat naive means
    when patterns are complex but need more data and compute.
- type: bullets
  title: Example 5.70 — Bayesian imputation with clinical priors
  bullets:
  - Example 5.70 — hands-on module
  - The uncertainty-aware clinical case
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example70/`'
  notes: Example 5.70 is the uncertainty-aware clinical case. Open the example 70
    module for this chapter to see why intervals matter for regulated decisions. Deep
    methods require guardrails against overfitting sparse tables.
- type: bullets
  title: Real-time and streaming preprocessing
  bullets:
  - Streaming finance, IoT, and vitals demand low-latency transforms
  - Challenges include latency, arriving corruption, and scale
  - Sliding windows, Example 5.72 on prices
  - Batch assumptions fail when data never stops
  notes: Streaming finance, IoT, and vitals demand low-latency transforms. Challenges
    include latency, arriving corruption, and scale. Sliding windows—Example 5.72
    on prices—and online scalers update statistics on recent data only. Batch assumptions
    fail when data never stops.
- type: bullets
  title: Example 5.72 — Rolling window for streaming prices
  bullets:
  - Example 5.72 — hands-on module
  - Example 5.72 maintains a rolling feature window for aggregates
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example72/`'
  notes: Example 5.72 maintains a rolling feature window for aggregates. Try the example
    72 module to contrast batch and streaming normalization. Real-time vital sign
    preprocessing appears in Example 5.73 with similar constraints.
- type: bullets
  title: Automated pipelines and explainability
  bullets:
  - Automated pipelines orchestrate cleaning stages across storage systems
  - For explainable AI
  notes: Automated pipelines orchestrate cleaning stages across storage systems. For
    explainable AI, document imputation and encoding so auditors can trace inputs—Examples
    5.75 and 5.76 prefer interpretable credit features and fair clinical encodings
    over opaque high-dimensional expansions.
- type: bullets
  title: Example 5.75 — Document imputation for auditable models
  bullets:
  - Example 5.75 — hands-on module
  - Example 5.75 ties preprocessing logs to model cards
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example75/`'
  notes: Example 5.75 ties preprocessing logs to model cards. Open the example 75
    module for this chapter to review metadata fields regulators expect. Cleaning
    choices are part of the model story, not a hidden notebook.
- type: bullets
  title: Looking ahead
  bullets:
  - Chapter 6 continues with exploration that detects many defects this chapter repairs
  - Chapter 7 connects preprocessing to fairness
  - Strong cleaning documentation makes both downstream chapters more trustworthy
  notes: Chapter 6 continues with exploration that detects many defects this chapter
    repairs. Chapter 7 connects preprocessing to fairness. Strong cleaning documentation
    makes both downstream chapters more trustworthy.
- type: bullets
  title: Takeaways
  bullets:
  - Advanced methods extend, not replace, core taxonomy and tools
  - Streaming and explainability impose new constraints on familiar transforms
  - Document every stage for production and audit
  notes: Advanced methods extend—not replace—core taxonomy and tools. Streaming and
    explainability impose new constraints on familiar transforms. Document every stage
    for production and audit.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Pause for the quiz
  notes: Pause for the quiz. You have completed the Chapter 5 learning path—return
    to the chapter landing page for the full deck or browse module examples.
