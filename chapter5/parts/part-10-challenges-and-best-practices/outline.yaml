title: Chapter 5 — Challenges and best practices
footer: Chapter 5 — Challenges And Best Practices
slides:
- type: title
  title: Chapter 5 — Challenges and best practices
  subtitle: Cleaning is tedious because defects interact and fixes can introduce bias
  notes: Cleaning is tedious because defects interact and fixes can introduce bias.
    This part names recurring obstacles and summarizes practices that keep preprocessing
    auditable and reproducible.
- type: bullets
  title: Learning objectives
  bullets:
  - Explain why accuracy misleads on imbalanced data, describe currency and unit mixing
    risks
  - List documentation, validation
  - Version-control habits
  notes: By the end of this part, you should explain why accuracy misleads on imbalanced
    data, describe currency and unit mixing risks, and list documentation, validation,
    and version-control habits.
- type: bullets
  title: Recurring challenges
  bullets:
  - Missing data mechanisms complicate imputation choices
  - Inconsistent cross-source formats consume analyst time
  - Outliers mix errors with rare truth
  - Imbalance steers models toward majority classes
  - Duplicates inflate counts
  - Transformations can leak target information if fit globally
  notes: Missing data mechanisms complicate imputation choices. Inconsistent cross-source
    formats consume analyst time. Outliers mix errors with rare truth. Imbalance steers
    models toward majority classes. Duplicates inflate counts. Transformations can
    leak target information if fit globally.
- type: bullets
  title: Example 5.62 — Rare fraud class distorts accuracy
  bullets:
  - Example 5.62 — hands-on module
  - Example 5.62 shows fraud at a tiny fraction of events
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example62/`'
  notes: Example 5.62 shows fraud at a tiny fraction of events—a majority-class classifier
    looks accurate while detecting almost no fraud. Open the example 62 module for
    this chapter to practice precision-recall thinking before choosing metrics.
- type: bullets
  title: Example 5.63 — Convert currencies before modeling
  bullets:
  - Example 5.63 — hands-on module
  - Example 5.63 reminds teams to harmonize currencies and units before comparing
    amounts
  - Mixed units silently rank features by exchange noise instead of behavior
  - Standardize early and record conversion tables
  - 'View files: `modules/chapter5/example63/`'
  notes: Example 5.63 reminds teams to harmonize currencies and units before comparing
    amounts across markets. Mixed units silently rank features by exchange noise instead
    of behavior. Standardize early and record conversion tables.
- type: bullets
  title: Best practices overview
  bullets:
  - Handle missing data with explicit mechanism assumptions
  - Profile data before and after each step
  - Document parsing rules, imputation choices, and outlier policies
  - Separate train, validation, and test before fitting transformers
  - Use version control for datasets and preprocessing code
  - Review features for leakage and fairness implications connected to Chapter 7
  notes: Handle missing data with explicit mechanism assumptions. Profile data before
    and after each step. Document parsing rules, imputation choices, and outlier policies.
    Separate train, validation, and test before fitting transformers. Use version
    control for datasets and preprocessing code. Review features for leakage and fairness
    implications connected to Chapter 7.
- type: bullets
  title: Validation and reproducibility
  bullets:
  - Fit scalers, encoders, and imputers inside training folds
  - Store random seeds and library versions
  - Write preprocessing metadata alongside exported tables so another team can replay
    the
  notes: Fit scalers, encoders, and imputers inside training folds. Store random seeds
    and library versions. Write preprocessing metadata alongside exported tables so
    another team can replay the pipeline months later.
- type: bullets
  title: Takeaways
  bullets:
  - Challenges are expected, plan time for them
  - Metrics must match the defect, especially under imbalance
  - Documentation and leakage control are part of cleaning, not optional extras
  notes: Challenges are expected—plan time for them. Metrics must match the defect,
    especially under imbalance. Documentation and leakage control are part of cleaning,
    not optional extras.
