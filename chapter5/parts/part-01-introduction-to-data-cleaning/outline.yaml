    should not reach the feature matrix.
- type: bullets
  title: Cleaning versus preprocessing
  bullets:
  - This book treats cleaning and preprocessing as consecutive phases
  - Non-model fields
  - Preprocessing transforms cleaned values into representations algorithms expect
  notes: 'This book treats cleaning and preprocessing as consecutive phases. Cleaning
    finds and corrects errors so values are reliable—missing values, duplicates, inconsistent
    formats, erroneous outliers, and non-model fields. Preprocessing transforms cleaned
    values into representations algorithms expect: scaling, encoding, binning, and
    feature construction.'
