  - Counting both rows inflates revenue and customer frequency until duplicates are
    removed or
  - Cleaning precedes the scaling and encoding examples introduced later in the chapter
  - 'View files: `modules/chapter5/example3/`'
  notes: Example 5.3 shows the same order ID appearing twice after a system retry.
    Counting both rows inflates revenue and customer frequency until duplicates are
    removed or merged. Cleaning precedes the scaling and encoding examples introduced
    later in the chapter.
- type: bullets
  title: Four recurring motives
  bullets:
  - Four motives recur
  - Detailed failure modes appear in the next parts; remedies follow in Sections 5.3
    and 5.4
  notes: 'Four motives recur: accuracy on held-out data, comparable feature scales,
    computational efficiency, and trustworthy decisions when multiple sources are
    joined. Detailed failure modes appear in the next parts; remedies follow in Sections
    5.3 and 5.4.'
- type: bullets
  title: Takeaways
  bullets:
  - Cleaning makes values trustworthy; preprocessing makes them algorithm-ready
  - Both follow annotation and precede exploration-heavy modeling work
  - Schema alignment across sources is itself a cleaning task
  notes: Cleaning makes values trustworthy; preprocessing makes them algorithm-ready.
    Both follow annotation and precede exploration-heavy modeling work. Schema alignment
    across sources is itself a cleaning task.
