title: Chapter 5 — Outliers, irrelevant features, and imbalance
footer: Chapter 5 — Outliers Irrelevant And Imbalance
slides:
- type: title
  title: Chapter 5 — Outliers, irrelevant features, and imbalance
  subtitle: Not every extreme value is an error, and not every column belongs in the
    model
  notes: Not every extreme value is an error, and not every column belongs in the
    model. This part separates recording mistakes from valid tails, drops noise features,
    and introduces class imbalance as a preprocessing concern.
- type: bullets
  title: Learning objectives
  bullets:
  - Distinguish erroneous outliers from legitimate extremes
  - Describe why rare classes break accuracy metrics
  notes: By the end of this part, you should distinguish erroneous outliers from legitimate
    extremes, explain why irrelevant columns hurt interpretability and training, and
    describe why rare classes break accuracy metrics.
- type: bullets
  title: Outliers — definition and causes
  bullets:
  - Outliers deviate sharply from the bulk of a distribution
  - Causes include typos, sensor faults, and genuine rare events
  - Example 5.22 shows an extra zero in blood pressure
  - Treatment depends on which case you face
  notes: Outliers deviate sharply from the bulk of a distribution. Causes include
    typos, sensor faults, and genuine rare events. Example 5.22 shows an extra zero
    in blood pressure; Example 5.24 shows a faulty IoT spike; Example 5.23 shows a
    valid extreme income observation. Treatment depends on which case you face.
- type: bullets
  title: Handling outliers
  bullets:
  - Replacing spikes with robust statistics such as the median
  - Examples 5.25 through 5.28 illustrate drop, log, cap, and median-replace patterns
  - Blind removal of all extremes can delete signal
  notes: Responses include dropping clear typos, winsorizing or capping tails, log
    transforms to compress skew, and replacing spikes with robust statistics such
    as the median. Examples 5.25 through 5.28 illustrate drop, log, cap, and median-replace
    patterns. Blind removal of all extremes can delete signal.
- type: bullets
  title: Example 5.22 — Extra zero in blood pressure
  bullets:
  - Example 5.22 — hands-on module
  - A classic entry error
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example22/`'
  notes: Example 5.22 is a classic entry error. Open the example 22 module for this
    chapter to compare typo outliers with legitimate clinical extremes. Document the
    rule applied so evaluation remains reproducible.
- type: bullets
  title: Irrelevant features
  bullets:
  - Irrelevant columns add noise without predictive value
  - Example 5.29 lists color or pet features unrelated to a loan default target
  - Example 5.30 notes harder interpretation
  - Correlation and domain review help prune fields
  notes: Irrelevant columns add noise without predictive value. Example 5.29 lists
    color or pet features unrelated to a loan default target. Example 5.30 notes harder
    interpretation; Example 5.31 shows models fitting noise; Example 5.32 shows slower
    tree training. Correlation and domain review help prune fields.
- type: bullets
  title: Example 5.29 — Irrelevant color and pet features
  bullets:
  - Example 5.29 — hands-on module
  - Example 5.29 motivates feature selection before modeling
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example29/`'
  notes: Example 5.29 motivates feature selection before modeling. Try the example
    29 module to see columns that should be dropped or deferred to another task. Identifier
    columns often belong here unless explicitly engineered.
- type: bullets
  title: Imbalanced data
  bullets:
  - Imbalance means one class dominates, Example 5.33 shows fraud at one percent of
    events
  - Majority-class classifiers can report high accuracy while missing almost every
    fraud case
  - Responses include oversampling, class weights
  notes: Imbalance means one class dominates—Example 5.33 shows fraud at one percent
    of events. Majority-class classifiers can report high accuracy while missing almost
    every fraud case. Responses include oversampling, class weights, and synthesis
    methods such as SMOTE introduced later in the chapter.
- type: bullets
  title: Takeaways
  bullets:
  - Outlier handling requires domain judgment
  - Irrelevant features waste compute and invite overfitting
  - Imbalance makes accuracy misleading, plan metrics and resampling before training
  notes: Outlier handling requires domain judgment. Irrelevant features waste compute
    and invite overfitting. Imbalance makes accuracy misleading—plan metrics and resampling
    before training.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to cleaning techniques, imputation, deduplication, standardization
  notes: Pause for the quiz, then continue to cleaning techniques—imputation, deduplication,
    standardization, and outlier flags.
