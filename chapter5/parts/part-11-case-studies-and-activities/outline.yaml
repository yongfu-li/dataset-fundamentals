- type: bullets
  title: 'Retail: customer segmentation'
  bullets:
  - An e-commerce firm segments customers by purchase behavior
  - Challenges include missing age and frequency fields, inconsistent product capitalization
  - 'Solutions: median or mode imputation, currency harmonization, text normalization'
  - Cleaned data supports clustering and targeted campaigns
  notes: 'An e-commerce firm segments customers by purchase behavior. Challenges include
    missing age and frequency fields, inconsistent product capitalization, and mixed
    currencies. Solutions: median or mode imputation, currency harmonization, text
    normalization, and scaling of amount and frequency features. Cleaned data supports
    clustering and targeted campaigns.'
- type: bullets
  title: 'Healthcare: predicting disease outcomes'
  bullets:
  - Clinical records combine age, history, labs, and outcomes
  - Missing labs, outlier vitals, and inconsistent smoker labels are common
  - 'Solutions: principled imputation, categorical standardization, IQR outlier review'
  - Preprocessing improves allocative and diagnostic workflows when documented
  notes: 'Clinical records combine age, history, labs, and outcomes. Missing labs,
    outlier vitals, and inconsistent smoker labels are common. Solutions: principled
    imputation, categorical standardization, IQR outlier review, and numeric scaling
    before supervised models. Preprocessing improves allocative and diagnostic workflows
    when documented.'
