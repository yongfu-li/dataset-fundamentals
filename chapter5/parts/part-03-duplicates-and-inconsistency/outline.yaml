title: Chapter 5 — Duplicates and inconsistency
footer: Chapter 5 — Duplicates And Inconsistency
slides:
- type: title
  title: Chapter 5 — Duplicates and inconsistency
  subtitle: Duplicate rows and inconsistent encodings silently distort counts, joins,
    and models
  notes: Duplicate rows and inconsistent encodings silently distort counts, joins,
    and models. This part shows how retries inflate metrics, mixed formats break timelines,
    and split category labels fragment analysis.
- type: bullets
  title: Learning objectives
  bullets:
  - Explain duplicate impact on aggregates and training
  - Describe how free-text categories hide structure
  notes: By the end of this part, you should explain duplicate impact on aggregates
    and training, recognize inconsistent date and ID formats, and describe how free-text
    categories hide structure.
- type: bullets
  title: Duplicate data — causes and impact
  bullets:
  - Duplicates arise from system retries, merged exports, copy-paste ETL
  - Example 5.14 shows duplicate purchase rows
  - Deduplication is not cosmetic, it changes business numbers
  notes: Duplicates arise from system retries, merged exports, copy-paste ETL, and
    near-duplicate customer names. Example 5.14 shows duplicate purchase rows; Example
    5.15 double-counts revenue; Example 5.16 lets models overweight repeated rows;
    Example 5.17 slows training on bloated tables. Deduplication is not cosmetic—it
    changes business numbers.
- type: bullets
  title: Example 5.14 — Duplicate customer purchase rows
  bullets:
  - Example 5.14 — hands-on module
  - The retail retry pattern
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example14/`'
  notes: Example 5.14 is the retail retry pattern. Open the example 14 module for
    this chapter to practice identifying duplicate keys before aggregation. Decide
    whether to keep first, last, or merged records based on business rules.
- type: bullets
  title: Inconsistent data — formats and units
  bullets:
  - Inconsistent data is common when sources span departments or time periods
  - Example 5.18 mixes date formats, gender encodings, and measurement units in one
    table
  - Example 5.19 shows customer ID formats that block joins
  - Example 5.20 splits Male versus M into separate categories
  - Example 5.21 shows weeks lost normalizing free-text cities
  notes: Inconsistent data is common when sources span departments or time periods.
    Example 5.18 mixes date formats, gender encodings, and measurement units in one
    table. Example 5.19 shows customer ID formats that block joins. Example 5.20 splits
    Male versus M into separate categories. Example 5.21 shows weeks lost normalizing
    free-text cities.
- type: bullets
  title: Example 5.18 — Mixed dates, gender, and units
  bullets:
  - Example 5.18 — hands-on module
  - A checklist of silent parse failures
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example18/`'
  notes: Example 5.18 is a checklist of silent parse failures. Try the example 18
    module to see how inconsistent encodings produce nulls or wrong aggregates after
    conversion. Standardization belongs in the cleaning phase before encoding.
- type: bullets
  title: Join and aggregation failures
  bullets:
  - Inconsistent keys prevent reliable joins across tables
  - Mixed currencies or units make sums meaningless until converted
  - Split labels inflate cardinality and starve rare categories of support
  - Exploration in Chapter 6 surfaces many of these patterns
  notes: Inconsistent keys prevent reliable joins across tables. Mixed currencies
    or units make sums meaningless until converted. Split labels inflate cardinality
    and starve rare categories of support. Exploration in Chapter 6 surfaces many
    of these patterns; repair methods appear in the cleaning-techniques part.
- type: bullets
  title: Takeaways
  bullets:
  - Duplicates change revenue, sample weights, and runtime
  - Inconsistency breaks time logic and joins
  - Standardize formats early with explicit parsing rules and canonical category maps
  notes: Duplicates change revenue, sample weights, and runtime. Inconsistency breaks
    time logic and joins. Standardize formats early with explicit parsing rules and
    canonical category maps.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to outliers, irrelevant features, and class imbalance
  notes: Pause for the quiz, then continue to outliers, irrelevant features, and class
    imbalance.
