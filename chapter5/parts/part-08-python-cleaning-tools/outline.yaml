- type: bullets
  title: Example 5.59 — Pandas end-to-end cleaning walkthrough
  bullets:
  - Example 5.59 — hands-on module
  - Example 5.59 ties issues to fixes in one narrative
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example59/`'
  notes: Example 5.59 ties issues to fixes in one narrative. Try the example 59 module
    to follow parse, dedupe, impute, encode, and scale in order. NumPy underpins vectorized
    numeric operations across both libraries.
- type: code
  title: Example 5.59 — listing
  code: 'import pandas as pd


    # Load data

    df = pd.read_csv("customers.csv")


    # 1. Handling Missing Data

    df[''age''] = df[''age''].fillna(df[''age''].mean())

    df = df.dropna(subset=[''name'', ''email''])


    # 2. Removing Duplicates

    df = df.drop_duplicates(subset=[''email''])


    # 3. Standardizing Column Formats

    df[''name''] = df[''name''].str.title()


    # 4. Encoding Categorical Data

    df[''gender''] = df[''gender''].map({''Male'': 1, ''Female'': 0})


    # 5. Saving the Cleaned Data

    df.to_csv("cleaned_customers.csv", index=False)'
