title: Chapter 5 — Scaling and encoding
footer: Chapter 5 — Preprocessing Scaling And Encoding
slides:
- type: title
  title: Chapter 5 — Scaling and encoding
  subtitle: Cleaned columns still may sit on incomparable scales or arrive as raw
    text categories
  notes: Cleaned columns still may sit on incomparable scales or arrive as raw text
    categories. This part covers normalization and standardization, then one-hot,
    label, and target encoding—with when each fits.
- type: bullets
  title: Learning objectives
  bullets:
  - Choose between min-max scaling and standardization
  - State leakage risks for target encoding
  notes: By the end of this part, you should choose between min-max scaling and standardization,
    encode nominal versus ordinal categories appropriately, and state leakage risks
    for target encoding.
- type: bullets
  title: Normalization and scaling
  bullets:
  - Min-max normalization maps values to a bounded range such as zero to one
  - Standardization subtracts the mean and divides by standard deviation
  - Tree models often need less scaling but still benefit from consistent units
  notes: Min-max normalization maps values to a bounded range such as zero to one—useful
    for neural nets and distance models when bounds matter. Standardization subtracts
    the mean and divides by standard deviation—Example 5.46 scales age and income
    for k-nearest neighbors so income does not dominate distance. Tree models often
    need less scaling but still benefit from consistent units.
- type: bullets
  title: Example 5.46 — Scale age and income for KNN
  bullets:
  - Example 5.46 — hands-on module
  - Example 5.46 revisits the scale mismatch motif from Section 5.1
  - Explore the chapter example module
  - 'View files: `modules/chapter5/example46/`'
  notes: Example 5.46 revisits the scale mismatch motif from Section 5.1. Open the
    example 46 module for this chapter to compare raw and scaled neighbor votes. Fit
    scalers on training data only, then transform validation and test sets.
- type: bullets
  title: One-hot encoding
  bullets:
  - One-hot encoding creates a binary column per category level
  - Use for nominal categories without intrinsic order
  - High-cardinality fields may need hashing, embedding, or target encoding instead
  notes: One-hot encoding creates a binary column per category level—Example 5.47
    for color and Example 5.50 for gender in churn models. Use for nominal categories
    without intrinsic order. High-cardinality fields may need hashing, embedding,
    or target encoding instead.
- type: bullets
  title: Label encoding
  bullets:
  - Label encoding assigns integers to categories
  - Do not use arbitrary integer codes for nominal data with unordered labels
  notes: Label encoding assigns integers to categories—Example 5.48 for ordinal size
    levels where order matters. Do not use arbitrary integer codes for nominal data
    with unordered labels; trees may treat 2 as twice 1 incorrectly in linear models.
- type: bullets
  title: Target encoding
  bullets:
  - Target encoding replaces a category with the mean outcome for that category
  - Powerful but leak-prone
  - Never encode using the full dataset before splitting
  notes: 'Target encoding replaces a category with the mean outcome for that category—Example
    5.49 for city mean price. Powerful but leak-prone: compute statistics inside cross-validation
    folds or use regularized encoders. Never encode using the full dataset before
    splitting.'
- type: bullets
  title: Takeaways
  bullets:
  - Scale when magnitude drives the algorithm
  - Match encoding to cardinality and ordinality
  - Guard target statistics against leakage
  notes: Scale when magnitude drives the algorithm. Match encoding to cardinality
    and ordinality. Guard target statistics against leakage.
- type: bullets
  title: Next
  bullets:
