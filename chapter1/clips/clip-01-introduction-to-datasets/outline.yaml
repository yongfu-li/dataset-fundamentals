- type: bullets
  title: Takeaways
  bullets:
  - A dataset is prepared for a purpose
  - Records and attributes are the shared vocabulary
  - Formats and modalities vary widely, but the goal of interpretable, usable data
    does not
  notes: Remember three points. A dataset is prepared for a purpose. Records and attributes
    are the shared vocabulary. Formats and modalities vary widely, but the goal of
    interpretable, usable data does not.
