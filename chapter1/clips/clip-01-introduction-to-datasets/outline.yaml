title: Chapter 1 — Introduction to datasets
footer: Chapter 1 — 01 Introduction To Datasets
slides:
- type: title
  title: Chapter 1 — Introduction to datasets
  subtitle: 'This clip opens Chapter 1 by answering a deceptively simple question:
    what counts as a dataset?'
  notes: 'This clip opens Chapter 1 by answering a deceptively simple question: what
    counts as a dataset? By the end, the vocabulary of records and attributes should
    feel concrete, whether the file is a spreadsheet or a JSON document.'
- type: bullets
  title: Learning objectives
  bullets:
  - Define a dataset as curated for analysis, not raw event streams
  - Distinguish records from attributes (shared vocabulary)
  - Same idea in CSV tables and nested JSON
  notes: Three goals guide this clip. First, define a dataset as something curated
    for analysis, not merely a raw stream of events. Second, separate records from
    attributes so every later example has a shared language. Third, see that the same
    idea appears in both flat CSV tables and nested JSON.
- type: bullets
  title: What is a dataset?
  bullets:
  - A dataset is a curated collection of data
  - Has scope, structure, and documentation
  - The dataset is the basic unit for ML, statistics, and BI
  notes: A dataset is a curated collection of data, often organized as records and
    attributes, that serves as input to analysis, modeling, or decision-making. Unlike
    raw operational logs, a dataset usually has defined scope, structure, and ideally
    documentation that makes it interpretable. In modern data work, the dataset is
    the basic unit—whether the task is machine learning, statistics, or business intelligence.
- type: bullets
  title: Records and attributes
  bullets:
  - Each record is one observation; each attribute describes it
  - The sales CSV uses Date, Product, Quantity, and Price as attributes
  - The same mapping appears in healthcare and sensor examples later in the section
  notes: 'In tabular data, each record is one observation—one sale, one patient, one
    sensor reading—and each attribute describes a property of that observation. The
    sales CSV uses Date, Product, Quantity, and Price as attributes; each row is one
    transaction. The same mapping appears in healthcare and sensor examples later
    in the section: change the domain, keep the structure.'
- type: bullets
  title: Example 1.1 — Sample CSV sales data
  bullets:
  - Example 1.1 — hands-on module
  - 'First concrete anchor: a small CSV of retail sales'
  - Each row is one sale; columns detail product, date, quantity, and price
  - Explore the chapter example module
  - 'View files: `modules/chapter1/example1/`'
  notes: 'Example 1.1 is the chapter''s first concrete anchor: a small CSV of retail
    sales. Each row is one sale; columns detail product, date, quantity, and price.
    Open the example 1 module for this chapter to inspect the file and count rows
    and columns before moving on. Later examples change domain but keep this shape.'
