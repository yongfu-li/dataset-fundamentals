- type: bullets
  title: Example 1.4 — Housing prices in JSON
  bullets:
  - Example 1.4 — hands-on module
  - Example 1.4 JSON listings with nested fields (flexible schema)
  - 'The form changes; the objective stays the same: meaningful, analyzable data'
  - Explore the chapter example module
  - 'View files: `modules/chapter1/example4/`'
  notes: 'Datasets are not only tables. Example 1.4 stores housing listings as JSON
    with nested fields—still records with attributes, but in a flexible schema. The
    form changes; the objective stays the same: provide meaningful data that can be
    turned into insight. Try the example 4 module to see how keys and nested objects
    play the role of columns.'
