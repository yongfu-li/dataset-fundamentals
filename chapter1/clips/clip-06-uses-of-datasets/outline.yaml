- type: title
  title: Chapter 1 — Uses of datasets
  subtitle: Earlier clips answered what a dataset is and how to read one responsibly
  notes: Earlier clips answered what a dataset is and how to read one responsibly.
    This clip asks where datasets create value in practice, then walks a complete
    churn workflow.
- type: bullets
  title: Learning objectives
  bullets:
  - Map sectors to typical datasets and goals, recognize the shared lifecycle across
    domains
  - Outline the steps in the customer-churn case study
  notes: You should map sectors to typical datasets and goals, recognize the shared
    lifecycle across domains, and outline the steps in the customer-churn case study.
- type: bullets
  title: Applications across sectors
  bullets:
  - Use them to monitor performance, detect risk, or personalize services
  - Retail emphasizes purchase and clickstream data
  notes: Organizations collect records about customers, patients, students, or transactions,
    organize them, and use them to monitor performance, detect risk, or personalize
    services. Retail emphasizes purchase and clickstream data; healthcare joins EHRs
    with wearables; finance scores transactions; education and government use logs
    and public statistics for intervention and planning.
