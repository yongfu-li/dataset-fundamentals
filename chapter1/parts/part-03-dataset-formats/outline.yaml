title: Chapter 1 — Dataset formats
footer: Chapter 1 — Dataset Formats
slides:
- type: title
  title: Chapter 1 — Dataset formats
  subtitle: Structure tells you how records are organized; format tells you how they
    are stored
  notes: Structure tells you how records are organized; format tells you how they
    are stored. This part connects common on-disk formats to the types from the previous
    part.
- type: bullets
  title: Learning objectives
  bullets:
  - Leave able to name formats for tabular, hierarchical
  - Geospatial data, explain when CSV, SQL, HDF5, or GeoJSON fits
  - Connect format choice to the tools that will consume the data
  notes: You should leave able to name formats for tabular, hierarchical, and geospatial
    data, explain when CSV, SQL, HDF5, or GeoJSON fits, and connect format choice
    to the tools that will consume the data.
- type: bullets
  title: Why format matters
  bullets:
  - Format is the serialization of structure
  - Matching format to structure, expected volume
  - A mismatch, for example, forcing huge arrays through naive CSV, creates avoidable
    cost
  notes: Format is the serialization of structure. Matching format to structure, expected
    volume, and downstream tools reduces friction across collection and analysis.
    A mismatch—for example, forcing huge arrays through naive CSV—creates avoidable
    cost.
- type: bullets
  title: Common formats at a glance
  bullets:
  - CSV remains the common language for simple tables
  - SQL tables add typed schemas and efficient queries
  - JSON and GeoJSON handle nested objects and spatial features
  - HDF5 targets large scientific or array-oriented datasets
  - Each aligns with a structural niche
  notes: CSV remains the common language for simple tables. SQL tables add typed schemas
    and efficient queries. JSON and GeoJSON handle nested objects and spatial features.
    HDF5 targets large scientific or array-oriented datasets. Each aligns with a structural
    niche.
- type: bullets
  title: Example 1.8 — SQL format
  bullets:
  - Example 1.8 — hands-on module
  - Example 1.8 shows structured data in a relational form
  - When attributes are stable and analysts need aggregations
  - Explore the chapter example module
  - 'View files: `modules/chapter1/example8/`'
  notes: 'Example 1.8 shows structured data in a relational form: typed columns and
    queries for filtering and joins. When attributes are stable and analysts need
    aggregations, SQL, or an equivalent relational store, is a natural fit. The example
    8 module lets you explore this hands-on.'
- type: code
  title: Example 1.8 — listing
  code: "]\nCREATE TABLE Customers (\n    customer_id SERIAL PRIMARY KEY,\n    name\
    \ VARCHAR(100) NOT NULL,\n    email VARCHAR(100) UNIQUE NOT NULL\n);\n\nCREATE\
    \ TABLE Orders (\n    order_id SERIAL PRIMARY KEY,\n    customer_id INT NOT NULL,\n\
    \    order_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n    total_amount DECIMAL(10,2),\n\
    \    FOREIGN KEY (customer_id) REFERENCES Customers(customer_id)\n);\n\nCREATE\
    \ TABLE Order_Items (\n    order_item_id SERIAL PRIMARY KEY,\n    order_id INT\
    \ NOT NULL,\n    product_id INT NOT NULL,\n    quantity INT NOT NULL CHECK (quantity\
    \ > 0),\n    FOREIGN KEY (order_id) REFERENCES Orders(order_id)\n);"
- type: bullets
  title: Example 1.9 — HDF5
  bullets:
  - Example 1.9 — hands-on module
  - Example 1.9 creates and reads an HDF5 file
  - Scientific and machine-learning pipelines often prefer HDF5 when CSV becomes too
    slow or
  - Explore the chapter example module
  - 'View files: `modules/chapter1/example9/`'
  notes: Example 1.9 creates and reads an HDF5 file—a hierarchical binary format efficient
    for large numeric arrays. Scientific and machine-learning pipelines often prefer
    HDF5 when CSV becomes too slow or too large. Try the example 9 module to create
    and read one yourself.
- type: code
  title: Example 1.9 — listing
  code: "import h5py\nimport numpy as np\n\nwith h5py.File(\"example.h5\", \"w\")\
    \ as hdf:\n    data = np.random.rand(100, 100)\n    hdf.create_dataset(\"random_data\"\
    , data=data)\n    group = hdf.create_group(\"experiment\")\n    group.create_dataset(\"\
    temperature\", data=np.linspace(0, 100, 100))\n    group.create_dataset(\"pressure\"\
    , data=np.linspace(1, 10, 100))\n\nwith h5py.File(\"example.h5\", \"r\") as hdf:\n\
    \    print(\"Datasets in root:\", list(hdf.keys()))\n    random_data = hdf[\"\
    random_data\"][:]\n    print(\"Shape of 'random_data':\", random_data.shape)"
- type: bullets
  title: Choosing a format
  bullets:
  - Start from structure, then consider size, update rate, and tooling
  - Prefer formats your team already supports
  - Metadata and documentation, covered next, make that choice durable
  notes: Start from structure, then consider size, update rate, and tooling. Prefer
    formats your team already supports, and document the choice so later consumers
    are not guessing. Metadata and documentation—covered next—make that choice durable.
- type: bullets
  title: Takeaways
  bullets:
  - Format serializes structure
  - Everyday tables lean on CSV and SQL
  notes: Format serializes structure. Everyday tables lean on CSV and SQL; specialized
    shapes and scales use HDF5, GeoJSON, and related formats.
