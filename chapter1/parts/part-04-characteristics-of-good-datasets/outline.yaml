  - Explore the chapter example module
  - 'View files: `modules/chapter1/example11/`'
  notes: Example 1.11 shows a ledger where one transaction likely contains an extra
    zero. That single accuracy error changes monthly revenue by an order of magnitude
    and can distort averages and forecasts. Inspect the example 11 module and try
    to spot the suspicious amount.
- type: code
  title: Example 1.11 — listing
  code: 'Txn_ID,Date,Account,Amount,Type

    T001,2024-03-01,Revenue,1500.00,Credit

    T002,2024-03-02,Revenue,15000.00,Credit

    T003,2024-03-03,Refund,50.00,Debit'
- type: bullets
  title: Completeness and consistency
  bullets:
  - Completeness failures
  - Consistency failures
  - Later chapters develop systematic repair; here the goal is recognition
  notes: Completeness failures—blank diagnosis or age cells—force models to guess
    or drop rows and can bias estimates when missingness is not random. Consistency
    failures—mixed regional date formats—break sorting until one convention is enforced.
    Later chapters develop systematic repair; here the goal is recognition.
- type: bullets
  title: Metadata and documentation
  bullets:
  - Metadata records schema, units, provenance, and related context
  - Example 1.14 illustrates metadata for a weather dataset
  - Without these, even accurate tables become hard to trust outside the original
    team
  - The example 14 module shows what good metadata looks like in practice
  notes: Metadata records schema, units, provenance, and related context; documentation
    explains how to interpret and reuse the file. Example 1.14 illustrates metadata
    for a weather dataset. Without these, even accurate tables become hard to trust
    outside the original team. The example 14 module shows what good metadata looks
    like in practice.
- type: bullets
  title: Takeaways
  bullets:
  - Quality is multi-dimensional and task-relative
  - Learn to spot accuracy errors, missing fields
  notes: Quality is multi-dimensional and task-relative. Learn to spot accuracy errors,
    missing fields, and format clashes early, and treat metadata plus documentation
    as part of the dataset—not optional extras.
