title: Chapter 1 — Characteristics of good datasets
footer: Chapter 1 — Characteristics Of Good Datasets
slides:
- type: title
  title: Chapter 1 — Characteristics of good datasets
  subtitle: Knowing a file's type and format is not enough
  notes: Knowing a file's type and format is not enough. This part treats quality
    as a bundle of properties judged relative to an intended task.
- type: bullets
  title: Learning objectives
  bullets:
  - Consistency, and explain why metadata and documentation make a dataset reusable
  notes: You will list five widely cited dimensions, diagnose concrete defects in
    accuracy, completeness, and consistency, and explain why metadata and documentation
    make a dataset reusable.
- type: bullets
  title: Five quality dimensions
  bullets:
  - Table 1.6 in the chapter lists accuracy, completeness, consistency, relevance
  - None stands alone
  - Still on-question
  notes: 'Table 1.6 in the chapter lists accuracy, completeness, consistency, relevance,
    and timeliness. None stands alone: a dataset can be complete yet inaccurate, or
    timely yet irrelevant to the question at hand. Assessment starts by asking whether
    values are trustworthy, sufficiently populated, comparable, and still on-question.'
