title: Chapter 1 — Dataset management
footer: Chapter 1 — Dataset Management
slides:
- type: title
  title: Chapter 1 — Dataset management
  subtitle: Models and dashboards depend on quieter work
  notes: 'Models and dashboards depend on quieter work: who may access the table,
    which version was trained, where backups live, and how long personal fields may
    be retained. This final part introduces that discipline.'
- type: bullets
  title: Learning objectives
  bullets:
  - Explain why management matters after a model ships
  - Name privacy controls that protect sensitive extracts
  notes: You should explain why management matters after a model ships, list core
    practices such as versioning and access control, and name privacy controls that
    protect sensitive extracts.
- type: bullets
  title: Why management matters
  bullets:
  - A dataset is collected, cleaned, documented, stored, shared, and sometimes retired
  - Traceability links figures to their sources
  - Without these foundations
  notes: A dataset is collected, cleaned, documented, stored, shared, and sometimes
    retired. Traceability links figures to their sources; ownership and documentation
    reduce duplicated effort; governance limits who can see sensitive fields. Without
    these foundations, tuned models can amplify undocumented errors or leak attributes
    that should never leave a restricted store.
- type: bullets
  title: Best practices (overview)
  bullets:
  - Table 1.8 highlights version control
  - These reinforce one another
  notes: 'Table 1.8 highlights version control, cleaning and transformation, metadata
    documentation, storage and backups, access control, and cataloging. These reinforce
    one another: a versioned file without metadata still confuses new users; rich
    docs without access controls may violate privacy rules.'
- type: bullets
  title: Privacy and security
  bullets:
  - Encryption, anonymization, role-based access with MFA, regulatory compliance
  - Healthcare extracts, banking ledgers
  - Ethical nuance continues in later chapters
  notes: Encryption, anonymization, role-based access with MFA, regulatory compliance,
    and audit logging commonly combine to protect personal and proprietary data. Healthcare
    extracts, banking ledgers, and customer feature tables are useful only if access,
    retention, and sharing are controlled. Ethical nuance continues in later chapters;
    the point here is that protection starts when records are first stored.
- type: bullets
  title: Looking ahead
  bullets:
  - Chapter 1 established definitions, types, quality, exploration, applications
  - Chapter 2 turns to data collection
  notes: Chapter 1 established definitions, types, quality, exploration, applications,
    and management. Chapter 2 turns to data collection—where records originate and
    how sampling shapes representativeness.
- type: bullets
  title: Takeaways
  bullets:
  - Management is not optional
  - Versioning, metadata, and access must work together
  - Protection begins at first storage and continues through every reuse
  notes: Management is not optional. Versioning, metadata, and access must work together.
    Protection begins at first storage and continues through every reuse.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Complete the quiz
  notes: Complete the quiz, then return to the chapter learning path or continue to
    Chapter 2 when that lecture is available.
