title: Chapter 1 — Types of datasets
footer: Chapter 1 — Types Of Datasets
slides:
- type: title
  title: Chapter 1 — Types of datasets
  subtitle: This part classifies how datasets are organized
  notes: With records and attributes defined, this part classifies how datasets are
    organized. The taxonomy—structure and temporal behavior—appears throughout the
    rest of the book.
- type: bullets
  title: Learning objectives
  bullets:
  - Contrast the three structural types, name a typical format for each
  - Explain when a dataset is static versus dynamic
  notes: By the end of this part, you should contrast the three structural types,
    name a typical format for each, and explain when a dataset is static versus dynamic.
- type: bullets
  title: Two classification axes
  bullets:
  - Datasets are commonly classified along two axes
  - Structure covers structured, unstructured, and semi-structured forms
  - Temporal behavior covers static snapshots versus continuously updating streams
  - Selecting an appropriate representation is a prerequisite for reliable analysis
  notes: Datasets are commonly classified along two axes. Structure covers structured,
    unstructured, and semi-structured forms. Temporal behavior covers static snapshots
    versus continuously updating streams. Selecting an appropriate representation
    is a prerequisite for reliable analysis.
- type: bullets
  title: Structured datasets
  bullets:
  - 'Structured datasets follow a fixed schema: rows and columns with consistent types'
  - They live comfortably in spreadsheets and relational databases and are generally
    the
  - A retail customer table
  notes: 'Structured datasets follow a fixed schema: rows and columns with consistent
    types. They live comfortably in spreadsheets and relational databases and are
    generally the easiest to query and aggregate. A retail customer table—one row
    per customer, typed columns for email and purchase history—is the textbook case.'
- type: bullets
  title: Unstructured datasets
  bullets:
  - Unstructured data has no predefined row–column model
  - Text, images, audio, and video fall here
  - Valuable insights often require NLP or image recognition rather than a simple
    SQL filter
  - Social media feedback and medical images are common examples
  notes: Unstructured data has no predefined row–column model. Text, images, audio,
    and video fall here. Valuable insights often require NLP or image recognition
    rather than a simple SQL filter. Social media feedback and medical images are
    common examples.
- type: bullets
  title: Semi-structured datasets
  bullets:
  - Semi-structured data uses tags or keys
  - Example 1.7 shows JSON objects where optional fields appear when relevant
  - Open the example 7 module to inspect a concrete sample
  notes: Semi-structured data uses tags or keys—JSON, XML, YAML—without requiring
    every record to share the same flat columns. Example 1.7 shows JSON objects where
    optional fields appear when relevant. Open the example 7 module to inspect a concrete
    sample.
- type: bullets
  title: Static vs dynamic
  bullets:
  - Static datasets change rarely, an archived extract
  - Dynamic datasets update continuously, sensor streams or click logs
  - The same entity can move between forms over its lifecycle
  - Temporal behavior shapes how often you refresh, version, and monitor the data
  notes: Static datasets change rarely—an archived extract. Dynamic datasets update
    continuously—sensor streams or click logs. The same entity can move between forms
    over its lifecycle. Temporal behavior shapes how often you refresh, version, and
    monitor the data.
- type: bullets
  title: Takeaways
  bullets:
  - Structure and time are independent
  - Structured data is easiest to query
  notes: Structure and time are independent. Structured data is easiest to query;
    unstructured data needs extraction pipelines; semi-structured data offers flexible
    keys that remain machine-readable.
