title: Chapter 9 — Crowdsourcing use cases
footer: Chapter 9 — Crowdsourcing Use Cases
slides:
- type: title
  title: Chapter 9 — Crowdsourcing use cases
  subtitle: When human judgment must scale beyond a small expert team, crowdsourcing
    distributes work to a large online community
  notes: When human judgment must scale beyond a small expert team, crowdsourcing
    distributes work to a large online community. This part defines crowdsourcing,
    outlines common task types, and shows use cases from fraud-related review and
    innovation contests to microtask image tagging.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to define crowdsourcing
    and name major task types; describe labeling, market research, innovation, and
    microtasking use cases; and interpret examples of fraud-pattern review, open algorithmic
    contests, and catalog image tagging.
- type: bullets
  title: What crowdsourcing is
  bullets:
  - Crowdsourcing obtains input
  - It draws on collective intelligence and diverse skills for problems that are too
    complex
  - The approach can lower cost while also tapping creativity, not only routine labor
  notes: Crowdsourcing obtains input, services, or resources by soliciting contributions
    from a large group, typically through an online community. It draws on collective
    intelligence and diverse skills for problems that are too complex or time-consuming
    for a small team alone. The approach can lower cost while also tapping creativity,
    not only routine labor.
- type: bullets
  title: Types of crowdsourcing tasks
  bullets:
  - Common types include crowd voting on ideas or designs
  - Dataset projects most often emphasize crowd labor and related labeling workflows
  notes: Common types include crowd voting on ideas or designs; crowd creation of
    writing, design, or code; crowd collaboration on complex research or software
    problems; crowdfunding for projects; and crowd labor that splits work into microtasks
    such as labeling, transcription, or categorization. Dataset projects most often
    emphasize crowd labor and related labeling workflows.
- type: bullets
  title: Labeling, research, and fraud review
  bullets:
  - Machine learning teams use crowdsourcing to gather labeled images and text quickly
  - Market research can sample broad demographics through surveys on the same platforms
  - Frequency signals
  notes: Machine learning teams use crowdsourcing to gather labeled images and text
    quickly. Market research can sample broad demographics through surveys on the
    same platforms. Example settings also apply crowd-scale review patterns to large
    transaction corpora when fraud risk must be assessed from amount, location, and
    frequency signals.
- type: bullets
  title: Example 9.8 — Crowdsourcing Fraud-Pattern Review
  bullets:
  - Example 9.8 — hands-on module
  - Locations, and frequency
  - Applied in near real time
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example8/`'
  notes: Example 9.8 describes a bank analyzing millions of transactions for fraud
    likelihood based on amounts, locations, and frequency. Applied in near real time,
    such a model can flag and help prevent fraud before customers are harmed. Open
    the example 8 module for this chapter to review the fraud-review framing.
- type: bullets
  title: Example 9.9 — Netflix Prize Crowdsourced Innovation
  bullets:
  - Example 9.9 — hands-on module
  - Example 9.9 recalls the Netflix Prize
  - Organizations use contests to crowdsource innovation when many external teams
    can explore
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example9/`'
  notes: 'Example 9.9 recalls the Netflix Prize: a one-million-dollar open competition
    for the best algorithm to improve recommendations. Organizations use contests
    to crowdsource innovation when many external teams can explore solutions under
    a shared goal. The example 9 module for this chapter summarizes that contest-style
    innovation pattern.'
- type: bullets
  title: Example 9.10 — Microtask Image Tagging on Crowd Platforms
  bullets:
  - Example 9.10 — hands-on module
  - Distributed to many workers
  - Thousands of items can be annotated in hours rather than weeks
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example10/`'
  notes: Example 9.10 shows catalog image tagging split into microtasks—for example
    labeling apparel, electronics, or home goods—and distributed to many workers.
    Thousands of items can be annotated in hours rather than weeks. The example 10
    module for this chapter captures that microtasking speed advantage.
- type: bullets
  title: Takeaways
  bullets:
  - Crowdsourcing scales human judgment through online communities and multiple task
    types
  - Dataset work often centers on labeling and microtasking
  - Fraud review, open prizes
  notes: Crowdsourcing scales human judgment through online communities and multiple
    task types. Dataset work often centers on labeling and microtasking, while contests
    can crowdsource innovation. Fraud review, open prizes, and catalog tagging illustrate
    how the same idea adapts to different collection goals.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - The next part moves from use cases to platforms
  notes: 'The next part moves from use cases to platforms: the Amazon Mechanical Turk
    workflow for posting and reviewing Human Intelligence Tasks, then alternatives
    such as Prolific, CrowdFlower, and Clickworker.'
