title: Chapter 9 — IoT components and sensing
footer: Chapter 9 — Iot Components
slides:
- type: title
  title: Chapter 9 — IoT components and sensing
  subtitle: Crowdsourcing scales human labeling; the Internet of Things scales continuous
    measurement
  notes: Crowdsourcing scales human labeling; the Internet of Things scales continuous
    measurement. This part introduces IoT components—devices with sensors or actuators,
    connectivity, and processing—and motivates them with wearables, industrial monitors,
    and agricultural soil networks.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to define the Internet of
    Things and its main components; give examples of wearable and industrial sensing
    endpoints; and explain how connectivity and continuous soil sensing support collection
    without constant human intervention.
- type: bullets
  title: What the Internet of Things is
  bullets:
  - The Internet of Things is a network of physical devices that connect to the internet
    and
  - Smart-city systems
  - Objects collect, share
  notes: The Internet of Things is a network of physical devices that connect to the
    internet and exchange data. Devices range from smart thermostats and wearables
    to industrial machinery, autonomous vehicles, and smart-city systems. Objects
    collect, share, and analyze data with limited direct human intervention, yielding
    timely status and environmental insights.
- type: bullets
  title: 'Core components: devices, connectivity, processing'
  bullets:
  - At its core, IoT combines things equipped with sensors or actuators
  - Devices capture measurements or perform actions
  - Networks carry those readings onward
  - Processing turns raw streams into decisions for users and automated systems
  notes: At its core, IoT combines things equipped with sensors or actuators; reliable
    connectivity to move data; and processing analytics at the edge or in the cloud.
    Devices capture measurements or perform actions. Networks carry those readings
    onward. Processing turns raw streams into decisions for users and automated systems.
- type: bullets
  title: Example 9.12 — Wearable Health Sensors
  bullets:
  - Example 9.12 — hands-on module
  - Steps, and sleep
  - These endpoints illustrate everyday sensing that produces continuous personal
    health
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example12/`'
  notes: Example 9.12 lists wearables such as fitness trackers and smartwatches that
    monitor heart rate, steps, and sleep. These endpoints illustrate everyday sensing
    that produces continuous personal health streams. Open the example 12 module for
    this chapter to review wearable sensing as an IoT collection pattern.
- type: bullets
  title: Example 9.14 — Industrial Machine Monitoring
  bullets:
  - Example 9.14 — hands-on module
  - Predict maintenance needs
  - Industrial IoT therefore links sensing to operational reliability rather than
    only
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example14/`'
  notes: Example 9.14 describes manufacturing machines that monitor their own performance,
    detect faults, and predict maintenance needs. Industrial IoT therefore links sensing
    to operational reliability rather than only consumer wellness. The example 14
    module for this chapter frames that self-monitoring maintenance use case.
- type: bullets
  title: Connectivity options for IoT transfer
  bullets:
  - Devices need reliable links to gateways or cloud services
  - Common options include Wi-Fi for home and office devices
  - Choice depends on power, range, and bandwidth
  notes: Devices need reliable links to gateways or cloud services. Common options
    include Wi-Fi for home and office devices; Bluetooth Low Energy for many wearables;
    cellular networks for long-range mobile devices; and low-power wide-area networks
    for small payloads over long distances, as in agriculture. Choice depends on power,
    range, and bandwidth.
- type: bullets
  title: Example 9.16 — Soil Sensors for Continuous Agriculture Data
  bullets:
  - Example 9.16 — hands-on module
  - Example 9.16 highlights soil sensors that support continuous agriculture data
  - Farmers collect moisture, temperature
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example16/`'
  notes: Example 9.16 highlights soil sensors that support continuous agriculture
    data. Farmers collect moisture, temperature, and related readings so irrigation
    and crop decisions can follow timely streams rather than infrequent manual tests.
    The example 16 module for this chapter summarizes continuous agricultural sensing.
- type: bullets
  title: Takeaways
  bullets:
  - IoT collection rests on sensing devices, connectivity, and edge or cloud processing
  - Wearables and industrial monitors show personal and plant-floor endpoints
  - Connectivity choices and soil networks illustrate how continuous streams replace
    sparse
  notes: IoT collection rests on sensing devices, connectivity, and edge or cloud
    processing. Wearables and industrial monitors show personal and plant-floor endpoints.
    Connectivity choices and soil networks illustrate how continuous streams replace
    sparse manual measurement in the field.
