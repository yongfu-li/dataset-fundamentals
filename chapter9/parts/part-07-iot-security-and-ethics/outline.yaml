title: Chapter 9 — IoT security, privacy, and overload
footer: Chapter 9 — Iot Security And Ethics
slides:
- type: title
  title: Chapter 9 — IoT security, privacy, and overload
  subtitle: Always-on sensors create always-on risks
  notes: Always-on sensors create always-on risks. This part covers scalability, security,
    and privacy challenges in IoT collection, smart-city multi-source designs, and
    ethical concerns including consent, surveillance, and managing data overload.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part, learners should be able to explain scalability, security
  notes: By the end of this part, learners should be able to explain scalability,
    security, and privacy challenges for IoT collection; describe encryption, authentication,
    and secure-edge practices; and discuss ethical issues of ownership, overload,
    and surveillance using wearable and smart-city examples.
- type: bullets
  title: 'Challenges: scalability, security, privacy'
  bullets:
  - As device counts grow
  - Many IoT devices ship with minimal security, so each endpoint can be an attack
    surface
  - Sensitive health and behavior data also demand compliance with privacy rules such
    as GDPR
  notes: As device counts grow, managing and processing massive volumes becomes difficult
    without robust infrastructure and efficient protocols. Many IoT devices ship with
    minimal security, so each endpoint can be an attack surface. Sensitive health
    and behavior data also demand compliance with privacy rules such as GDPR or HIPAA.
- type: bullets
  title: Security practices for IoT and edge
  bullets:
  - Best practices include end-to-end encryption at the device, in transit, and in
    the cloud
  - These controls reduce unauthorized access, tampering
  notes: Best practices include end-to-end encryption at the device, in transit, and
    in the cloud; strong authentication and authorization for devices and users; and
    hardened edge devices with secure boot and encrypted storage. These controls reduce
    unauthorized access, tampering, and remote takeover risks in continuous collection
    systems.
- type: bullets
  title: Example 9.20 — Securing Wearable Health Edge Devices
  bullets:
  - Example 9.20 — hands-on module
  - Example 9.20 highlights wearable health trackers that monitor vital signs in real
    time
  - Securing those edge devices against tampering and ensuring health data reach clinicians
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example20/`'
  notes: Example 9.20 highlights wearable health trackers that monitor vital signs
    in real time. Securing those edge devices against tampering and ensuring health
    data reach clinicians safely are essential to protect patient privacy. Open the
    example 20 module for this chapter to review secure wearable edge collection.
- type: bullets
  title: Example 9.21 — Smart-City Multi-Source IoT Collection
  bullets:
  - Example 9.21 — hands-on module
  - Public transit
  - Protocols, and governance
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example21/`'
  notes: Example 9.21 outlines smart-city systems that collect from traffic lights,
    environmental sensors, waste management, and public transit. Multi-source urban
    sensing amplifies both operational value and the need for standardized formats,
    protocols, and governance. The example 21 module for this chapter frames that
    multi-source design.
- type: bullets
  title: Protocols and multi-source coordination
  bullets:
  - Effective multi-source IoT depends on shared formats and lightweight protocols
  - Message Queuing Telemetry Transport suits low-bandwidth messaging
  - Standardization helps cities and operators fuse streams without brittle one-off
  notes: Effective multi-source IoT depends on shared formats and lightweight protocols.
    Message Queuing Telemetry Transport suits low-bandwidth messaging, while Constrained
    Application Protocol supports low-power devices. Standardization helps cities
    and operators fuse streams without brittle one-off integrations that fail under
    scale.
- type: bullets
  title: 'Ethics: ownership, overload, surveillance'
  bullets:
  - Who owns device-collected personal data, the individual or the vendor, is often
    contested
  - 'Millions of devices also create overload: important signals can be lost in volume'
  - Public and personal tracking raise surveillance concerns
  notes: 'Who owns device-collected personal data—the individual or the vendor—is
    often contested. Millions of devices also create overload: important signals can
    be lost in volume. Public and personal tracking raise surveillance concerns, so
    designers must balance operational benefits against privacy rights and consent.'
- type: bullets
  title: Takeaways
  bullets:
  - IoT collection faces scalability, security
  - Encryption, authentication, and secure edge devices are baseline controls
  - Wearables and smart cities show why ethics, ownership, overload
  notes: IoT collection faces scalability, security, and privacy challenges that grow
    with always-on endpoints. Encryption, authentication, and secure edge devices
    are baseline controls. Wearables and smart cities show why ethics—ownership, overload,
    and surveillance—must travel with the technical pipeline.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - The next part turns to big-data characteristics, volume, velocity, variety
  notes: The next part turns to big-data characteristics—volume, velocity, variety,
    and veracity—and to streaming and distributed systems that absorb continuous stock,
    sensor, and social feeds.
