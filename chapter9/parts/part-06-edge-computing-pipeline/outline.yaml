title: Chapter 9 — Edge computing and the IoT pipeline
footer: Chapter 9 — Edge Computing Pipeline
slides:
- type: title
  title: Chapter 9 — Edge computing and the IoT pipeline
  subtitle: Raw sensor streams overwhelm networks if everything ships to the cloud
  notes: Raw sensor streams overwhelm networks if everything ships to the cloud. This
    part describes the IoT collection pipeline and the benefits of edge processing
    for latency, bandwidth, and local decisions such as thermostats, traffic lights,
    and logistics rerouting.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part, learners should be able to outline stages of an IoT data
    pipeline
  notes: By the end of this part, learners should be able to outline stages of an
    IoT data pipeline; explain edge computing benefits for latency, bandwidth, and
    reliability; and apply those ideas to thermostat sensing, traffic-light control,
    and real-time logistics rerouting.
- type: bullets
  title: Pipeline stages from generation to analytics
  bullets:
  - An IoT pipeline typically moves through data generation at the sensor
  - Each stage must be designed so volume and delay do not erase the value of continuous
  notes: An IoT pipeline typically moves through data generation at the sensor; transmission
    to a gateway or cloud; processing first at the edge and then centrally; and storage
    with analytics that share insights with users or automated systems. Each stage
    must be designed so volume and delay do not erase the value of continuous sensing.
- type: bullets
  title: Example 9.17 — Smart Thermostat Local Reading
  bullets:
  - Example 9.17 — hands-on module
  - Example 9.17 gives a minimal sensing vignette
  - That local reading is the generation step before gateway or cloud processing
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example17/`'
  notes: 'Example 9.17 gives a minimal sensing vignette: a smart thermostat records
    temperature in a room. That local reading is the generation step before gateway
    or cloud processing. Open the example 17 module for this chapter to situate local
    sensing at the start of the pipeline.'
- type: bullets
  title: Edge processing in the pipeline
  bullets:
  - Edge computing processes data at or near the device
  - Doing so reduces load on central servers and shortens delay for real-time decisions
  - Transmission may still use Wi-Fi
  notes: Edge computing processes data at or near the device, often on local servers,
    before sending results to the cloud. Doing so reduces load on central servers
    and shortens delay for real-time decisions. Transmission may still use Wi-Fi,
    Bluetooth, or cellular links, but not every raw sample must travel unmodified.
- type: bullets
  title: 'Benefits: latency, bandwidth, reliability'
  bullets:
  - Processing closer to the source cuts latency for time-sensitive applications
  - Sending only relevant or pre-processed data optimizes bandwidth and cost
  - Edge devices can also keep working when connectivity drops
  - Together these benefits make continuous IoT collection operationally viable
  notes: Processing closer to the source cuts latency for time-sensitive applications.
    Sending only relevant or pre-processed data optimizes bandwidth and cost. Edge
    devices can also keep working when connectivity drops, syncing later when the
    link returns. Together these benefits make continuous IoT collection operationally
    viable.
- type: bullets
  title: Example 9.18 — Edge Processing for Traffic Lights
  bullets:
  - Example 9.18 — hands-on module
  - Example 9.18 shows smart traffic systems that process camera and sensor data at
    the edge
  - Local decisions keep control loops tight
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example18/`'
  notes: Example 9.18 shows smart traffic systems that process camera and sensor data
    at the edge to adjust lights in real time without waiting on a distant cloud round
    trip. Local decisions keep control loops tight. The example 18 module for this
    chapter highlights that near-real-time traffic control pattern.
- type: bullets
  title: Example 9.19 — Real-Time Logistics Rerouting
  bullets:
  - Example 9.19 — hands-on module
  - Example 9.19 applies IoT tracking to logistics
  - Timely sensing plus responsive processing turns location streams into operational
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example19/`'
  notes: 'Example 9.19 applies IoT tracking to logistics: delivery trucks are monitored
    in real time and rerouted using traffic data to improve fuel use and delivery
    times. Timely sensing plus responsive processing turns location streams into operational
    decisions. The example 19 module for this chapter summarizes that rerouting advantage.'
- type: bullets
  title: Takeaways
  bullets:
  - IoT pipelines span generation, transmission, edge and cloud processing, and analytics
  - Edge computing improves latency, bandwidth use, and offline resilience
  - Thermostats, traffic lights
  notes: IoT pipelines span generation, transmission, edge and cloud processing, and
    analytics. Edge computing improves latency, bandwidth use, and offline resilience.
    Thermostats, traffic lights, and logistics rerouting show why local processing
    matters for timely action.
- type: bullets
  title: Next
  bullets:
