title: Chapter 9 — Big-data tools, lakes, and warehouses
footer: Chapter 9 — Lakes Warehouses Tools
slides:
- type: title
  title: Chapter 9 — Big-data tools, lakes, and warehouses
  subtitle: Streaming needs a landing place
  notes: Streaming needs a landing place. This part surveys collection challenges
    and tooling, then contrasts data lakes for mixed raw sources with data warehouses
    for structured business intelligence.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part, learners should be able to list integration, storage,
    quality
  notes: By the end of this part, learners should be able to list integration, storage,
    quality, and scalability challenges in big-data collection; name tools such as
    Apache Flume and Apache NiFi; and contrast data lakes with data warehouses using
    retail and financial examples.
- type: bullets
  title: Collection challenges at big-data scale
  bullets:
  - Big data arrives from social, sensors, databases
  - Traditional relational stores struggle with volume and variety
  - Quality drifts under velocity
  notes: Big data arrives from social, sensors, databases, and more, each with different
    formats and protocols, so integration is hard. Traditional relational stores struggle
    with volume and variety, pushing teams toward distributed file systems and NoSQL
    options. Quality drifts under velocity, and infrastructure must scale storage
    and compute without uncontrolled cost.
- type: bullets
  title: 'Tools: Flume and NiFi'
  bullets:
  - Often into real-time analytics paths
  - Apache NiFi automates data flow between systems
  - These tools address movement and integration when custom scripts do not scale
  notes: 'Apache Flume is a distributed collection service for aggregating and transporting
    large log volumes, often into real-time analytics paths. Apache NiFi automates
    data flow between systems: collect, route, and transform from many sources into
    varied stores. These tools address movement and integration when custom scripts
    do not scale.'
- type: bullets
  title: Data lakes for raw, mixed sources
  bullets:
  - A data lake is a centralized repository that stores vast raw data in native formats
  - Lakes suit text, video, and social feeds when analysts need flexible access later
  - Weak schema discipline
  notes: A data lake is a centralized repository that stores vast raw data in native
    formats—structured, semi-structured, or unstructured. Lakes suit text, video,
    and social feeds when analysts need flexible access later. Weak schema discipline,
    however, can complicate governance and quality management if curation is neglected.
- type: bullets
  title: Example 9.26 — Retail Data Lake for Mixed Sources
  bullets:
  - Example 9.26 — hands-on module
  - Example 9.26 places customer interaction logs, social content
  - Analysts later apply machine learning to uncover behavior trends from that mixed
    corpus
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example26/`'
  notes: Example 9.26 places customer interaction logs, social content, and sensor
    data in a retail data lake. Analysts later apply machine learning to uncover behavior
    trends from that mixed corpus. Open the example 26 module for this chapter to
    review the lake-as-landing-zone pattern.
- type: bullets
  title: Data warehouses for structured BI
  bullets:
  - A data warehouse stores cleaned
  - Tables support business intelligence tools and historical analysis
  - Warehouses excel at governed reporting but are less suited to the full variety
    and
  notes: A data warehouse stores cleaned, transformed, structured data organized for
    fast querying and reporting. Tables support business intelligence tools and historical
    analysis. Warehouses excel at governed reporting but are less suited to the full
    variety and real-time nature of raw big-data streams.
- type: bullets
  title: Example 9.27 — Financial Data Warehouse for Structured BI
  bullets:
  - Example 9.27 — hands-on module
  - Example 9.27 shows a financial institution storing transactions, balances
  - Structured BI needs consistency that lakes alone may not provide
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example27/`'
  notes: Example 9.27 shows a financial institution storing transactions, balances,
    and demographics in a warehouse for monthly reporting and performance tracking.
    Structured BI needs consistency that lakes alone may not provide. The example
    27 module for this chapter contrasts that warehouse reporting role.
- type: bullets
  title: Takeaways
  bullets:
  - Big-data collection faces integration, storage, quality
  - Lakes land mixed raw sources for flexible analytics
  - Retail lakes and financial warehouses illustrate complementary storage patterns
  notes: Big-data collection faces integration, storage, quality, and scalability
    challenges that Flume and NiFi help address. Lakes land mixed raw sources for
    flexible analytics; warehouses serve cleaned structured reporting. Retail lakes
    and financial warehouses illustrate complementary storage patterns.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Emerging trends that prepare later storage and modeling chapters
  notes: The final part walks real-time social sentiment analysis, distributed file
    systems and ingestion modes, then quality, privacy, AI integration, and emerging
    trends that prepare later storage and modeling chapters.
