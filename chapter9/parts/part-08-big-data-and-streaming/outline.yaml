title: Chapter 9 — Big data and streaming
footer: Chapter 9 — Big Data And Streaming
slides:
- type: title
  title: Chapter 9 — Big data and streaming
  subtitle: IoT and social platforms produce volume and velocity that traditional
    databases cannot absorb alone
  notes: IoT and social platforms produce volume and velocity that traditional databases
    cannot absorb alone. This part defines big-data characteristics, filtering noisy
    streams, and distributed systems that support continuous stock, sensor, and social
    feeds.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to characterize volume,
    velocity, variety, veracity, and value; explain why social streams need noise
    filtering; and describe streaming data and distributed processing with technologies
    such as Hadoop and Kafka.
- type: bullets
  title: Defining big data and the Vs
  bullets:
  - Big data refers to extremely large, complex datasets beyond conventional processing
    tools
  - Classic dimensions include volume, the sheer size of the corpus
  notes: Big data refers to extremely large, complex datasets beyond conventional
    processing tools. Classic dimensions include volume—the sheer size of the corpus;
    velocity—the speed of generation and processing; variety—structured, semi-structured,
    and unstructured formats; veracity—reliability of the data; and value—useful insights,
    not mere accumulation.
- type: bullets
  title: Example 9.23 — Petabyte-Scale Social and Sensor Volume
  bullets:
  - Example 9.23 — hands-on module
  - Example 9.23 illustrates volume
  - At that size
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example23/`'
  notes: 'Example 9.23 illustrates volume: social platforms, sensors, and internet
    transactions can reach petabyte scale—a petabyte being a million gigabytes—or
    more. At that size, collection design must assume distributed storage and processing
    from the start. Open the example 23 module for this chapter to review the volume
    framing.'
- type: bullets
  title: Velocity, variety, veracity, and value
  bullets:
  - Velocity rises with IoT, social
  - Variety spans spreadsheets, JSON, XML, posts, video, and images
  - Veracity is hard to assess at scale
  - Value reminds teams that collecting volume without extractable insight wastes
  notes: Velocity rises with IoT, social, and financial streams that demand rapid
    processing for timely decisions. Variety spans spreadsheets, JSON, XML, posts,
    video, and images. Veracity is hard to assess at scale. Value reminds teams that
    collecting volume without extractable insight wastes infrastructure and attention.
- type: bullets
  title: Example 9.24 — Noise Filtering in Social Media Streams
  bullets:
  - Example 9.24 — hands-on module
  - Example 9.24 shows why social streams need filtering
  - Collection pipelines therefore include quality gates, not only ingest
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example24/`'
  notes: 'Example 9.24 shows why social streams need filtering: posts often contain
    noise or irrelevant content that must be removed before insights are meaningful.
    Collection pipelines therefore include quality gates, not only ingest. The example
    24 module for this chapter summarizes noise filtering as a veracity practice.'
- type: bullets
  title: Streaming data versus batch processing
  bullets:
  - Streaming data is generated continuously and must be processed as it arrives
  - Streaming systems handle high-throughput flows in motion
  - Stock feeds, IoT readings
  notes: Streaming data is generated continuously and must be processed as it arrives.
    Unlike batch workflows that store first and analyze later, streaming systems handle
    high-throughput flows in motion. Stock feeds, IoT readings, and social updates
    are typical sources that break one-shot collection assumptions.
- type: bullets
  title: Example 9.25 — Streaming Stock Sensor and Social Feeds
  bullets:
  - Example 9.25 — hands-on module
  - Example 9.25 lists common streaming sources
  - Distributed systems split large datasets across machines so parallel processing
    can keep
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example25/`'
  notes: 'Example 9.25 lists common streaming sources: real-time stock market feeds,
    IoT sensor readings, and social media updates. Distributed systems split large
    datasets across machines so parallel processing can keep up. The example 25 module
    for this chapter ties those feeds to continuous ingestion design.'
- type: bullets
  title: Takeaways
  bullets:
  - Big data is defined by volume, velocity, variety, veracity, and value, not size
    alone
  - Social noise filtering protects insight quality
  - Social collection at scale
  notes: Big data is defined by volume, velocity, variety, veracity, and value—not
    size alone. Social noise filtering protects insight quality. Streaming plus distributed
    frameworks such as Hadoop and Kafka support continuous stock, sensor, and social
    collection at scale.
- type: bullets
  title: Next
  bullets:
