title: Chapter 9 — From fundamentals to advanced collection
footer: Chapter 9 — From Fundamentals To Advanced
slides:
- type: title
  title: Chapter 9 — From fundamentals to advanced collection
  subtitle: Chapter 2 covered surveys, sampling, and small-scale collection
  notes: Chapter 2 covered surveys, sampling, and small-scale collection. This chapter
    asks what changes when evidence must arrive continuously, from many devices, or
    at volumes no spreadsheet can hold. Advanced techniques—crowdsourcing, Internet
    of Things sensing, and streaming pipelines—extend decision-focused design rather
    than replace it.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to explain when traditional
    collection pipelines hit scale, reliability, and cost limits; state why heterogeneous
    sources demand continuous rather than one-shot collection; and connect advanced
    methods to the same decision-making purpose that anchors smaller surveys.
- type: bullets
  title: Decision focus still anchors advanced pipelines
  bullets:
  - Advanced collection is not an excuse to gather everything
  - Teams still need the right evidence for a concrete action
  - Crowdsourcing, sensors
  notes: Advanced collection is not an excuse to gather everything. Teams still need
    the right evidence for a concrete action. Crowdsourcing, sensors, and streams
    exist so that purpose can survive larger scale, higher velocity, and more diverse
    formats without losing the link between measurement and decision.
- type: bullets
  title: Example 9.1 — Customer Sentiment Survey for Decisions
  bullets:
  - Example 9.1 — hands-on module
  - Example 9.1 considers a product team that may still begin with customer-satisfaction
  - Once the same questions must be answered continuously across regions, channels
  - Advanced methods preserve that decision-making goal at larger scale
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example1/`'
  notes: Example 9.1 considers a product team that may still begin with customer-satisfaction
    surveys. Once the same questions must be answered continuously across regions,
    channels, and product lines, survey logistics alone cannot keep up. Advanced methods
    preserve that decision-making goal at larger scale. Open the example 1 module
    for this chapter to review the scenario takeaways.
- type: bullets
  title: Why traditional pipelines hit limits
  bullets:
  - 'Traditional collection often fails on three fronts: scalability, reliability,
    and cost'
  - Paper and interview workflows grow expensive as samples expand
  - Those limits motivate the techniques developed later in this chapter
  notes: 'Traditional collection often fails on three fronts: scalability, reliability,
    and cost. Paper and interview workflows grow expensive as samples expand; human
    observers introduce inconsistency; and longitudinal studies multiply travel and
    personnel costs. Those limits motivate the techniques developed later in this
    chapter.'
- type: bullets
  title: Example 9.2 — Paper Surveys and Scalability Limits
  bullets:
  - Example 9.2 — hands-on module
  - Example 9.2 shows how paper surveys fail to scale with sample size
  - Distribution, collection
  - 'The lesson is operational: when turnaround and volume matter, manual logistics
    break first'
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example2/`'
  notes: 'Example 9.2 shows how paper surveys fail to scale with sample size. Distribution,
    collection, and processing become exponentially harder as more respondents are
    added. The lesson is operational: when turnaround and volume matter, manual logistics
    break first. The example 2 module for this chapter summarizes the same scalability
    rationale.'
- type: bullets
  title: Heterogeneous sources and continuous streams
  bullets:
  - Beyond scale and cost
  - These sources differ in structure, arrive at high velocity
  - Quality assurance therefore depends on declared crawl windows, stable identifiers
  notes: Beyond scale and cost, modern projects must ingest sensors, social feeds,
    web analytics, enterprise logs, and multimedia. These sources differ in structure,
    arrive at high velocity, and often require continuous rather than one-shot collection.
    Quality assurance therefore depends on declared crawl windows, stable identifiers,
    and refresh practices that keep longitudinal work comparable.
- type: bullets
  title: Example 9.5 — Wearables as Continuous Health Data Sources
  bullets:
  - Example 9.5 — hands-on module
  - Example 9.5 shows wearables as continuous health sources that traditional clinic
    visits
  - Fitness trackers and smartwatches stream heart rate, activity
  - Explore the chapter example module
  - 'View files: `modules/chapter9/example5/`'
  notes: Example 9.5 shows wearables as continuous health sources that traditional
    clinic visits and paper records cannot match. Fitness trackers and smartwatches
    stream heart rate, activity, and sleep at a temporal resolution periodic visits
    cannot provide. The example 5 module for this chapter frames that continuous-sensing
    contrast.
- type: bullets
  title: Takeaways
  bullets:
  - Advanced collection extends Chapter 2 when data grow too large
  - Decision focus remains the design goal
  - Crowdsourcing, IoT and edge sensing
  notes: Advanced collection extends Chapter 2 when data grow too large, too fast,
    or too heterogeneous for surveys and small databases alone. Decision focus remains
    the design goal. Crowdsourcing, IoT and edge sensing, and big-data streaming pipelines
    address scale, reliability, cost, variety, and timely processing.
