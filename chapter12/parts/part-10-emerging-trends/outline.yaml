  bullets:
  - Example 12.28 — hands-on module
  - Example 12.28 places time-series stores in monitoring workloads
  - Time-series databases such as InfluxDB store high-rate sensor and market ticks
    for
  - Purpose-built engines avoid forcing every metric into a general document or relational
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example28/`'
  notes: Example 12.28 places time-series stores in monitoring workloads. Time-series
    databases such as InfluxDB store high-rate sensor and market ticks for real-time
    monitoring and rollups. Purpose-built engines avoid forcing every metric into
    a general document or relational schema. The example 28 module for this chapter
    frames that time-series role.
- type: bullets
  title: Example 12.29 — Kafka High-Throughput Messaging
  bullets:
  - Example 12.29 — hands-on module
  - Chapter 9 covers streaming collection
  - Example 12.29 returns to Kafka in the pipeline-automation context
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example29/`'
  notes: 'Chapter 9 covers streaming collection; here the operational concern is wiring
    durable buses so storage and analytics stay synchronized. Example 12.29 returns
    to Kafka in the pipeline-automation context: Kafka sustains high message rates
    across producers and consumers, making it a common backbone for fraud detection
    and live analytics pipelines. The example 29 module for this chapter summarizes
    that messaging role.'
- type: bullets
  title: Looking ahead to Chapter 13
  bullets:
  - Scalable management provides the storage, consistency, versioning
  - Chapter 13 turns to reproducibility and open science
  - Emerging tools matter only when they still expose addressable versions and auditable
  notes: 'Scalable management provides the storage, consistency, versioning, and lineage
    substrate for production datasets. Chapter 13 turns to reproducibility and open
    science: pinning analyses to the versions and provenance records that platforms
    like those in this chapter must expose. Emerging tools matter only when they still
    expose addressable versions and auditable lineage.'
- type: bullets
  title: Takeaways
  bullets:
  - Serverless compute scales independently of durable object storage
  - Neo4j and InfluxDB illustrate purpose-built graph and time-series engines
  - Kafka remains a high-throughput messaging backbone for live pipelines
  - Trends build on earlier foundations rather than replacing CAP, formats, versioning
  - Chapter 13 consumes the managed assets this chapter prepares
  notes: Serverless compute scales independently of durable object storage. Neo4j
    and InfluxDB illustrate purpose-built graph and time-series engines. Kafka remains
    a high-throughput messaging backbone for live pipelines. Trends build on earlier
    foundations rather than replacing CAP, formats, versioning, and lineage. Chapter
    13 consumes the managed assets this chapter prepares.
