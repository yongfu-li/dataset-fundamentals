title: Chapter 12 — Emerging trends
footer: Chapter 12 — Emerging Trends
slides:
- type: title
  title: Chapter 12 — Emerging trends
  subtitle: The chapter closes by looking ahead
  notes: The chapter closes by looking ahead. This final part surveys serverless compute
    over object storage, graph and time-series specialty stores, and high-throughput
    messaging platforms that shape the next generation of scalable pipelines.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to explain serverless compute
    paired with durable object storage; position Neo4j for relationship-heavy graphs
    and InfluxDB for timestamped metrics; describe Kafka as a high-throughput messaging
    backbone for live analytics; and connect these trends to the storage foundations
    covered earlier in the chapter.
- type: bullets
  title: Directions still shifting operations
  bullets:
  - Section 12.2 already covered cloud object stores, SQL versus NoSQL trade-offs
  - Automated pipelines that keep storage and analytics synchronized
  notes: 'Section 12.2 already covered cloud object stores, SQL versus NoSQL trade-offs,
    and CAP-style consistency. This closing section highlights directions that are
    still shifting how teams operate those foundations: serverless compute over object
    storage, specialized database engines, and automated pipelines that keep storage
    and analytics synchronized.'
- type: bullets
  title: Example 12.26 — Serverless Compute Over Object Storage
  bullets:
  - Example 12.26 — hands-on module
  - Beyond managed buckets themselves
  - Example 12.26 pairs S3-class storage with serverless compute
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example26/`'
  notes: 'Beyond managed buckets themselves, teams often attach event-driven functions
    so compute scales independently of durable storage capacity. Example 12.26 pairs
    S3-class storage with serverless compute: object stores hold durable blobs while
    serverless functions process events on ingest, scaling compute independently of
    storage capacity. The example 26 module for this chapter summarizes that separation
    of concerns. Cloud-native databases such as Aurora and Spanner further reduce
    operational burden with automatic scaling for transactional workloads.'
