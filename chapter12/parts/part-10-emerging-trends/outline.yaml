  - Graph databases such as Neo4j fit social graphs and fraud rings where multi-hop
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example27/`'
  notes: Horizontal NoSQL stores remain important; the emerging pattern is purpose-built
    engines for relationship and time-series workloads, often as database-as-a-service.
    Example 12.27 places graph databases in network-style apps. Graph databases such
    as Neo4j fit social graphs and fraud rings where multi-hop relationships are the
    primary query pattern. The example 27 module for this chapter covers that graph
    fit.
- type: bullets
