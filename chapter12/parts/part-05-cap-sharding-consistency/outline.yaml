title: Chapter 12 — CAP, sharding, and consistency
footer: Chapter 12 — Cap Sharding Consistency
slides:
- type: title
  title: Chapter 12 — CAP, sharding, and consistency
  subtitle: Distribution introduces trade-offs among consistency, availability, and
    partition tolerance
  notes: Distribution introduces trade-offs among consistency, availability, and partition
    tolerance. This part covers the CAP theorem, sharding and replication patterns,
    and when strong versus eventual consistency is appropriate.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to state the CAP theorem
    and why partitions force a consistency-versus-availability choice; explain sharding
    and replication for scale and fault tolerance; contrast strong and eventual consistency
    with Examples 12.11 and 12.13; and relate those choices to workload cost of stale
    reads versus temporary unavailability.
- type: bullets
  title: The CAP theorem
  bullets:
  - Partition tolerance simultaneously
  - Consistency means every read returns the most recent write
  - Availability means every request receives a response even if some nodes are down
  - Partition tolerance means the system continues when the network splits nodes apart
  notes: The CAP theorem states that a distributed system cannot guarantee consistency,
    availability, and partition tolerance simultaneously. Consistency means every
    read returns the most recent write. Availability means every request receives
    a response even if some nodes are down. Partition tolerance means the system continues
    when the network splits nodes apart.
- type: bullets
  title: CP versus AP under partition
  bullets:
  - Because partitions are unavoidable in real networks
  - Under partition
  - The choice depends on whether stale reads or temporary unavailability is more
    costly for
  notes: Because partitions are unavoidable in real networks, practical datastores
    sit on a partition-tolerant edge and choose either consistency or availability
    when a partition occurs. Under partition, CP systems may reject writes until replicas
    agree, whereas AP systems accept traffic and reconcile later. The choice depends
    on whether stale reads or temporary unavailability is more costly for the workload.
- type: bullets
  title: Sharding and Example 12.10
  bullets:
  - Example 12.10 — hands-on module
  - Data sharding partitions data across servers to improve scalability, fault tolerance
  - Example 12.10 shows a common sharding key choice
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example10/`'
  notes: 'Data sharding partitions data across servers to improve scalability, fault
    tolerance, and performance. Example 12.10 shows a common sharding key choice:
    customer tables are often sharded by geography or customer ID so each node owns
    a slice of keys and write load spreads across the cluster. The example 10 module
    for this chapter summarizes that keying pattern. Replication duplicates data across
    nodes or data centers so another replica can take over if one node fails.'
- type: code
  title: Example 12.10 — listing
  code: "\"\"\"Example 12.10 — shard customer keys by geography or customer ID.\"\"\
    \"\n\nfrom __future__ import annotations\n\nimport hashlib\nfrom collections import\
    \ Counter\n\n\ndef shard_for_customer(customer_id: str, n_shards: int) -> int:\n\
    \    \"\"\"Return a stable shard index for a customer ID.\"\"\"\n    digest =\
    \ hashlib.md5(customer_id.encode(\"utf-8\")).hexdigest()\n    return int(digest,\
    \ 16) % n_shards\n\n\ndef main() -> None:\n    \"\"\"Show ID hashing and region\
    \ mapping as two common sharding keys.\"\"\"\n    n_shards = 4\n    customers\
    \ = [\"c_1001\", \"c_1002\", \"c_2044\", \"c_3110\", \"c_4500\", \"c_4501\"]\n\
    \    print(f\"Hash sharding by customer_id across {n_shards} nodes:\\n\")\n  \
    \  print(f\"{'customer_id':<12}{'shard':>6}\")"
- type: bullets
  title: Example 12.11 — Strong Consistency in Financial Ledgers
  bullets:
  - Example 12.11 — hands-on module
  - Strong consistency guarantees that any read returns the most recent write regardless
    of
  - Example 12.11 requires that guarantee for balances
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example11/`'
  notes: 'Strong consistency guarantees that any read returns the most recent write
    regardless of which replica is accessed. Example 12.11 requires that guarantee
    for balances: in payments and ledger systems, strong consistency is preferred
    so concurrent transfers cannot leave accounts in conflicting states visible to
    different clients. The example 11 module for this chapter covers that ledger case.'
- type: bullets
  title: Example 12.13 — Eventual Consistency in DynamoDB and Cassandra
  bullets:
  - Example 12.13 — hands-on module
  - Writes propagate to other nodes, but nodes may temporarily disagree
  - Example 12.13 lists stores that favor availability under partition
  - Amazon DynamoDB and Apache Cassandra commonly emphasize availability and partition
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example13/`'
  notes: 'Eventual consistency sacrifices immediate agreement for availability and
    partition tolerance: writes propagate to other nodes, but nodes may temporarily
    disagree. Example 12.13 lists stores that favor availability under partition.
    Amazon DynamoDB and Apache Cassandra commonly emphasize availability and partition
    tolerance with eventual consistency tunable by client read and write quorums.
    The example 13 module for this chapter frames that availability-first pattern.'
- type: bullets
  title: Choosing a consistency model
  bullets:
  - For many web and social applications
  - E-commerce platforms, content delivery networks
  - Conversely, sensitive financial or health-related data often require strong consistency
    to
  - Design hinges on application needs and the consistency, availability
  notes: For many web and social applications, temporary discrepancies are acceptable
    and eventual consistency is a useful trade-off. E-commerce platforms, content
    delivery networks, and social media often favor availability and throughput. Conversely,
    sensitive financial or health-related data often require strong consistency to
    prevent critical errors. Design hinges on application needs and the consistency,
    availability, and scalability trade-offs already surveyed.
- type: bullets
  title: Takeaways
  bullets:
  - CAP says partitions force a choice between consistency and availability in practice
  - Sharding spreads keys; replication preserves availability after failures
  - Strong consistency fits ledgers and similar integrity-critical work
  - Match the model to whether stale reads or downtime hurts more
  notes: CAP says partitions force a choice between consistency and availability in
    practice. Sharding spreads keys; replication preserves availability after failures.
    Strong consistency fits ledgers and similar integrity-critical work; eventual
    consistency fits availability-first web and social stores. Match the model to
    whether stale reads or downtime hurts more.
