slides:
- type: title
  title: Chapter 12 — Dataset versioning tools
  subtitle: Chapter 8 covered team-scale documentation and Git-oriented version control
  notes: Chapter 8 covered team-scale documentation and Git-oriented version control.
    At platform scale, versioning must track large binaries and lakehouse tables.
    This part surveys DVC remotes, Pachyderm, Delta Lake time travel, and Iceberg
    snapshots.
- type: bullets
  title: Learning objectives
  bullets:
  - Iceberg snapshot rollback through Examples 12.14 through 12.17
  notes: By the end of this part, learners should be able to distinguish Chapter 8
    team versioning from Chapter 12 platform-scale lakehouse and object-store versioning;
    describe collaborative pinning of training runs to snapshots; and explain DVC
    remotes, Pachyderm partition recompute, Delta Lake time travel, and Iceberg snapshot
    rollback through Examples 12.14 through 12.17.
- type: bullets
  title: Collaborative workflows at scale
  bullets:
  - At scale, multiple engineers and models share the same raw and feature tables
  - Without immutable version identifiers
  - Teams pin training runs to explicit dataset revisions or snapshot IDs
  notes: At scale, multiple engineers and models share the same raw and feature tables.
    Without immutable version identifiers, notebooks drift to latest partitions and
    become unreproducible. Teams pin training runs to explicit dataset revisions or
    snapshot IDs, branch feature tables for parallel experiments, and record who promoted
    a candidate version into production—the same discipline as Chapter 8, applied
    to lakehouse and object-store layouts rather than only Git-tracked files.
- type: bullets
  title: Example 12.14 — DVC Remotes on Object Storage
  bullets:
  - Example 12.14 — hands-on module
  - For machine-learning projects whose primary assets are still files beside code
  - Example 12.14 ties DVC metadata to cloud remotes
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example14/`'
  notes: 'For machine-learning projects whose primary assets are still files beside
    code, DVC and Git LFS patterns from Chapter 8 remain useful. Example 12.14 ties
    DVC metadata to cloud remotes: a team keeps DVC hash files in Git while the actual
    training shards live in an S3 or GCS remote, so scalable object storage holds
    bytes and DVC records which version a run used. The example 14 module for this
    chapter summarizes that remote pattern.'
- type: bullets
  title: Example 12.15 — Pachyderm Partition Recompute
  bullets:
  - Example 12.15 — hands-on module
  - Pachyderm targets data-driven pipelines with automatic versioning of inputs and
    outputs
  - Example 12.15 shows pipeline versioning that recomputes only changed partitions
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example15/`'
  notes: 'Pachyderm targets data-driven pipelines with automatic versioning of inputs
    and outputs. Example 12.15 shows pipeline versioning that recomputes only changed
    partitions: a new raw partition triggers only downstream stages that depend on
    that slice rather than rebuilding the entire lake. The example 15 module for this
    chapter covers that selective recompute idea.'
- type: bullets
  title: Example 12.16 — Delta Lake Time Travel on Object Stores
  bullets:
  - Example 12.16 — hands-on module
  - Delta Lake, Apache Hudi
  - Example 12.16 uses Delta Lake
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example16/`'
  notes: 'Delta Lake, Apache Hudi, and Apache Iceberg store incremental changes and
    point-in-time snapshots on object storage, enabling ACID-style table operations
    and time travel without duplicating entire datasets. Example 12.16 uses Delta
    Lake: a transaction log over Parquet files on object storage lets teams time-travel
    to prior table versions without copying every file. The example 16 module for
    this chapter frames that time-travel pattern.'
- type: bullets
  title: Example 12.17 — Iceberg Snapshot Rollback
  bullets:
  - Example 12.17 — hands-on module
  - Snapshot-based versioning captures a point-in-time view of a table for rollback
    and
  - Example 12.17 rolls back via table snapshots
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example17/`'
  notes: 'Snapshot-based versioning captures a point-in-time view of a table for rollback
    and incremental processing across distributed nodes. Example 12.17 rolls back
    via table snapshots: Apache Iceberg and similar lakehouse formats expose snapshots
    so operators can point readers at a prior table state after a bad overwrite without
    restoring an entire warehouse backup. The example 17 module for this chapter summarizes
    that rollback path.'
- type: bullets
  title: File-level versus table-level versioning
  bullets:
  - DVC remains the file-and-pipeline companion when code, models
  - Lakehouse formats are the scalable counterpart to file-level DVC commits
  - Regulated domains still need an auditable history of which snapshot trained which
    model
  notes: 'DVC remains the file-and-pipeline companion when code, models, and large
    files share remotes. Lakehouse formats are the scalable counterpart to file-level
    DVC commits: they version partitions inside the storage layer. Regulated domains
    still need an auditable history of which snapshot trained which model, addressable
    across clusters and regions without copying every petabyte on each commit.'
- type: bullets
  title: Takeaways
  bullets:
  - Platform-scale versioning extends Chapter 8 discipline to object stores and lakehouse
  - DVC remotes record versions while cloud storage holds bytes
  - Pachyderm recomputes only changed partitions
  - Delta Lake and Iceberg provide time travel and snapshot rollback without full
    warehouse
  - Pin experiments to explicit snapshots rather than latest
  notes: Platform-scale versioning extends Chapter 8 discipline to object stores and
    lakehouse tables. DVC remotes record versions while cloud storage holds bytes.
    Pachyderm recomputes only changed partitions. Delta Lake and Iceberg provide time
    travel and snapshot rollback without full warehouse restores. Pin experiments
    to explicit snapshots rather than latest.
