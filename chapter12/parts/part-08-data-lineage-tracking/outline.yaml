title: Chapter 12 — Data lineage tracking
footer: Chapter 12 — Data Lineage Tracking
slides:
- type: title
  title: Chapter 12 — Data lineage tracking
  subtitle: Versioning records what changed; lineage records how data moved and transformed
  notes: Versioning records what changed; lineage records how data moved and transformed.
    This part defines provenance at platform scale, metadata and automated capture
    techniques, visualization for debugging, and cross-platform lineage gaps.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to define data lineage and
    why it matters for compliance and debugging; describe metadata management and
    automated capture with Examples 12.19 and 12.20; recognize catalog tools such
    as Apache Atlas and Amundsen; and explain cross-platform lineage gaps with Example
    12.22.
- type: bullets
  title: Definition and importance
  bullets:
  - Data lineage tracks where data came from, how it was transformed
  - Origin, transforms and aggregations, and downstream dependents
  - Chapter 8 covers provenance as documentation for individual datasets
  - Lakes, and engines
  notes: 'Data lineage tracks where data came from, how it was transformed, and which
    systems consume it. At scale, the same questions apply across dozens of pipelines
    rather than a single notebook: origin, transforms and aggregations, and downstream
    dependents. Chapter 8 covers provenance as documentation for individual datasets;
    Chapter 13 returns to research reproducibility. Here the focus is enterprise metadata
    platforms that capture table and stream movement across warehouses, lakes, and
    engines.'
- type: bullets
  title: Compliance and debugging
  bullets:
  - Regulated industries need lineage evidence for regimes such as GDPR and HIPAA
  - Large platforms also use lineage to debug broken dashboards by walking upstream
    transforms
  - Operational gains include proving which jobs touched regulated tables and coordinating
  notes: Regulated industries need lineage evidence for regimes such as GDPR and HIPAA.
    Large platforms also use lineage to debug broken dashboards by walking upstream
    transforms. Operational gains include proving which jobs touched regulated tables
    and coordinating ownership so parallel teams do not silently overwrite shared
    feature tables.
- type: bullets
  title: Example 12.19 — Lineage Metadata on Schema and Steps
  bullets:
  - Example 12.19 — hands-on module
  - 'Metadata is central to lineage: it describes source, format, transformations,
    and usage'
  - Example 12.19 lists fields that feed lineage views
  - Lineage catalogs record schema versions, transform job IDs
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example19/`'
  notes: 'Metadata is central to lineage: it describes source, format, transformations,
    and usage. Example 12.19 lists fields that feed lineage views. Lineage catalogs
    record schema versions, transform job IDs, and update timestamps so operators
    can reconstruct how a table was produced. The example 19 module for this chapter
    summarizes those metadata fields.'
- type: bullets
  title: Example 12.20 — Automated Lineage Capture on Model Runs
  bullets:
  - Example 12.20 — hands-on module
  - Automated tracking systems monitor pipelines and capture lineage without manual
    input
  - Example 12.20 captures lineage when a training job starts
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example20/`'
  notes: 'Automated tracking systems monitor pipelines and capture lineage without
    manual input. Example 12.20 captures lineage when a training job starts: an automated
    tracker records the input table version, feature job ID, and model artifact URI
    so later audits can reconstruct the run. The example 20 module for this chapter
    covers that capture pattern.'
- type: bullets
  title: Tools and Example 12.21
  bullets:
  - Example 12.21 — hands-on module
  - Apache Atlas is an open-source metadata and governance tool for lineage, cataloging
  - Amundsen, developed at Lyft, emphasizes data discovery and integrates with Airflow
    and dbt
  - Example 12.21 uses lineage graphs to find a bad filter step
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example21/`'
  notes: 'Apache Atlas is an open-source metadata and governance tool for lineage,
    cataloging, and security, with strong Hadoop ecosystem integration and lineage
    visualization. Amundsen, developed at Lyft, emphasizes data discovery and integrates
    with Airflow and dbt for pipeline lineage. Example 12.21 uses lineage graphs to
    find a bad filter step: a lineage UI can show how a cohort table was filtered
    and joined so analysts locate which transform introduced an empty partition. The
    example 21 module for this chapter frames that debugging use case.'
- type: bullets
  title: Example 12.22 — Cross-Platform Lineage Gaps
  bullets:
  - Example 12.22 — hands-on module
  - The distinctive platform-scale challenge is cross-system coverage
  - Organizations mix cloud storage, Spark, Hadoop, Kafka, and machine-learning platforms
  - Example 12.22 shows lineage breaking across boundaries
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example22/`'
  notes: 'The distinctive platform-scale challenge is cross-system coverage. Organizations
    mix cloud storage, Spark, Hadoop, Kafka, and machine-learning platforms; connectors
    that omit a hop create gaps. Example 12.22 shows lineage breaking across boundaries:
    data may land in object storage, transform in Spark, then train in an ML platform;
    without connectors, lineage stops at each boundary and audits cannot walk the
    full path. The example 22 module for this chapter summarizes that gap risk.'
- type: bullets
  title: Takeaways
  bullets:
  - Lineage answers origin, transform, and dependency questions across pipelines
  - Metadata and automated capture keep records current
  - Visualization helps debug empty partitions and broken dashboards
  - Cross-platform gaps remain the hard problem when connectors stop at system boundaries
  - Distinguish Chapter 8 per-dataset provenance from Chapter 12 platform catalogs
  notes: Lineage answers origin, transform, and dependency questions across pipelines.
    Metadata and automated capture keep records current; Atlas and Amundsen illustrate
    enterprise catalogs. Visualization helps debug empty partitions and broken dashboards.
    Cross-platform gaps remain the hard problem when connectors stop at system boundaries.
    Distinguish Chapter 8 per-dataset provenance from Chapter 12 platform catalogs.
