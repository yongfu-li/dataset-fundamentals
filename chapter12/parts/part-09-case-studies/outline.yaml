  notes: Example 12.24 sketches Spotify-style analytics on listening events. Music
    platforms stream listening events into cloud storage and real-time analytics so
    recommendations and charts update without nightly batch-only warehouses. A mix
    of SQL and NoSQL stores with frameworks such as Apache Spark lets the infrastructure
    absorb traffic spikes and serve millions of users globally. The example 24 module
    for this chapter frames that analytics pipeline.
