  - Durability and access control matter as much as raw throughput in regulated clinical
  - Explore the chapter example module
  - 'View files: `modules/chapter12/example25/`'
  notes: Example 12.25 applies scalable stores to clinical imaging archives. Healthcare
    imaging vendors store large DICOM archives in object storage with governed access
    so studies remain durable while analytics run on derived feature tables. Durability
    and access control matter as much as raw throughput in regulated clinical settings.
    The example 25 module for this chapter covers that imaging pattern.
