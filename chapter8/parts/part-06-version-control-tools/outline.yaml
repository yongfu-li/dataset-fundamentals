- type: bullets
  title: Git LFS for large binaries beside Git
  bullets:
  - Git Large File Storage stores heavy binaries outside the main repository while
    keeping
  - It is a strong fit when models or datasets must version with code but would bloat
    an
  - It tracks files rather than full data pipelines or rich dataset catalogs
  notes: Git Large File Storage stores heavy binaries outside the main repository
    while keeping lightweight pointers and familiar Git commands. It is a strong fit
    when models or datasets must version with code but would bloat an ordinary Git
    history. It tracks files rather than full data pipelines or rich dataset catalogs.
- type: bullets
  title: Example 8.24 — Git LFS for Large Training Artifacts
  bullets:
  - Example 8.24 — hands-on module
  - Example 8.24 applies Git LFS when training datasets and model files exceed ordinary
    Git
  - Pointers stay in Git while content lives in LFS storage
  - Explore the chapter example module
  - 'View files: `modules/chapter8/example24/`'
  notes: Example 8.24 applies Git LFS when training datasets and model files exceed
    ordinary Git limits. Pointers stay in Git while content lives in LFS storage,
    preserving history without an oversized clone. Learners can inspect the module
    files and listing for this example to see how LFS tracking is described in practice.
- type: bullets
  title: Matching tool to job
  bullets:
  - Prefer Quilt when teams need browsable package catalogs
  - Many organizations combine tools rather than forcing one system to do every job
  notes: Prefer Quilt when teams need browsable package catalogs; DataHub when governance
    and discovery across platforms dominate; Git LFS when large artifacts must sit
    beside code without pipeline orchestration; DVC when remotes plus reproducible
    stages are central. Many organizations combine tools rather than forcing one system
    to do every job.
- type: bullets
  title: Takeaways
  bullets:
  - Tool choice follows workload shape
  - Quilt and DataHub strengthen sharing and discovery
  - Misalignment
  notes: Tool choice follows workload shape. Quilt and DataHub strengthen sharing
    and discovery; Git LFS strengthens large-file versioning beside Git; DVC remains
    the pipeline-oriented companion introduced earlier. Misalignment—such as stuffing
    giant binaries into plain Git—creates the pain these tools were built to avoid.
