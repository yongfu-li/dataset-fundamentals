title: Chapter 8 — Version control tools
footer: Chapter 8 — Version Control Tools
slides:
- type: title
  title: Chapter 8 — Version control tools
  subtitle: Git and DVC are not the only options
  notes: Git and DVC are not the only options. This part compares Quilt and DataHub
    for package-style catalogs and evolving feeds, then shows when Git LFS is the
    right layer for large training artifacts that still belong beside a Git repository.
- type: bullets
  title: Learning objectives
  bullets:
  - Choose among tools using size, collaboration, and metadata needs
  notes: By the end of this part, learners should be able to describe Quilt’s package-style
    sharing, explain DataHub’s role for metadata and feed versions, state when Git
    LFS fits large files, and choose among tools using size, collaboration, and metadata
    needs.
- type: bullets
  title: Choosing among versioning tools
  bullets:
  - Practical choice depends on file size, collaboration model, metadata depth
  - Git suits small text-like assets
  notes: Practical choice depends on file size, collaboration model, metadata depth,
    and whether executable pipelines are required. Git suits small text-like assets;
    Git LFS keeps large files as pointers; DVC adds remotes and pipelines; Quilt emphasizes
    package catalogs; DataHub emphasizes discovery, ownership, and lineage across
    platforms.
