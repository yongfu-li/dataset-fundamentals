title: Chapter 8 — Case studies
footer: Chapter 8 — Case Studies
slides:
- type: title
  title: Chapter 8 — Case studies
  subtitle: Abstract practices become concrete in domain settings
  notes: Abstract practices become concrete in domain settings. This part shows documentation
    and versioning at work in climate-agriculture research, predictive maintenance,
    and clinical-trial collaboration—each with different sharing, reproducibility,
    and compliance pressures.
- type: bullets
  title: Learning objectives
  bullets:
  - Outline governed package sharing for clinical collaboration with role-based access
  notes: By the end of this part, learners should be able to describe how research
    multi-source datasets use shared templates and version tags, explain DVC pinning
    for industrial sensor retraining, and outline governed package sharing for clinical
    collaboration with role-based access.
- type: bullets
  title: Research, industry, and clinical stakes
  bullets:
  - Research reuse fails when undocumented transforms hide in informal notes
  - Industrial retraining fails when two runs use different sensor snapshots under
    the same
  - Clinical collaboration fails when sensitive releases lack auditability and access
    control
  - The case studies map practices to those failure modes
  notes: Research reuse fails when undocumented transforms hide in informal notes.
    Industrial retraining fails when two runs use different sensor snapshots under
    the same code checkout. Clinical collaboration fails when sensitive releases lack
    auditability and access control. The case studies map practices to those failure
    modes.
- type: bullets
  title: Example 8.38 — Climate Agriculture Research Case Study
  bullets:
  - Example 8.38 — hands-on module
  - Socioeconomic indicators across teams
  - One metadata template, one dictionary
  - Explore the chapter example module
  - 'View files: `modules/chapter8/example38/`'
  notes: Example 8.38 follows a multi-year climate agriculture corpus combining satellite
    imagery, weather, yields, and socioeconomic indicators across teams. One metadata
    template, one dictionary, and one provenance record per release—with version tags—let
    external collaborators interpret and audit without reconstructing history. Inspect
    the JSON listing and module files for this example to see a variable-level documentation
    fragment.
- type: code
  title: Example 8.38 — listing
  code: "{\n  \"precipitation_mm\": {\n    \"description\": \"Monthly precipitation\
    \ in millimeters\",\n    \"source\": \"Satellite-derived weather product\",\n\
    \    \"unit\": \"mm\",\n    \"method\": \"Interpolated before regional aggregation\"\
    \n  }\n}"
- type: bullets
  title: Example 8.39 — Predictive Maintenance Versioning Case Study
  bullets:
  - Example 8.39 — hands-on module
  - Example 8.39 centers on daily factory sensor feeds and failure-prediction retraining
  - DVC tracks each raw batch, preprocessing output
  - Explore the chapter example module
  - 'View files: `modules/chapter8/example39/`'
  notes: Example 8.39 centers on daily factory sensor feeds and failure-prediction
    retraining. DVC tracks each raw batch, preprocessing output, and model artifact,
    pairing dataset tags with model tags so April failures can recover the matching
    snapshot and pipeline. Learners can inspect the command listing and module files
    for this example to see the add-commit-push pattern in context.
- type: code
  title: Example 8.39 — listing
  code: 'dvc add sensor_data/April_2024.csv

    git commit -m "Added April 2024 sensor data"

    dvc push'
- type: bullets
  title: Example 8.40 — Clinical Trial Collaboration Case Study
  bullets:
  - Example 8.40 — hands-on module
  - Example 8.40 involves clinical data managers, statisticians, regulators
  - A governed catalog, release notes, role-restricted access
  - Explore the chapter example module
  - 'View files: `modules/chapter8/example40/`'
  notes: Example 8.40 involves clinical data managers, statisticians, regulators,
    and machine learning engineers sharing sensitive patient data. A governed catalog,
    release notes, role-restricted access, and links from package versions to analyses
    support compliance across time zones. Review the module files for this example
    for the package-push collaboration pattern.
- type: code
  title: Example 8.40 — listing
  code: 'quilt push my_dataset_v1

    quilt push my_dataset_v2'
- type: bullets
  title: Cross-case lessons
  bullets:
  - Shared templates and provenance scale multi-collector research
  - Pinning data to models stabilizes industrial retraining
  - Governed catalogs with audit logs stabilize regulated collaboration
  - Across domains
  notes: Shared templates and provenance scale multi-collector research. Pinning data
    to models stabilizes industrial retraining. Governed catalogs with audit logs
    stabilize regulated collaboration. Across domains, documentation and version control
    succeed only when they are release habits, not after-the-fact essays.
- type: bullets
  title: Takeaways
  bullets:
  - Climate research needs coherent multi-source documentation
  - The same chapter principles adapt to each constraint without requiring identical
    tooling
  notes: Climate research needs coherent multi-source documentation; predictive maintenance
    needs DVC-style pins from sensors to models; clinical trials need access-controlled,
    auditable package versions. The same chapter principles adapt to each constraint
    without requiring identical tooling.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Emerging ideas such as auditability mechanisms and edge-sensor version sync
  notes: The final part looks beyond static README files and manual commits toward
    auto-generated metadata, lineage-aware pipelines, and emerging ideas such as auditability
    mechanisms and edge-sensor version sync.
