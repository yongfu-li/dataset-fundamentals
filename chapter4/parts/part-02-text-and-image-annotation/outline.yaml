  title: Example 4.15 — Segmentation on medical images
  bullets:
  - Example 4.15 — hands-on module
  - Example 4.15 shows a clinical mask task
  - Enabling supervised segmentation training
  - Masks demand more effort per object than boxes but reward applications where boundary
  - Explore the chapter example module
  - 'View files: `modules/chapter4/example15/`'
  notes: Example 4.15 shows a clinical mask task. Annotators outline a tumor region
    on a scan so every pixel inside the contour receives the tumor class, enabling
    supervised segmentation training. Masks demand more effort per object than boxes
    but reward applications where boundary precision matters. Open the example 15
    module for this chapter to compare mask labels with box labels.
- type: bullets
  title: Takeaways
  bullets:
  - Text pipelines combine tokenization with sentiment, entity, or syntactic tags
  - Image work chooses among boxes, masks, and landmarks based on task precision and
    cost
  - Format choice belongs in the guideline before scale-up, because relabeling is
    expensive
  notes: Text pipelines combine tokenization with sentiment, entity, or syntactic
    tags. Image work chooses among boxes, masks, and landmarks based on task precision
