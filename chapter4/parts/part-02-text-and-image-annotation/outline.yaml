- type: bullets
  title: Image annotation formats
  bullets:
  - Image annotation marks objects or regions for computer vision
  - Three frequent formats are bounding boxes, segmentation masks, and landmarks
  - Bounding boxes are axis-aligned rectangles around objects of interest and dominate
    many
  - Which matters in medical imaging and fine-grained scene parsing
  - Landmarking places keypoints on faces or bodies for recognition and pose estimation
  notes: Image annotation marks objects or regions for computer vision. Three frequent
    formats are bounding boxes, segmentation masks, and landmarks. Bounding boxes
    are axis-aligned rectangles around objects of interest and dominate many detection
    benchmarks. Segmentation assigns pixel-level or polygon labels and yields tighter
    boundaries than boxes, which matters in medical imaging and fine-grained scene
    parsing. Landmarking places keypoints on faces or bodies for recognition and pose
    estimation.
- type: bullets
  title: Example 4.14 — Bounding boxes for detection
  bullets:
