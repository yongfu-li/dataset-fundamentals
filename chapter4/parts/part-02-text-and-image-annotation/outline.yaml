  subtitle: The introduction showed what labeled data look like in each modality
  notes: 'The introduction showed what labeled data look like in each modality. This
    part turns to the label operations teams specify in guidelines: tokenization,
    sentiment, named entities, and part-of-speech for text; bounding boxes, segmentation,
    and landmarks for images.'
- type: bullets
