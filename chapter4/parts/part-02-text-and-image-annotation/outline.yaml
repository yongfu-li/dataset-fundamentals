  notes: By the end of this part, you should describe common text annotation building
    blocks, contrast bounding boxes, segmentation masks, and landmarks as image formats,
    and match each technique to typical natural language processing and computer-vision
    tasks.
- type: bullets
  title: Text annotation building blocks
  bullets:
  - Text annotation supports classification, information extraction, and retrieval
  - Common building blocks include tokenization, sentiment tagging, named entity recognition
  - Tokenization splits text into words
  - Sentiment tagging assigns polarity to spans or documents
  - Named entity recognition identifies and types entities such as people, organizations
  - Part-of-speech tagging assigns syntactic categories to tokens
  notes: Text annotation supports classification, information extraction, and retrieval.
    Common building blocks include tokenization, sentiment tagging, named entity recognition,
    and part-of-speech tagging. Tokenization splits text into words, subwords, or
    characters as a prerequisite for most taggers. Sentiment tagging assigns polarity
    to spans or documents. Named entity recognition identifies and types entities
    such as people, organizations, and locations. Part-of-speech tagging assigns syntactic
    categories to tokens.
