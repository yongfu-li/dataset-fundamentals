  notes: Example 4.14 states the box format in a driving schema. In a self-driving
    corpus, rectangles may enclose cars, people, and road signs with a class label
    for each instance. Box tightness, occlusion handling, and consistent class names
    directly affect detector training. Open the example 14 module for this chapter
    to review a detection-oriented schema.
