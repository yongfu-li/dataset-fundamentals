title: Chapter 4 — Tools for data annotation
footer: Chapter 4 — 05 Tools For Annotation
slides:
- type: title
  title: Chapter 4 — Tools for data annotation
  subtitle: Technique choices become operational through annotation platforms
  notes: Technique choices become operational through annotation platforms. This part
    maps open-source editors and commercial platforms to modality needs, lists four
    features every production tool should provide, and walks a minimal object-detection
    workflow with LabelImg.
- type: bullets
  title: Learning objectives
  bullets:
  - Name representative open-source and commercial annotation tools
  - Outline a minimal bounding-box workflow suitable for small detection projects
  notes: By the end of this part, you should name representative open-source and commercial
    annotation tools, list four features effective platforms should provide, and outline
    a minimal bounding-box workflow suitable for small detection projects.
- type: bullets
  title: Open-source annotation tools
  bullets:
  - Open-source tools suit research teams and pilots that need customization without
    license
  - Common in small object-detection projects tied to benchmarks such as PASCAL VOC
    and COCO
  - Label Studio supports text, image, audio
  - Team workflows for larger vision efforts
  notes: Open-source tools suit research teams and pilots that need customization
    without license cost. LabelImg provides a lightweight interface for drawing bounding
    boxes and exporting PASCAL VOC-style XML, common in small object-detection projects
    tied to benchmarks such as PASCAL VOC and COCO. Label Studio supports text, image,
    audio, and video with configurable templates and optional model-assisted pre-labeling
    that implements the semi-automated pattern from the previous part. CVAT—the Computer
    Vision Annotation Tool—targets image and video with boxes, polygons, tracks, and
    team workflows for larger vision efforts.
- type: bullets
  title: Commercial annotation platforms
  bullets:
  - Commercial platforms add managed workforces, service-level agreements
  - Vendors such as Scale AI and Appen combine tooling with contracted annotators
  - NLP-focused products such as Prodigy emphasize tight active-learning loops for
    text
  - Product names change quickly
  - Many teams prototype in open-source tools and move to commercial platforms when
    scale or
  notes: Commercial platforms add managed workforces, service-level agreements, and
    enterprise integrations for high-volume programs. Vendors such as Scale AI and
    Appen combine tooling with contracted annotators. NLP-focused products such as
    Prodigy emphasize tight active-learning loops for text. Product names change quickly;
    treat the list as illustrative of capability classes rather than an endorsement
    ranking. Many teams prototype in open-source tools and move to commercial platforms
    when scale or managed quality assurance becomes the bottleneck.
- type: bullets
  title: Four required platform features
  bullets:
  - Match the tool to modality and workflow
  - Also check collaboration, export formats, API hooks for pre-labeling
  - Hooks for quality review such as duplicate labeling or adjudication queues
  - If a candidate tool lacks those four
  notes: 'Match the tool to modality and workflow: vision-heavy projects need box,
    mask, or track support; natural language processing projects need span and document
    interfaces. Also check collaboration, export formats, API hooks for pre-labeling,
    and whether inter-annotator agreement or audit trails are built in. Effective
    platforms typically provide schema definition and validation, role-based collaboration,
    version history or export snapshots, and hooks for quality review such as duplicate
    labeling or adjudication queues. If a candidate tool lacks those four, plan external
    quality-control processes before production labeling.'
- type: bullets
  title: Example 4.29 — LabelImg box-label workflow
  bullets:
  - Example 4.29 — hands-on module
  - Example 4.29 summarizes a minimal LabelImg path for object detection
  - Save VOC-compatible XML for downstream training
  - Before scaling, review a handful of exports to confirm class names, box tightness
  - The same export-check habit applies to other box editors
  - 'View files: `modules/chapter4/example29/`'
  notes: Example 4.29 summarizes a minimal LabelImg path for object detection. Install
    the editor, open an image directory, draw a rectangle per object, assign a class
    label, and save VOC-compatible XML for downstream training. Before scaling, review
    a handful of exports to confirm class names, box tightness, and consistent handling
    of occluded objects. The same export-check habit applies to other box editors.
    Open the example 29 module for this chapter to follow the workflow checklist.
- type: bullets
  title: Choosing tools for your program
  bullets:
  - Selection depends on modality, scale, integration with machine learning workflows
  - Open-source options favor customization and bring-your-own annotators
  - The right choice is the one that supports your schema, collaboration model
  notes: Selection depends on modality, scale, integration with machine learning workflows,
    and budget. Open-source options favor customization and bring-your-own annotators;
    commercial options favor volume, managed labor, and SLA-bound programs. The right
    choice is the one that supports your schema, collaboration model, and QC gates—not
    the flashiest demo.
- type: bullets
  title: Takeaways
  bullets:
  - LabelImg, Label Studio, and CVAT cover common research and vision needs
  - Require schema validation, collaboration, versioned exports, and QC hooks
  - Always audit a small export batch before labeling thousands of images
  notes: LabelImg, Label Studio, and CVAT cover common research and vision needs;
    commercial vendors add managed scale. Require schema validation, collaboration,
    versioned exports, and QC hooks. Always audit a small export batch before labeling
    thousands of images.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Annotator training
  notes: Pause for the quiz, then continue to the next part on quality control—annotation
    errors, inter-annotator agreement, gold-set audits, and annotator training.
