  - 'View files: `modules/chapter4/example1/`'
  notes: Example 4.1 shows a compact natural language processing case. In a text corpus,
    tokens or spans may be tagged with parts of speech, sentiment, or named-entity
    types so a supervised model can learn those categories from examples. Open the
    example 1 module for this chapter to see how a minimal text schema pairs raw tokens
    with label types.
- type: bullets
  title: Example 4.2 — Sentiment on customer feedback
  bullets:
  - Example 4.2 — hands-on module
  - Example 4.2 illustrates document-level sentiment
  - In a customer feedback survey
  - The label operation is simple
  - Explore the chapter example module
  - 'View files: `modules/chapter4/example2/`'
  notes: Example 4.2 illustrates document-level sentiment. In a customer feedback
    survey, a sentence such as “The service was excellent” may be labeled positive,
    while “The product was disappointing” may be labeled negative. The label operation
    is simple, but guideline clarity matters when tone is mixed or sarcastic. Open
    the example 2 module for this chapter to compare positive and negative spans.
- type: bullets
  title: Example 4.3 — Named entities in text
  bullets:
  - Example 4.3 — hands-on module
  - Example 4.3 shows entity typing in a factual sentence
  - In “Barack Obama was born in Hawaii,” the person span and the location span receive
  - Boundary decisions, where a span starts and ends, are as important as the class
    name
  - Explore the chapter example module
  - 'View files: `modules/chapter4/example3/`'
  notes: Example 4.3 shows entity typing in a factual sentence. In “Barack Obama was
    born in Hawaii,” the person span and the location span receive distinct entity
    types under a standard named-entity recognition schema. Boundary decisions—where
    a span starts and ends—are as important as the class name. Open the example 3
    module for this chapter to inspect the span schema.
- type: bullets
  title: Previews across image, audio, and video
  bullets:
  - The chapter also previews labels beyond text
  - Image annotation marks visual entities with bounding boxes
  - Audio annotation aligns transcripts
  - Video annotation extends spatial labeling across frames so perception stacks can
    track
  - Later clips deepen each modality
  notes: The chapter also previews labels beyond text. Image annotation marks visual
    entities with bounding boxes, segmentation masks, or facial landmarks so computer-vision
    models can localize and classify them. Audio annotation aligns transcripts, speaker
    identities, or emotion tags with time ranges for speech and affect tasks. Video
    annotation extends spatial labeling across frames so perception stacks can track
    objects and recognize activities over time. Later clips deepen each modality;
    the static course site includes image, audio, and video previews where examples
    exist.
- type: bullets
  title: Takeaways
  bullets:
  - Annotation attaches task-defined labels that supervised learning depends on
  - Label quality often caps accuracy more than model choice alone
  - Text, image, audio
  notes: Remember three points. Annotation attaches task-defined labels that supervised
    learning depends on. Label quality often caps accuracy more than model choice
    alone. Text, image, audio, and video each need different label schemas, and inconsistent
    labels teach the wrong decision boundaries.
