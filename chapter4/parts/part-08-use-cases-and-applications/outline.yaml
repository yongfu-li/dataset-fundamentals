  title: Chapter 4 — Use cases and applications
  subtitle: Abstract schemas become concrete in domain settings
  notes: Abstract schemas become concrete in domain settings. This part shows how
    annotation choices play out in autonomous driving, medical imaging, e-commerce
    catalogs, and emerging geospatial and augmented-reality workflows.
- type: bullets
  title: Learning objectives
  bullets:
  - Describe annotation demands in autonomous driving and medical imaging
  - Recognize temporal and spatial consistency needs in emerging geospatial and
  notes: By the end of this part, you should describe annotation demands in autonomous
    driving and medical imaging, explain catalog and review labeling in e-commerce,
    and recognize temporal and spatial consistency needs in emerging geospatial and
    augmented-reality applications.
- type: bullets
  title: Case study — Autonomous vehicles
  bullets:
  - Lane markings
  - Labels feed perception and planning stacks
  - Quality-control practices and geographic diversity in collection matter as much
    as volume
  notes: 'Autonomous driving requires large labeled corpora of road scenes with pedestrians,
    vehicles, signs, and lane markings. Labels feed perception and planning stacks;
    errors in box placement or class choice directly affect safety-critical behavior.
    Quality-control practices and geographic diversity in collection matter as much
    as volume: a detector trained only on sunny highways may fail in rain or unfamiliar
    regions.'
- type: bullets
  title: Case study — Healthcare
  bullets:
  - Medical imaging annotation marks lesions
  - Expert clinicians typically validate or produce gold labels
  - Privacy and consent constraints govern what can be labeled and shared
  - Segmentation precision often matters more than coarse boxes because boundary errors
    can
  notes: Medical imaging annotation marks lesions, organs, or findings on radiology
    and pathology images so diagnostic models can learn localized patterns. Expert
    clinicians typically validate or produce gold labels. Privacy and consent constraints
    govern what can be labeled and shared. Segmentation precision often matters more
    than coarse boxes because boundary errors can change clinical interpretation.
- type: bullets
  title: Case study — E-commerce
  bullets:
  - Retail catalogs use category and attribute labels for search, recommendations
  - Product taxonomies and review polarity labels must stay consistent across locales
    and
  - A shoe labeled “sneaker” in one locale and “trainer” in another without a mapped
    taxonomy
  notes: Retail catalogs use category and attribute labels for search, recommendations,
    and review sentiment. Product taxonomies and review polarity labels must stay
    consistent across locales and product lines to avoid fragmented training signal.
    A shoe labeled “sneaker” in one locale and “trainer” in another without a mapped
    taxonomy splits the class signal much like inconsistent annotator strings.
