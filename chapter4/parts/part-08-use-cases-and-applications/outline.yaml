  notes: Augmented reality needs spatially registered object labels so virtual content
    aligns with the physical scene. Climate and remote-sensing workflows need geospatial
    segmentation over time series, not just single snapshots. Both stress temporal
    consistency and domain-expert review beyond single-frame box labeling. Emerging
    domains reuse the same modality techniques from earlier parts but raise the cost
    of inconsistency across space and time.
- type: bullets
  title: Takeaways
  bullets:
  - Autonomous driving couples volume with safety-critical QC
  - Healthcare pairs expert gold labels with privacy governance
  - E-commerce needs stable taxonomies across locales
  - Emerging AR and geospatial work add temporal consistency to spatial labels
  notes: Autonomous driving couples volume with safety-critical QC. Healthcare pairs
