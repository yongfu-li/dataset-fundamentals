title: Chapter 3 — Bias and fairness
footer: Chapter 3 — Bias And Fairness
slides:
- type: title
  title: Chapter 3 — Bias and fairness
  subtitle: Bias and fairness connect ethical principles to model outcomes once systems
    affect hiring
  notes: Bias and fairness connect ethical principles to model outcomes once systems
    affect hiring, credit, healthcare, or public safety. This part gives a chapter-level
    overview; Chapter 7 is the authoritative home for taxonomies, metrics, tools,
    and mitigation pipelines.
- type: bullets
  title: Learning objectives
  bullets:
  - Define bias in data work
  - List five mitigation habits at the ethics-chapter level
  notes: By the end of this part, you should define bias in data work, distinguish
    selection from algorithmic bias, recognize two landmark case pointers, and list
    five mitigation habits at the ethics-chapter level.
- type: bullets
  title: What bias means here
  bullets:
  - Bias means systematic deviations in collection
  - Data are not neutral mirrors
  - Example 3.17 states the general risk
  notes: 'Bias means systematic deviations in collection, labeling, analysis, or modeling
    that yield unfair or inaccurate outcomes for some groups. Data are not neutral
    mirrors—they reflect institutions and power relations that already discriminate.
    Example 3.17 states the general risk: systems trained on biased data can disproportionately
    harm underrepresented or historically mistreated groups.'
- type: bullets
  title: Example 3.17 — Bias in AI system
  bullets:
  - Example 3.17 — hands-on module
  - Example 3.17 highlights domains where errors change life chances, hiring, criminal
    justice
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example17/`'
  notes: Example 3.17 highlights domains where errors change life chances—hiring,
    criminal justice, and healthcare—not only click-through rates. Open the example
    17 module for this chapter to map harm pathways. Fairness was already a design
    constraint in Section 3.2; here we connect it to data and models.
- type: bullets
  title: Selection bias
  bullets:
  - So error concentrates on underrepresented groups
  - Collection design in Chapter 2 is often where skew begins
  - Example 3.18 shows a diagnostic model trained mainly on one demographic slice
  notes: Selection bias arises when training data are not representative of the population
    that will be scored, so error concentrates on underrepresented groups. Collection
    design in Chapter 2 is often where skew begins. Example 3.18 shows a diagnostic
    model trained mainly on one demographic slice—performance degrades for groups
    scarce in training.
- type: bullets
  title: Example 3.18 — Selection bias in healthcare AI
  bullets:
  - Example 3.18 — hands-on module
  - Example 3.18 relates to the non-maleficence vignette in Example 3.2
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example18/`'
  notes: 'Example 3.18 relates to the non-maleficence vignette in Example 3.2: the
    model never saw a representative sample of the patients it will score. Try the
    example 18 module to review representation gaps before deployment.'
- type: bullets
  title: Algorithmic bias
  bullets:
  - Thresholds can still allocate error unevenly
  - Example 3.19 restates hiring rankers that reproduce gender or racial patterns
    via proxies
  notes: Algorithmic bias arises from model design even when sampling looks balanced—features,
    objectives, and thresholds can still allocate error unevenly. Example 3.19 restates
    hiring rankers that reproduce gender or racial patterns via proxies even when
    protected attributes are omitted.
- type: bullets
  title: Case study pointer — COMPAS
  bullets:
  - Example 3.20 points to COMPAS recidivism tools
  - The ethics lesson matches Example 3.8, overall accuracy is not a fairness certificate
  - Chapter 7 develops detection and impact analysis for this case
  notes: 'Example 3.20 points to COMPAS recidivism tools: disparate error rates across
    racial groups under common thresholds, reflecting disparities already present
    in historical justice data. The ethics lesson matches Example 3.8—overall accuracy
    is not a fairness certificate. Chapter 7 develops detection and impact analysis
    for this case.'
- type: bullets
  title: Mitigation checklist
  bullets:
  - Addressing bias requires better data, explicit fairness criteria
  - At this chapter's level
  notes: 'Addressing bias requires better data, explicit fairness criteria, and continuous
    monitoring—not a single algorithmic patch. At this chapter''s level: improve representation
    at collection and labeling time; audit subgroup error before release; choose and
    document a fairness criterion; apply mitigation matched to the failure mode; and
    include diverse review of requirements and features.'
- type: bullets
  title: Takeaways
  bullets:
  - Fairness work is continuous governance after the principles in Section 3.2
  - Selection and algorithmic bias are frequent entry points
  - Landmark cases illustrate mechanisms
  notes: Fairness work is continuous governance after the principles in Section 3.2—not
    a one-time training fix. Selection and algorithmic bias are frequent entry points.
    Landmark cases illustrate mechanisms; Chapter 7 supplies measurement once you
    choose which fairness claim to defend.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to real-world privacy laws, GDPR, HIPAA, CCPA, and selected other regimes
  notes: Pause for the quiz, then continue to real-world privacy laws—GDPR, HIPAA,
    CCPA, and selected other regimes.
