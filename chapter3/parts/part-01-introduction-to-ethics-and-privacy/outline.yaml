title: Chapter 3 — Introduction to ethics and privacy
footer: Chapter 3 — 01 Introduction To Ethics And Privacy
slides:
- type: title
  title: Chapter 3 — Introduction to ethics and privacy
  subtitle: Chapter 2 asked how records enter a dataset
  notes: Chapter 2 asked how records enter a dataset. This chapter asks what obligations
    attach once those records concern people. This opening part defines ethics and
    privacy, shows how they reinforce each other, and frames ethical data work as
    a lifecycle-wide coordination problem.
- type: bullets
  title: Learning objectives
  bullets:
  - Distinguish ethics from privacy, name stakeholders affected across the dataset
    lifecycle
  - Explain why compliance alone does not guarantee ethical practice
  notes: By the end of this part, you should distinguish ethics from privacy, name
    stakeholders affected across the dataset lifecycle, and explain why compliance
    alone does not guarantee ethical practice.
- type: bullets
  title: Why ethics and privacy matter now
  bullets:
  - Data-driven systems shape decisions in healthcare, finance, marketing, and government
  - As collection and use scale
  - Misuse can enable identity theft, fraud, discrimination
  notes: Data-driven systems shape decisions in healthcare, finance, marketing, and
    government. As collection and use scale, teams face a duty to handle personal
    information transparently, fairly, and accountably. Misuse can enable identity
    theft, fraud, discrimination, and loss of autonomy—even without a headline breach,
    opaque practices erode trust.
- type: bullets
  title: Defining ethics and privacy
  bullets:
  - In data work, ethics refers to principles that guide how data are collected, used,
    shared
  - Privacy denotes individuals' rights to control personal data
  - Ethics asks whether a use should proceed
  notes: 'In data work, ethics refers to principles that guide how data are collected,
    used, shared, and governed—fairness, transparency, accountability, and non-maleficence.
    Privacy denotes individuals'' rights to control personal data: to consent, to
    know what is collected and why, and often to access, correct, or delete records.
    Ethics asks whether a use should proceed; privacy constrains how permitted uses
    are implemented.'
- type: bullets
  title: Ethics versus privacy at a glance
  bullets:
  - Ethics focuses on who is harmed or helped and whether uses are fair and accountable
  - Privacy focuses on meaningful consent and individual control
  - A team can be legally compliant yet ethically weak if uses are opaque or discriminatory
  notes: Ethics focuses on who is harmed or helped and whether uses are fair and accountable.
    Privacy focuses on meaningful consent and individual control. A team can be legally
    compliant yet ethically weak if uses are opaque or discriminatory; a privacy notice
    alone does not make a pipeline ethical if foreseeable harms are ignored.
- type: bullets
  title: Lifecycle and stakeholders
  bullets:
  - Documentation
  - Stakeholders include practitioners, leaders, policymakers
  - No single role owns the full obligation
  notes: Ethics binds every stage—not only model release but collection, annotation,
    cleaning, exploration, and documentation. Stakeholders include practitioners,
    leaders, policymakers, and centrally data subjects whose records are at stake.
    No single role owns the full obligation.
- type: bullets
  title: Example 3.1 — Stakeholders in a wellness app launch
  bullets:
  - Example 3.1 — hands-on module
  - Example 3.1 compresses those roles into one product decision
  - Product wants finer activity tracking
  - Ethical design must negotiate utility, consent, and minimization together
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example1/`'
  notes: Example 3.1 compresses those roles into one product decision. Product wants
    finer activity tracking; legal wants clearer consent; executives want partner
    sharing; users want control over heart-rate history. Ethical design must negotiate
    utility, consent, and minimization together. Open the example 1 module for this
    chapter to review the stakeholder map.
- type: bullets
  title: Takeaways
  bullets:
  - Ethics and privacy are distinct but mutually reinforcing
  - Obligations span the full dataset lifecycle, not only deployment
  - Ethical data work is coordinated across roles, utility, consent
  notes: Remember three points. Ethics and privacy are distinct but mutually reinforcing.
    Obligations span the full dataset lifecycle, not only deployment. Ethical data
    work is coordinated across roles—utility, consent, and revenue pressure collide
    in ordinary feature decisions.
- type: bullets
  title: Next
  bullets:
