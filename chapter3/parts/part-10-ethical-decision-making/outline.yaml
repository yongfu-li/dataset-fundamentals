title: Chapter 3 — Ethical decision-making
footer: Chapter 3 — 10 Ethical Decision Making
slides:
- type: title
  title: Chapter 3 — Ethical decision-making
  subtitle: When utility, rights, fairness
  notes: When utility, rights, fairness, and organizational pressure pull in different
    directions, teams need structured ways to choose among imperfect options. This
    part introduces four classical lenses, applies them to two dilemmas, and stresses
    stakeholder involvement before launch.
- type: bullets
  title: Learning objectives
  bullets:
  - Describe utilitarian, rights-based, virtue
  - Justice reasoning
  - Explain why stakeholder review belongs before locking thresholds or sharing defaults
  notes: By the end of this part, you should describe utilitarian, rights-based, virtue,
    and justice reasoning, apply multiple lenses to one collection dilemma and one
    justice-system dilemma, and explain why stakeholder review belongs before locking
    thresholds or sharing defaults.
- type: bullets
  title: Four lenses for data work
  bullets:
  - It formalizes the utility–privacy tension from Section 3.2
  - Rights-based reasoning holds that autonomy, privacy
  - Virtue ethics asks what an honest, fair
  - Justice reasoning inspects whether burdens fall disproportionately on already
  notes: Utilitarian reasoning compares aggregate benefits and harms and favors the
    option with the best overall consequences—it formalizes the utility–privacy tension
    from Section 3.2. Rights-based reasoning holds that autonomy, privacy, and consent
    bind regardless of average benefit. Virtue ethics asks what an honest, fair, and
    careful practitioner would disclose and refuse. Justice reasoning inspects whether
    burdens fall disproportionately on already disadvantaged groups.
- type: bullets
  title: Example 3.29 — Healthcare prediction
  bullets:
  - Example 3.29 — hands-on module
  - Even when individuals did not consent to research reuse
  - Which is why rights-based checks are needed in parallel
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example29/`'
  notes: Example 3.29 shows a team predicting population health outcomes that might
    justify broad secondary use of identifiable records for societal benefit—even
    when individuals did not consent to research reuse. A strict utilitarian framing
    can justify that trade-off whenever aggregate gains look large, which is why rights-based
    checks are needed in parallel. Open the example 29 module for this chapter to
    compare lenses on one scenario.
- type: bullets
  title: Rights, virtue, and justice vignettes
  bullets:
  - Duties rather than optional costs
  - Virtue ethics may require disclosing systematic label gaps rather than selling
    cleaner
  - Justice reasoning may delay hiring ranker launch until subgroup audits show disparities
  notes: Rights-based practice may implement stricter purpose limits and on-device
    processing even when advertising yield drops—duties rather than optional costs.
    Virtue ethics may require disclosing systematic label gaps rather than selling
    cleaner internal stories. Justice reasoning may delay hiring ranker launch until
    subgroup audits show disparities can be justified and mitigated.
- type: bullets
  title: Example 3.33 — User data collection for marketing
  bullets:
  - Example 3.33 — hands-on module
  - Example 3.33 applies all four lenses to marketing collection under a vague notice
  - Utilitarian views emphasize engagement gains
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example33/`'
  notes: Example 3.33 applies all four lenses to marketing collection under a vague
    notice. Utilitarian views emphasize engagement gains; rights-based views require
    clearer purpose-specific consent; virtue ethics emphasizes transparent disclosure;
    justice views ask whether opaque collection disproportionately burdens users with
    less literacy or fewer alternatives. Try the example 33 module to document which
    lens prevailed and why.
- type: bullets
  title: Example 3.34 — AI in criminal justice
  bullets:
  - Example 3.34 — hands-on module
  - Example 3.34 returns to recidivism and hotspot conflicts from earlier in the chapter
  - A model may improve average institutional metrics while concentrating harm on
    already
  - Justice criteria that inspect subgroup harms, not citywide averages alone
  - 'View files: `modules/chapter3/example34/`'
  notes: Example 3.34 returns to recidivism and hotspot conflicts from earlier in
    the chapter. A model may improve average institutional metrics while concentrating
    harm on already over-policed communities. Utilitarian public-safety arguments
    must be weighed against rights not to face discriminatory targeting, virtues of
    fairness in public institutions, and justice criteria that inspect subgroup harms—not
    citywide averages alone.
- type: bullets
  title: Stakeholder involvement
  bullets:
  - Section 3.1 and Example 3.1 named practitioners, leaders, policymakers, and data
    subjects
  - Decision-making adds a process requirement
  - Document who was consulted, which lens prevailed
  notes: 'Section 3.1 and Example 3.1 named practitioners, leaders, policymakers,
    and data subjects. Decision-making adds a process requirement: invite those roles
    plus legal partners and representatives of groups most likely harmed before locking
    collection purpose, model thresholds, or sharing defaults. Document who was consulted,
    which lens prevailed, and what monitoring continues after launch.'
- type: bullets
  title: Takeaways
  bullets:
  - No single lens dissolves every conflict, teams should apply several deliberately
  - Stakeholder review surfaces residual risks a single product owner may miss
  - Accountability requires a record of the choice, not only the shipped feature
  notes: No single lens dissolves every conflict—teams should apply several deliberately.
    Stakeholder review surfaces residual risks a single product owner may miss. Accountability
    requires a record of the choice, not only the shipped feature.
