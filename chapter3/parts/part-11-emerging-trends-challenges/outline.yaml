- type: title
  title: Chapter 3 — Emerging trends and challenges
  subtitle: AI scale, fragmented global rules, and new privacy-enhancing tools continue
    to reshape ethics and privacy practice
  notes: AI scale, fragmented global rules, and new privacy-enhancing tools continue
    to reshape ethics and privacy practice. This final part highlights pressures that
    force new dilemmas for dataset programs—without re-teaching earlier sections in
    depth.
- type: bullets
  title: Learning objectives
  bullets:
  - Describe AI-scale privacy risks, name two global regulation friction patterns
  - Identify near-term directions including privacy-enhancing technologies and stronger
  notes: By the end of this part, you should describe AI-scale privacy risks, name
    two global regulation friction patterns, and identify near-term directions including
    privacy-enhancing technologies and stronger individual control models.
- type: bullets
  title: AI and privacy concerns
  bullets:
  - Large-scale sensing and prediction create surveillance capacity that traditional
  - Example 3.35 focuses on facial analysis at city scale
  notes: 'Large-scale sensing and prediction create surveillance capacity that traditional
    notice-and-consent models struggle to govern. Example 3.35 focuses on facial analysis
    at city scale: commercial systems have shown large accuracy gaps across phenotype
    and gender subgroups, turning deployments into both privacy and discrimination
    risks when used for identification or screening.'
- type: bullets
  title: Example 3.35 — Surveillance and facial analysis
  bullets:
  - Example 3.35 — hands-on module
  - Example 3.35 connects technical accuracy gaps to civil-liberties risk
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example35/`'
  notes: Example 3.35 connects technical accuracy gaps to civil-liberties risk. Open
    the example 35 module for this chapter to review subgroup error in vision systems.
    Example 3.36 extends the pattern to leakage from sensitive predictive models in
    healthcare—outputs and embeddings can expose patients if releases are poorly de-identified.
- type: bullets
  title: Ethics debates in deployed AI
  bullets:
  - How much human control must remain in high-stakes loops
  - Example 3.37 illustrates autonomous vehicle liability
  notes: 'Open debates continue over how far deployers must go beyond average accuracy,
    who is accountable when automated systems harm people, and how much human control
    must remain in high-stakes loops. Example 3.37 illustrates autonomous vehicle
    liability: responsibility maps to manufacturers, operators, and governance regimes—not
    to the model as a moral agent.'
- type: bullets
  title: Global privacy regulation challenges
  bullets:
  - Cross-border products confront overlapping rules rather than a single global code
  - Request-handling workflows
  - Localization mandates and transfer restrictions
  notes: Cross-border products confront overlapping rules rather than a single global
    code. Example 3.38 shows a multinational needing GDPR posture for EU residents
    while honoring CCPA and CPRA rights for California residents—parallel notice,
    retention, and request-handling workflows. Localization mandates and transfer
    restrictions, as in Examples 3.39 and 3.40, can force regional infrastructure
    when a single global cloud would be simpler operationally.
- type: bullets
  title: Example 3.38 — Conflicting privacy regimes
  bullets:
  - Example 3.38 — hands-on module
  - The operational cost of running multiple statutory programs in one product
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example38/`'
  notes: Example 3.38 is the operational cost of running multiple statutory programs
    in one product. Try the example 38 module to map jurisdiction-specific workflows.
    Schrems II and similar adequacy failures tighten expectations for cross-border
    transfers teams must anticipate in architecture.
- type: bullets
  title: Future directions
  bullets:
  - Privacy by Design defaults
  - Example 3.41 sketches self-sovereign identity proposals that let people hold and
    present
  notes: Near-term practice will keep combining privacy-enhancing technologies from
    Section 3.4, clearer AI governance, stronger individual control models, and Privacy
    by Design defaults. Example 3.41 sketches self-sovereign identity proposals that
    let people hold and present credentials without a single intermediary owning the
    identity graph.
- type: bullets
  title: Example 3.41 — Self-sovereign identity
  bullets:
  - Example 3.41 — hands-on module
  - Example 3.41 aligns with stronger individual control over personal data
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example41/`'
  notes: Example 3.41 aligns with stronger individual control over personal data.
    Open the example 41 module for this chapter to review credential models. The open
    question is adoption speed—not whether the building blocks exist.
- type: bullets
  title: Looking ahead
  bullets:
  - Emerging tensions
  - Chapter 7 deepens bias measurement and mitigation
  - Chapter 4 turns to annotation
  notes: This chapter moved from principles and privacy concepts through techniques,
    bias overview, laws, breaches, decision frameworks, and emerging tensions. Chapter
    7 deepens bias measurement and mitigation. Chapter 4 turns to annotation—how labels
    are created and documented so the constraints chosen here remain enforceable in
    the datasets models actually train on.
- type: bullets
  title: Takeaways
  bullets:
  - AI scale outpaces notice-only governance
  - Global products need jurisdiction maps and transfer plans
  - PETs and design defaults are mainstream, the adoption gap is organizational
  notes: AI scale outpaces notice-only governance. Global products need jurisdiction
    maps and transfer plans. PETs and design defaults are mainstream—the adoption
    gap is organizational.
