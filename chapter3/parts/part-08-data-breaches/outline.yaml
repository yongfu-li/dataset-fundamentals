title: Chapter 3 — Data breaches
footer: Chapter 3 — 08 Data Breaches
slides:
- type: title
  title: Chapter 3 — Data breaches
  subtitle: A data breach is unauthorized access to, disclosure of, or destruction
    of sensitive information
  notes: A data breach is unauthorized access to, disclosure of, or destruction of
    sensitive information. This part defines breaches, lists recurring causes, and
    walks three landmark incidents as failure-mode patterns—costs and prevention follow
    in the next part.
- type: bullets
  title: Learning objectives
  bullets:
  - Define a data breach, name common causes
  - Distinguish three organizational failure modes illustrated by Equifax, Yahoo
  - Target
  notes: By the end of this part, you should define a data breach, name common causes,
    and distinguish three organizational failure modes illustrated by Equifax, Yahoo,
    and Target.
- type: bullets
  title: Understanding data breaches
  bullets:
  - Excessive third-party access
  - Organizations storing identity
  - Statute-level notification clocks assume teams can detect and classify incidents
    quickly
  notes: Causes range from external intrusion and phishing to insider misuse, unpatched
    software, weak credentials, lost devices, and excessive third-party access. Organizations
    storing identity, financial, or health attributes face elevated duty of care because
    stolen datasets enable fraud and long-lived harm. Statute-level notification clocks
    assume teams can detect and classify incidents quickly.
- type: bullets
  title: Example 3.22 — Data breach severity range
  bullets:
  - Example 3.22 — hands-on module
  - Example 3.22 states the severity range
  - Impact scales with sensitivity, volume, dwell time before detection
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example22/`'
  notes: 'Example 3.22 states the severity range: a breach might involve a small set
    of names and emails or a large theft of government identifiers, payment credentials,
    or health records. Impact scales with sensitivity, volume, dwell time before detection,
    and how quickly notification and remediation begin. Open the example 22 module
    for this chapter to review severity factors.'
- type: bullets
  title: Equifax — unpatched internet-facing systems
  bullets:
  - Example 3.23 describes the 2017 Equifax incident
  - The failure mode is delayed patching and weak monitoring on high-value identity
    stores
  - Downstream costs appear in the next part
  notes: 'Example 3.23 describes the 2017 Equifax incident: attackers exploited an
    unpatched web-application vulnerability and exposed personal data of roughly one
    hundred forty-seven million individuals. The failure mode is delayed patching
    and weak monitoring on high-value identity stores. Downstream costs appear in
    the next part.'
- type: bullets
  title: Example 3.23 — Equifax case study
  bullets:
  - Example 3.23 — hands-on module
  - The patching-discipline lesson
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example23/`'
  notes: Example 3.23 is the patching-discipline lesson. Try the example 23 module
    to trace how known vulnerabilities on internet-facing systems become mass identity
    exposure. Technical debt on high-sensitivity stores is an ethics issue, not only
    an IT backlog item.
- type: bullets
  title: Yahoo — delayed disclosure
  bullets:
  - Example 3.24 covers Yahoo breaches affecting hundreds of millions of accounts
  - The failure mode is late accountability to users and markets after compromise
    at consumer
  notes: Example 3.24 covers Yahoo breaches affecting hundreds of millions of accounts,
    later revised toward three billion for the 2013 incident, with criticism focused
    on delayed public disclosure during acquisition negotiations. The failure mode
    is late accountability to users and markets after compromise at consumer scale.
- type: bullets
  title: Target — third-party vendor path
  bullets:
  - Example 3.25 describes attackers using third-party vendor access to reach point-of-sale
  - The failure mode is vendor risk and malware on retail networks
  notes: Example 3.25 describes attackers using third-party vendor access to reach
    point-of-sale systems and compromise tens of millions of payment cards. The failure
    mode is vendor risk and malware on retail networks—not exotic cryptography breaking,
    but supply-chain entry and insufficient segmentation.
- type: bullets
  title: Takeaways
  bullets:
  - Breach risk is organizational as much as cryptographic
  - Three patterns recur, unpatched systems, delayed disclosure, and vendor-mediated
    entry
  - Prevention controls mapped to each pattern come next
  notes: 'Breach risk is organizational as much as cryptographic: patching discipline,
    vendor oversight, and disclosure timing decide outcomes after intrusion begins.
    Three patterns recur—unpatched systems, delayed disclosure, and vendor-mediated
    entry. Prevention controls mapped to each pattern come next.'
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to breach consequences and prevention
  notes: Pause for the quiz, then continue to breach consequences and prevention—financial
    fallout and controls tied to each failure mode.
