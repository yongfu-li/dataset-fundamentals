slides:
- type: title
  title: Chapter 3 — Real-world privacy laws
  subtitle: Privacy statutes turn principles into enforceable duties for controllers
    and processors
  notes: Privacy statutes turn principles into enforceable duties for controllers
    and processors. This part surveys GDPR, HIPAA, CCPA and CPRA, and selected other
    laws as planning maps for scope, rights, and enforcement—not as a substitute for
    counsel.
- type: bullets
  title: Learning objectives
  bullets:
  - Summarize scope and principle highlights for GDPR, HIPAA
  - CCPA/CPRA, name data-subject or patient rights teams must honor
  - Recognize why global products need jurisdiction maps
  notes: By the end of this part, you should summarize scope and principle highlights
    for GDPR, HIPAA, and CCPA/CPRA, name data-subject or patient rights teams must
    honor, and recognize why global products need jurisdiction maps.
- type: bullets
  title: From principles to enforceable duties
  bullets:
  - Section 3.3 previewed GDPR and HIPAA at principle level
  - Details change with amendments, treat the text as a planning map for data teams
  notes: Section 3.3 previewed GDPR and HIPAA at principle level; this section is
    the authoritative home for scope, rights, breach notification, and penalties.
    Details change with amendments—treat the text as a planning map for data teams.
- type: bullets
  title: GDPR essentials
  bullets:
  - Or monitor, those people
  - Accountability with documented controls
  - Data-subject rights include access, rectification, erasure, restriction, portability
  notes: The GDPR governs processing of personal data of people in the EU and EEA
    and can reach organizations outside the Union that offer goods or services to,
    or monitor, those people. Core obligations include lawful basis for each purpose,
    purpose limitation, minimization, security appropriate to risk, and accountability
    with documented controls. Data-subject rights include access, rectification, erasure,
    restriction, portability, and objection.
- type: bullets
  title: HIPAA essentials
  bullets:
  - HIPAA is a US federal framework for protected health information held by covered
    entities
  - The Privacy Rule limits uses and disclosures
  - Rehearsing notification workflows
  notes: HIPAA is a US federal framework for protected health information held by
    covered entities and their business associates. The Privacy Rule limits uses and
    disclosures; the Security Rule requires safeguards for electronic PHI; the Breach
    Notification Rule sets timelines after compromise. For data teams this means minimizing
    secondary uses, binding vendors with business associate agreements, and rehearsing
    notification workflows.
- type: bullets
  title: CCPA and CPRA
  bullets:
  - To non-discrimination for exercising rights
  - Relative to GDPR
  notes: The California Consumer Privacy Act, as amended by the CPRA, grants California
    residents rights to know what personal information is collected, to access and
    delete it with exceptions, to opt out of certain sale or sharing for advertising,
    and to non-discrimination for exercising rights. Relative to GDPR, CCPA and CPRA
    are more notice-and-choice oriented within a large consumer-technology market.
- type: bullets
  title: Other notable laws
  bullets:
  - COPPA requires verifiable parental consent before collecting personal information
    from
  - Brazil's LGPD and China's PIPL echo GDPR-style themes while remaining distinct
    enforcement
  - Global products need maps of which residents are in scope, where data may be stored
  notes: COPPA requires verifiable parental consent before collecting personal information
    from children under thirteen in the United States. Brazil's LGPD and China's PIPL
    echo GDPR-style themes while remaining distinct enforcement regimes. Global products
    need maps of which residents are in scope, where data may be stored, and which
    transfer mechanisms remain valid when adequacy decisions change.
- type: bullets
  title: Example 3.28 — GDPR fine ceiling
  bullets:
  - Example 3.28 — hands-on module
  - Example 3.28 illustrates regulatory exposure
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example28/`'
  notes: 'Example 3.28 illustrates regulatory exposure: supervisory authorities under
    the GDPR may impose administrative fines up to twenty million euros or four percent
    of worldwide annual turnover, whichever is higher, for serious infringements including
    inadequate security. Open the example 28 module for this chapter to place fines
    in context with breach cases later in the chapter.'
- type: bullets
  title: Takeaways
  bullets:
  - Statutes encode rights catalogs and accountability regimes, not merely privacy
    policies
  - GDPR, HIPAA, and CCPA/CPRA overlap in themes but differ in scope and posture
  - Multistate and multinational operators often adopt the strictest baseline they
    face while
  notes: Statutes encode rights catalogs and accountability regimes—not merely privacy
    policies. GDPR, HIPAA, and CCPA/CPRA overlap in themes but differ in scope and
    posture. Multistate and multinational operators often adopt the strictest baseline
    they face while tracking new state and regional statutes.
