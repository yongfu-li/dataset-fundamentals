title: Chapter 3 — Breach consequences and prevention
footer: Chapter 3 — Breach Consequences Prevention
slides:
- type: title
  title: Chapter 3 — Breach consequences and prevention
  subtitle: Breach consequences span finance, reputation, regulation, and individual
    fraud risk
  notes: Breach consequences span finance, reputation, regulation, and individual
    fraud risk. This part ties dollar and governance fallout to the Equifax and Yahoo
    cases from the previous part, then maps prevention controls to each failure mode.
- type: bullets
  title: Learning objectives
  bullets:
  - List major consequence categories for organizations and individuals
  - Match prevention controls to unpatched systems, delayed disclosure
  - Vendor entry
  notes: By the end of this part, you should list major consequence categories for
    organizations and individuals, cite Equifax and Yahoo cost patterns, and match
    prevention controls to unpatched systems, delayed disclosure, and vendor entry.
- type: bullets
  title: Consequences for organizations
  bullets:
  - Financial losses include investigation, notification, credit monitoring, litigation
  - Regulatory penalties can reach GDPR ceilings illustrated in Example 3.28
  - Reputational damage and operational downtime while systems are rebuilt extend
    harm beyond
  notes: Financial losses include investigation, notification, credit monitoring,
    litigation, and lost business. Regulatory penalties can reach GDPR ceilings illustrated
    in Example 3.28. Reputational damage and operational downtime while systems are
    rebuilt extend harm beyond the initial incident.
- type: bullets
  title: Example 3.26 — Equifax breach costs
  bullets:
  - Example 3.26 — hands-on module
  - Example 3.26 attaches hundreds of millions of dollars in settlements, remediation
  - Delayed patching on high-value identity stores becomes a balance-sheet event
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example26/`'
  notes: Example 3.26 attaches hundreds of millions of dollars in settlements, remediation,
    and related costs to the unpatched-system failure in Example 3.23. Delayed patching
    on high-value identity stores becomes a balance-sheet event—not a footnote in
    a security review. Open the example 26 module for this chapter to review cost
    categories.
- type: bullets
  title: Example 3.27 — Yahoo breach and acquisition impact
  bullets:
  - Example 3.27 — hands-on module
  - Example 3.27 discusses governance and cybersecurity oversight failures that coincided
    with
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example27/`'
  notes: Example 3.27 discusses governance and cybersecurity oversight failures that
    coincided with a reduced sale price in the Verizon acquisition—breach handling
    can affect enterprise valuation and board accountability, not only consumer trust.
    Try the example 27 module to connect disclosure timing with deal outcomes.
- type: bullets
  title: Consequences for individuals
  bullets:
  - Individuals whose identifiers leak may face identity theft and fraud for years
  - Organizations may suffer operational paralysis while forensic work continues
  - Prevention therefore protects people first and enterprise value second
  notes: Individuals whose identifiers leak may face identity theft and fraud for
    years, as previewed in Example 3.10. Organizations may suffer operational paralysis
    while forensic work continues. Prevention therefore protects people first and
    enterprise value second.
- type: bullets
  title: Prevention mapped to failure modes
  bullets:
  - Timely patching and monitoring address unpatched internet-facing systems
  - Rehearsed detection, escalation, and disclosure address delayed accountability
  - Vendor risk reviews and least-privilege third-party access address supply-chain
    entry
  - Data minimization
  notes: Timely patching and monitoring address unpatched internet-facing systems.
    Rehearsed detection, escalation, and disclosure address delayed accountability.
    Vendor risk reviews and least-privilege third-party access address supply-chain
    entry. Those case-specific controls sit alongside encryption, multi-factor authentication,
    phishing-resistant training, intrusion detection, and data minimization.
- type: bullets
  title: No single control is sufficient
  bullets:
  - Equifax, Yahoo, and Target each failed at a different layer of the stack
  - Prevention should map to failure modes from Section 3.7, not only to a generic
    checklist
  - Chapter 1 already named encryption and access control as management practices
  notes: Equifax, Yahoo, and Target each failed at a different layer of the stack.
    Prevention should map to failure modes from Section 3.7, not only to a generic
    checklist. Chapter 1 already named encryption and access control as management
    practices; this section shows why they matter after incidents begin.
- type: bullets
  title: Takeaways
  bullets:
  - Breaches are balance-sheet and governance events, not only IT incidents
  - Map controls to known failure patterns
  - Minimization ensures stolen stores contain less that can be abused
  notes: Breaches are balance-sheet and governance events—not only IT incidents. Map
    controls to known failure patterns. Minimization ensures stolen stores contain
    less that can be abused.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to ethical decision-making, structured lenses for conflicts among principles
  notes: Pause for the quiz, then continue to ethical decision-making—structured lenses
    for conflicts among principles.
