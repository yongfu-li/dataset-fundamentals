title: Chapter 3 — Core ethical principles
footer: Chapter 3 — 02 Core Ethical Principles
slides:
- type: title
  title: Chapter 3 — Core ethical principles
  subtitle: This part turns ethical slogans into operational tests
  notes: 'This part turns ethical slogans into operational tests. Five principles
    recur across AI and data ethics guidelines: non-maleficence, fairness, transparency,
    accountability, and respect for autonomy. Each pairs with a short scenario you
    can use during design review.'
- type: bullets
  title: Learning objectives
  bullets:
  - Name the five core principles, state what each demands in practice
  - Recognize them as design constraints, not post-deployment patches
  notes: By the end of this part, you should name the five core principles, state
    what each demands in practice, and recognize them as design constraints—not post-deployment
    patches.
- type: bullets
  title: Five principles overview
  bullets:
  - Non-maleficence asks teams to prevent privacy breaches, discrimination
  - Fairness requires avoiding systematic disadvantage and monitoring disparities
  - Transparency means disclosing collection purposes and
  - Accountability assigns responsibility, monitoring, and remediation
  - Respect for autonomy centers informed consent and ongoing control
  notes: Non-maleficence asks teams to prevent privacy breaches, discrimination, and
    exploitative uses. Fairness requires avoiding systematic disadvantage and monitoring
    disparities. Transparency means disclosing collection purposes and, where feasible,
    how consequential decisions are made. Accountability assigns responsibility, monitoring,
    and remediation. Respect for autonomy centers informed consent and ongoing control.
- type: bullets
  title: Do no harm
  bullets:
  - Do no harm requires anticipating harms from collection, processing
  - Yielding less accurate predictions and misdiagnosis risk for that group
  - Upholding non-maleficence means auditing subgroup performance and adding safeguards
    before
  notes: Do no harm requires anticipating harms from collection, processing, and analysis—including
    discriminatory model errors. Example 3.2 shows a healthcare model trained on data
    that underrepresents a demographic group, yielding less accurate predictions and
    misdiagnosis risk for that group. Upholding non-maleficence means auditing subgroup
    performance and adding safeguards before deployment.
- type: bullets
  title: Example 3.2 — Healthcare AI system
  bullets:
  - Example 3.2 — hands-on module
  - 'The clinical pattern: skewed training data becomes skewed care'
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example2/`'
  notes: 'Example 3.2 is the clinical pattern: skewed training data becomes skewed
    care. Open the example 2 module for this chapter to walk through the harm pathway.
    The ethical demand is not surprise after launch but subgroup audits during development.'
- type: bullets
  title: Fairness
  bullets:
  - Fairness requires that practices and models not systematically disadvantage particular
  - The model can reproduce that pattern for new applicants
  - Treat disparity risk as a design constraint, not a post-deployment discovery
  notes: Fairness requires that practices and models not systematically disadvantage
    particular groups. Example 3.3 shows a hiring ranker trained on past hires that
    favored one demographic in technical roles—the model can reproduce that pattern
    for new applicants. Treat disparity risk as a design constraint, not a post-deployment
    discovery.
- type: bullets
  title: Example 3.3 — Hiring algorithm
  bullets:
  - Example 3.3 — hands-on module
  - Example 3.3 restates the hiring pattern
  - Chapter 7 develops metrics and mitigation
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example3/`'
  notes: 'Example 3.3 restates the hiring pattern: historical imbalance encodes into
    automated ranking. Chapter 7 develops metrics and mitigation; here the ethics
    lesson is to flag the risk before candidates are scored. Try the example 3 module
    to see how proxy features can reintroduce protected attributes.'
- type: bullets
  title: Transparency and accountability
  bullets:
  - Transparency builds trust by clarifying what is collected, why
  - Accountability assigns someone who can explain outcomes, respond to incidents
  - Example 3.4 applies transparency to credit scoring
  notes: 'Transparency builds trust by clarifying what is collected, why, and how
    automated decisions are produced. Accountability assigns someone who can explain
    outcomes, respond to incidents, and remediate harm. Example 3.4 applies transparency
    to credit scoring: declined applicants deserve understandable factors and a path
    to challenge errors.'
- type: bullets
  title: Respect for autonomy
  bullets:
  - Respect for autonomy centers informed consent and ongoing control
  - Lets users revoke consent or delete history
  - Autonomy fails when consent is buried in unrelated terms or withdrawal is practically
  notes: Respect for autonomy centers informed consent and ongoing control. Example
    3.6 shows a health-tracking app that obtains explicit consent, states purposes
    plainly, and lets users revoke consent or delete history. Autonomy fails when
    consent is buried in unrelated terms or withdrawal is practically impossible.
- type: bullets
  title: Example 3.6 — Health-tracking app
  bullets:
