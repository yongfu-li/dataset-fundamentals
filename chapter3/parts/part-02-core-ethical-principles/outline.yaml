  - Example 3.6 pairs consent user experience with sensitive streams such as activity
    and
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example6/`'
  notes: Example 3.6 pairs consent user experience with sensitive streams such as
    activity and heart rate. Open the example 6 module for this chapter to compare
    strong and weak consent patterns. Section 3.3 later turns autonomy into privacy-management
    practice.
- type: bullets
  title: Takeaways
  bullets:
  - Principles are operational tests for design choices
  - Non-maleficence and fairness catch harm before deployment
  - Transparency and accountability make systems answerable
  - Autonomy requires meaningful consent and control, not checkbox compliance alone
  notes: Principles are operational tests for design choices. Non-maleficence and
    fairness catch harm before deployment. Transparency and accountability make systems
    answerable. Autonomy requires meaningful consent and control—not checkbox compliance
    alone.
