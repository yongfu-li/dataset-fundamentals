title: Chapter 3 — Utility, dilemmas, and consequences
footer: Chapter 3 — 03 Utility Dilemmas Consequences
slides:
- type: title
  title: Chapter 3 — Utility, dilemmas, and consequences
  subtitle: Many projects create value only by using personal information
  notes: Many projects create value only by using personal information—which creates
    standing tension between utility and privacy. This part covers that trade-off,
    dilemmas when principles conflict, and the individual and organizational harms
    that follow when ethics is neglected.
- type: bullets
  title: Learning objectives
  bullets:
  - Explain the utility–privacy tension, describe two ethical dilemma patterns
  - List consequences of ignoring ethics for people and organizations
  notes: By the end of this part, you should explain the utility–privacy tension,
    describe two ethical dilemma patterns, and list consequences of ignoring ethics
    for people and organizations.
- type: bullets
  title: Balancing utility and privacy
  bullets:
  - Personalized care
  - Treat statutes as floors rather than ceilings
  - The ethical task is deciding whether proposed utility warrants the privacy burden
    at all
  notes: Personalized care, safer transport, or better public services can justify
    collection—yet the same pipelines can enable surveillance, exclusion, or secondary
    uses subjects never expected. Teams assess benefits and residual risks, prefer
    less identifying representations when analysis still works, and treat statutes
    as floors rather than ceilings. The ethical task is deciding whether proposed
    utility warrants the privacy burden at all.
- type: bullets
  title: Example 3.7 — Utility–privacy tension in personal predictions
  bullets:
  - Example 3.7 — hands-on module
  - Example 3.7 states the trade-off in prediction settings
  - Models that score health risk or creditworthiness can improve service allocation
  - Without minimization, access control
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example7/`'
  notes: Example 3.7 states the trade-off in prediction settings. Models that score
    health risk or creditworthiness can improve service allocation, but underlying
    histories are sensitive. Without minimization, access control, and purpose limits,
    the same features that raise utility become levers for harm. Open the example
    7 module for this chapter to review the tension checklist.
- type: bullets
  title: Ethical dilemmas in practice
  bullets:
  - Dilemmas arise when principles conflict or no option is clearly harm-free
  - Example 3.8 sketches criminal-justice risk scores
  - Example 3.9 returns to platform collection
  notes: 'Dilemmas arise when principles conflict or no option is clearly harm-free.
    Example 3.8 sketches criminal-justice risk scores: tools can appear useful for
    scheduling yet reproduce racial disparities in historical data—accuracy for the
    institution conflicts with fairness for affected communities. Example 3.9 returns
    to platform collection: fine-grained logging may enrich recommendations users
    never meaningfully agreed to share.'
- type: bullets
  title: Example 3.8 — Dilemma in criminal justice risk scores
  bullets:
  - Example 3.8 — hands-on module
  - The justice-system conflict previewed again in the bias section and Chapter 7
  - More data alone does not dissolve the conflict
  - Explore the chapter example module
  - 'View files: `modules/chapter3/example8/`'
  notes: Example 3.8 is the justice-system conflict previewed again in the bias section
    and Chapter 7. More data alone does not dissolve the conflict; teams must ask
    who bears residual risk and whether limits can be monitored after launch. Try
    the example 8 module to compare institutional metrics with community harm.
- type: bullets
  title: Consequences of neglecting ethics
  bullets:
  - Ignoring ethics produces privacy violations, discrimination, eroded trust
  - Example 3.10 shows personal exposure after unauthorized use or leakage, fraud,
    harassment
  notes: Ignoring ethics produces privacy violations, discrimination, eroded trust,
    and reinforced inequality. Example 3.10 shows personal exposure after unauthorized
    use or leakage—fraud, harassment, and lasting harm for individuals, plus trust
    loss across the wider user base.
- type: bullets
  title: Example 3.10 — Misuse of personal data
  bullets:
  - Example 3.10 — hands-on module
  - Example 3.10 connects ethical neglect to breach economics developed later in the
    chapter
  - Organizations also face fines, litigation
  - Ethical practice is both a moral and a sustainability requirement
  - 'View files: `modules/chapter3/example10/`'
  notes: Example 3.10 connects ethical neglect to breach economics developed later
    in the chapter. Organizations also face fines, litigation, and reputational damage
    under regimes such as the GDPR. Ethical practice is both a moral and a sustainability
    requirement.
- type: bullets
  title: Takeaways
  bullets:
  - Utility and privacy trade off by design, not by accident
  - Dilemmas need structured decision procedures, not silent defaults
  - Neglecting ethics harms people first and balance sheets second
  notes: Utility and privacy trade off by design—not by accident. Dilemmas need structured
    decision procedures, not silent defaults. Neglecting ethics harms people first
    and balance sheets second.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to data privacy principles, consent, anonymization
  notes: Pause for the quiz, then continue to data privacy principles—consent, anonymization,
    and Privacy by Design as management practice.
