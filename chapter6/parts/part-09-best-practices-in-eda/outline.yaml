title: Chapter 6 — Best practices in EDA
footer: Chapter 6 — 09 Best Practices In Eda
slides:
- type: title
  title: Chapter 6 — Best practices in EDA
  subtitle: Exploration is also communication and reproducibility
  notes: Exploration is also communication and reproducibility. This part covers chart
    choice, honest axes, documenting decisions, notebook workflows, and stakeholder
    storytelling.
- type: bullets
  title: Learning objectives
  bullets:
  - Select charts by analysis type, avoid misleading visual design, document EDA steps
  - Tailor presentations to technical versus non-technical audiences
  notes: By the end of this part, you should select charts by analysis type, avoid
    misleading visual design, document EDA steps, and tailor presentations to technical
    versus non-technical audiences.
- type: bullets
  title: Linking detection to repair
  bullets:
  - When EDA surfaces defects, log what you found and apply Chapter 5 repairs
  - Short notes tying plots to cleaning actions support reproducibility and later
    model audits
  notes: When EDA surfaces defects, log what you found and apply Chapter 5 repairs.
    Short notes tying plots to cleaning actions support reproducibility and later
    model audits.
- type: bullets
  title: Choosing the right chart
  bullets:
  - Histograms and box plots for univariate numerics
  - Simplicity beats decorative complexity
  notes: Histograms and box plots for univariate numerics; bar charts for categories;
    scatter plots for two continuous variables; heatmaps for correlation matrices;
    pair plots for multivariate tours. Simplicity beats decorative complexity.
- type: bullets
  title: Avoiding misleading visuals
  bullets:
  - Do not truncate axes to exaggerate differences
  - Anscombe's quartet reminds us identical summaries can hide different shapes
  notes: Do not truncate axes to exaggerate differences, overload color, or cherry-pick
    time windows. Anscombe's quartet reminds us identical summaries can hide different
    shapes—plots must be read carefully.
- type: bullets
  title: Reproducibility
  bullets:
  - Document steps in notebooks or scripts; explain why transforms or charts were
    chosen
  - Use version control for analysis artifacts
  - Markdown cells in Jupyter should state the question each plot answers
  notes: Document steps in notebooks or scripts; explain why transforms or charts
    were chosen. Use version control for analysis artifacts. Markdown cells in Jupyter
    should state the question each plot answers.
- type: bullets
  title: Collaboration and storytelling
  bullets:
  - Tailor depth to the audience
  - Each chart should convey one message
  notes: Tailor depth to the audience—statistical detail for engineers, decisions
    and recommendations for executives. Each chart should convey one message; sequence
    visuals to build a narrative from distributions to relationships to actions.
- type: bullets
  title: Takeaways
  bullets:
  - Good EDA is reproducible and honest
  - Chart choice and annotation matter as much as code
  - Link exploration logs to cleaning and modeling downstream
  notes: Good EDA is reproducible and honest. Chart choice and annotation matter as
    much as code. Link exploration logs to cleaning and modeling downstream.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to common pitfalls in EDA
  notes: Pause for the quiz, then continue to common pitfalls in EDA.
