title: Chapter 6 — Univariate and bivariate visualization
footer: Chapter 6 — Univariate And Bivariate Visualization
slides:
- type: title
  title: Chapter 6 — Univariate and bivariate visualization
  subtitle: Graphics reveal patterns tables hide
  notes: Graphics reveal patterns tables hide. This part covers histograms, box plots,
    scatter plots, and correlation-matrix heatmaps—the workhorse plots for one and
    two variables.
- type: bullets
  title: Learning objectives
  bullets:
  - Choose univariate plots for distribution checks
  - Read a correlation heatmap at a screening level
  notes: By the end of this part, you should choose univariate plots for distribution
    checks, use scatter plots for pairwise relationships, and read a correlation heatmap
    at a screening level.
- type: bullets
  title: Why visualize
  bullets:
  - Visualization supports pattern recognition, quality assessment, hypothesis generation
  - In EDA, charts often detect missingness patterns, odd scales
  notes: Visualization supports pattern recognition, quality assessment, hypothesis
    generation, and communication. In EDA, charts often detect missingness patterns,
    odd scales, and inconsistent categories before formal repair.
- type: bullets
  title: Univariate plots
  bullets:
  - Histograms show frequency by bin, useful for age or spend shape
  - Box plots summarize median, quartiles, and outlier candidates via the IQR rule
  - Pie charts work for quick share checks with few categories
  notes: Histograms show frequency by bin—useful for age or spend shape. Box plots
    summarize median, quartiles, and outlier candidates via the IQR rule. Pie charts
    work for quick share checks with few categories; prefer bar charts when precision
    matters.
- type: bullets
  title: Example 6.2 — Skewness informs model choice
  bullets:
  - Example 6.2 — hands-on module
  - Example 6.2 ties histogram or density shape to later methods
  - Explore the chapter example module
  - 'View files: `modules/chapter6/example2/`'
  notes: Example 6.2 ties histogram or density shape to later methods. Open the example
    2 module for this chapter to inspect skewed versus near-normal views. Box plots
    of income often show right-tail outliers matching Chapter 5 discussions.
- type: bullets
  title: Bivariate plots
  bullets:
  - Scatter plots expose linear or nonlinear association, clusters
  - Correlation matrices store pairwise coefficients
  notes: Scatter plots expose linear or nonlinear association, clusters, and outliers—classic
    screens include advertising spend versus revenue. Correlation matrices store pairwise
    coefficients, often shown as heatmaps for scanning strong positive, negative,
    or near-zero pairs.
- type: bullets
  title: Categorical–numerical views
  bullets:
  - Box plots by category compare spend across product types
  - These views support segment comparisons that group-by tables started numerically
  notes: Box plots by category compare spend across product types; bar charts compare
    group means or totals. These views support segment comparisons that group-by tables
    started numerically.
- type: bullets
  title: Takeaways
  bullets:
  - Match chart type to variable count and question
  - Univariate plots check shape and outliers; bivariate plots screen relationships
  - Correlation heatmaps prioritize pairs for deeper analysis in later parts
  notes: Match chart type to variable count and question. Univariate plots check shape
    and outliers; bivariate plots screen relationships. Correlation heatmaps prioritize
    pairs for deeper analysis in later parts.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to multivariate and high-dimensional visualization
  notes: Pause for the quiz, then continue to multivariate and high-dimensional visualization.
