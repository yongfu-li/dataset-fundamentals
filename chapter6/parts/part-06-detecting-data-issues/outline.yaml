title: Chapter 6 — Detecting data issues
footer: Chapter 6 — Detecting Data Issues
slides:
- type: title
  title: Chapter 6 — Detecting data issues
  subtitle: EDA finds problems; Chapter 5 fixes them
  notes: EDA finds problems; Chapter 5 fixes them. This part lists detection signals
    for missingness, outliers, duplicates, inconsistency, and class imbalance—with
    explicit handoffs to cleaning sections.
- type: bullets
  title: Learning objectives
  bullets:
  - Name detection methods for five defect classes
  - Explain the explore-then-repair loop with Chapter 5
  notes: By the end of this part, you should name detection methods for five defect
    classes and explain the explore-then-repair loop with Chapter 5.
- type: bullets
  title: Missing data detection
  bullets:
  - Use null counts, column-wise sums, and missingness heatmaps
  - Example 6.6 profiles clinical missingness
  - Classify MCAR
  notes: Use null counts, column-wise sums, and missingness heatmaps. Example 6.6
    profiles clinical missingness. Classify MCAR, MAR, or MNAR, then choose imputation
    or deletion in Chapter 5—not during blind exploration without documentation.
- type: bullets
  title: Example 6.6 — Healthcare missingness profile
  bullets:
  - Example 6.6 — hands-on module
  - Example 6.6 shows how missing labs appear across patients
  - Explore the chapter example module
  - 'View files: `modules/chapter6/example6/`'
  notes: Example 6.6 shows how missing labs appear across patients. Open the example
    6 module for this chapter to read a missingness heatmap narrative. Document patterns
    before imputing.
- type: bullets
  title: Outliers and duplicates
  bullets:
  - Detect outliers with box plots, scatter plots, Z-scores, and IQR rules
  - Example 6.7 places outliers in a fraud transaction setting
  - Find duplicates with duplicated checks on keys
  - Decide whether outliers are errors, rare valid events, or noise before treatment
  notes: Detect outliers with box plots, scatter plots, Z-scores, and IQR rules. Example
    6.7 places outliers in a fraud transaction setting. Find duplicates with duplicated
    checks on keys. Decide whether outliers are errors, rare valid events, or noise
    before treatment.
- type: bullets
  title: Inconsistency and imbalance
  bullets:
  - Frequency tables surface format drift, Example 6.8 shows city name inconsistency
  - Bar charts of class counts reveal imbalance typical in fraud screens
  - Standardize labels in Chapter 5
  notes: Frequency tables surface format drift—Example 6.8 shows city name inconsistency.
    Bar charts of class counts reveal imbalance typical in fraud screens. Standardize
    labels in Chapter 5; address imbalance with resampling or weights before modeling.
- type: bullets
  title: Example 6.8 — City name inconsistency
  bullets:
  - Example 6.8 — hands-on module
  - A geographic label conflict visible in value counts
  - Explore the chapter example module
  - 'View files: `modules/chapter6/example8/`'
  notes: Example 6.8 is a geographic label conflict visible in value counts. Try the
    example 8 module to see how exploration precedes standardization. Keep a log of
    plots that motivated each cleaning action.
- type: bullets
  title: Takeaways
  bullets:
  - EDA detection is deliberate routing, not silent fixing
  - Each defect class has visual and tabular signals
  - Repair workflows live in Chapter 5; exploration returns after fixes
  notes: EDA detection is deliberate routing, not silent fixing. Each defect class
    has visual and tabular signals. Repair workflows live in Chapter 5; exploration
    returns after fixes.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to the EDA workflow and tools
  notes: Pause for the quiz, then continue to the EDA workflow and tools.
