title: Chapter 6 — Data types and central tendency
footer: Chapter 6 — Types And Central Tendency
slides:
- type: title
  title: Chapter 6 — Data types and central tendency
  subtitle: 'Before plotting, classify each column: continuous versus discrete numerics,
    nominal versus ordinal categories'
  notes: 'Before plotting, classify each column: continuous versus discrete numerics,
    nominal versus ordinal categories. Then choose summaries—mean, median, mode—that
    match the measurement scale.'
- type: bullets
  title: Learning objectives
  bullets:
  - Distinguish four common data types, compute mean, median
  - Mode
  - State when each central tendency measure is appropriate
  notes: By the end of this part, you should distinguish four common data types, compute
    mean, median, and mode, and state when each central tendency measure is appropriate.
- type: bullets
  title: Types of data
  bullets:
  - Continuous variables take any value in an interval, height, income, sales totals
  - Discrete variables are counts, purchases per month, items in a basket
  - Nominal categories have no order, product type, color
  - Ordinal categories have meaningful order, satisfaction ratings, education bands
  notes: Continuous variables take any value in an interval—height, income, sales
    totals. Discrete variables are counts—purchases per month, items in a basket.
    Nominal categories have no order—product type, color. Ordinal categories have
    meaningful order—satisfaction ratings, education bands.
- type: bullets
  title: Example 6.10 and 6.13 — Continuous and nominal cases
  bullets:
  - Example 6.10 — hands-on module
  - Example 6.10 lists continuous physical measures
  - Example 6.13 shows nominal product categories
  - Explore the chapter example module
  - 'View files: `modules/chapter6/example10/`'
  notes: Example 6.10 lists continuous physical measures; Example 6.11 shows monetary
    totals; Example 6.12 gives discrete counts. Example 6.13 shows nominal product
    categories; Example 6.14 shows an ordinal satisfaction scale. Open the example
    10 module to practice typing columns before summarizing.
- type: bullets
  title: Mean
  bullets:
  - The mean is the arithmetic average, sum divided by count
  - Example 6.15 computes mean income
  - Use means for roughly symmetric continuous data
  notes: The mean is the arithmetic average—sum divided by count. Example 6.15 computes
    mean income. Use means for roughly symmetric continuous data; skew or outliers
    pull the mean away from typical values.
- type: bullets
  title: Median
  bullets:
  - The median is the middle value when sorted
  - Example 6.16 contrasts odd and even samples
  - Median resists outliers and suits skewed income or spend distributions
  notes: The median is the middle value when sorted—or the average of the two middle
    values for even counts. Example 6.16 contrasts odd and even samples. Median resists
    outliers and suits skewed income or spend distributions.
- type: bullets
  title: Mode
  bullets:
  - The mode is the most frequent value, especially useful for categorical data
  - Example 6.17 shows a simple numeric mode
  - A multimodal distribution may indicate subpopulations worth splitting
  notes: The mode is the most frequent value—especially useful for categorical data.
    Example 6.17 shows a simple numeric mode. A multimodal distribution may indicate
    subpopulations worth splitting.
- type: bullets
  title: Matching summary to type
  bullets:
  - Use means and medians for numeric exploration; use mode or frequency tables for
    categories
  - Report all three for numeric fields during early EDA so skew is visible when mean
    and
  notes: Use means and medians for numeric exploration; use mode or frequency tables
    for categories. Report all three for numeric fields during early EDA so skew is
    visible when mean and median diverge.
- type: bullets
  title: Takeaways
  bullets:
  - Variable type dictates valid summaries
  - Mean, median, and mode answer different questions about center
  - Always inspect type before computing describe() output blindly
  notes: Variable type dictates valid summaries. Mean, median, and mode answer different
    questions about center. Always inspect type before computing describe() output
    blindly.
