title: Chapter 6 — Multivariate visualization
footer: Chapter 6 — 05 Multivariate Visualization
slides:
- type: title
  title: Chapter 6 — Multivariate visualization
  subtitle: When more than two features matter, pair plots, heatmaps, parallel coordinates,
    PCA
  notes: When more than two features matter, pair plots, heatmaps, parallel coordinates,
    PCA, and t-SNE help you see structure—each with interpretive limits.
- type: bullets
  title: Learning objectives
  bullets:
  - Explain pair plots and parallel-coordinate uses
  - State cautions for t-SNE cluster views
  notes: By the end of this part, you should explain pair plots and parallel-coordinate
    uses, describe PCA as a variance-maximizing projection, and state cautions for
    t-SNE cluster views.
- type: bullets
  title: Heatmaps and pair plots
  bullets:
  - Heatmaps color-code matrix values, default for correlation tables
  - Frequency together
  notes: Heatmaps color-code matrix values—default for correlation tables. Pair plots
    show every pairwise scatter for continuous features, giving a quick tour of age,
    income, spend, and frequency together.
- type: bullets
  title: Parallel coordinates
  bullets:
  - Each variable is a vertical axis; each row is a polyline across axes
  - Useful for finding similar customer profiles in moderate dimensions
  notes: Each variable is a vertical axis; each row is a polyline across axes. Useful
    for finding similar customer profiles in moderate dimensions—color by category
    to separate product mixes.
- type: bullets
  title: Principal component analysis
  bullets:
  - PCA builds orthogonal components capturing successive maximum variance directions
  - Plotting the first two or three components can reveal clusters invisible in raw
    feature
  - PCA is linear; nonlinear structure may need other tools
  notes: PCA builds orthogonal components capturing successive maximum variance directions.
    Plotting the first two or three components can reveal clusters invisible in raw
    feature space. PCA is linear; nonlinear structure may need other tools.
- type: bullets
  title: t-SNE embeddings
  bullets:
  - T-SNE emphasizes local neighborhoods in two or three dimensions
  - Interpret distances between distant clusters cautiously
  notes: t-SNE emphasizes local neighborhoods in two or three dimensions—helpful for
    cluster discovery after optional PCA pre-reduction on large tables. Interpret
    distances between distant clusters cautiously; t-SNE is primarily a local structure
    tool.
- type: bullets
  title: Example 6.9 — Geography and purchase frequency
  bullets:
  - Example 6.9 — hands-on module
  - Example 6.9 links geography to purchase hypotheses
  - Explore the chapter example module
  - 'View files: `modules/chapter6/example9/`'
  notes: Example 6.9 links geography to purchase hypotheses—multivariate views help
    test whether regional segments differ once several features are viewed together.
    Open the example 9 module for this chapter to explore grouped and reduced views.
- type: bullets
  title: Takeaways
  bullets:
  - Escalate plot complexity only when the question requires it
  - PCA and t-SNE are exploratory projections, not replacements for domain validation
  - Pair plots remain the honest first multivariate screen
  notes: Escalate plot complexity only when the question requires it. PCA and t-SNE
    are exploratory projections, not replacements for domain validation. Pair plots
    remain the honest first multivariate screen.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to detecting data issues during EDA
  notes: Pause for the quiz, then continue to detecting data issues during EDA.
