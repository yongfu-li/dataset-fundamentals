title: Chapter 6 — Case studies in EDA
footer: Chapter 6 — 11 Case Studies
slides:
- type: title
  title: Chapter 6 — Case studies in EDA
  subtitle: Domain narratives show how summaries, plots, and quality checks combine
  notes: Domain narratives show how summaries, plots, and quality checks combine.
    This part tours retail, healthcare, fraud, e-commerce segmentation, and climate
    monitoring.
- type: bullets
  title: Learning objectives
  bullets:
  - Outline EDA steps for retail segmentation and clinical outcome tables
  - Identify exploration priorities in fraud and climate settings
  notes: By the end of this part, you should outline EDA steps for retail segmentation
    and clinical outcome tables and identify exploration priorities in fraud and climate
    settings.
- type: bullets
  title: Retail sales analysis
  bullets:
  - Mixed currencies
  - EDA profiles missingness
  notes: E-commerce segmentation faces missing age or frequency fields, inconsistent
    product capitalization, and mixed currencies. EDA profiles missingness, standardizes
    text and currency, scales spend features, then supports clustering for targeted
    campaigns.
- type: bullets
  title: Healthcare data analysis
  bullets:
  - Clinical records mix labs, history
  - Box plots and IQR screens flag vitals
  notes: Clinical records mix labs, history, and outcomes with missing vitals, outlier
    readings, and inconsistent smoker labels. Box plots and IQR screens flag vitals;
    categorical standardization and scaling precede outcome models.
- type: bullets
  title: Fraud detection
  bullets:
  - Transaction EDA emphasizes extreme amounts, rare positive class counts, and time
    patterns
  - Example 6.7 places outliers in a financial setting
  - Open the example 7 module for fraud-oriented summaries
  notes: Transaction EDA emphasizes extreme amounts, rare positive class counts, and
    time patterns. Example 6.7 places outliers in a financial setting—explore class
    imbalance before trusting accuracy. Open the example 7 module for fraud-oriented
    summaries.
- type: bullets
  title: E-commerce segmentation and climate
  bullets:
  - Customer segmentation repeats retail motifs, RFM-style features, geography
  - Climate monitoring stresses temporal plots, missing sensors
  notes: Customer segmentation repeats retail motifs—RFM-style features, geography,
    and product mix. Climate monitoring stresses temporal plots, missing sensors,
    and distribution shifts across regions or seasons.
- type: bullets
  title: Example 6.5 — Sales and weather hypothesis
  bullets:
  - Example 6.5 — hands-on module
  - Example 6.5 shows how exploratory correlation can suggest seasonal hypotheses
    worth later
  - Explore the chapter example module
  - 'View files: `modules/chapter6/example5/`'
  notes: Example 6.5 shows how exploratory correlation can suggest seasonal hypotheses
    worth later testing. Try the example 5 module to connect domain questions with
    plot choices.
- type: bullets
  title: Takeaways
  bullets:
  - 'Case studies share a pattern: profile, visualize, detect issues, clean, re-explore'
  - Domain dictates which defects and relationships matter most
  notes: 'Case studies share a pattern: profile, visualize, detect issues, clean,
    re-explore. Domain dictates which defects and relationships matter most.'
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to advanced topics and future directions
  notes: Pause for the quiz, then continue to advanced topics and future directions.
