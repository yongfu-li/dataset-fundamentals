title: Chapter 6 — Common pitfalls in EDA
footer: Chapter 6 — 10 Common Pitfalls
slides:
- type: title
  title: Chapter 6 — Common pitfalls in EDA
  subtitle: Even experienced analysts over-read charts, ignore quality problems, or
    stop after one pass
  notes: Even experienced analysts over-read charts, ignore quality problems, or stop
    after one pass. This part names exploration-specific pitfalls and how to avoid
    them.
- type: bullets
  title: Learning objectives
  bullets:
  - Recognize visualization overfitting, confirmation bias, neglected quality checks
  - Premature closure of exploration
  notes: By the end of this part, you should recognize visualization overfitting,
    confirmation bias, neglected quality checks, and premature closure of exploration.
- type: bullets
  title: Overfitting with visualization
  bullets:
  - Too many variables, categories, or colors clutter charts and invite false patterns
  - Spurious correlations and cherry-picked time ranges can look convincing
  - Prefer simple charts, fair axes, and follow-up checks
  notes: Too many variables, categories, or colors clutter charts and invite false
    patterns. Spurious correlations and cherry-picked time ranges can look convincing.
    Prefer simple charts, fair axes, and follow-up checks.
- type: bullets
  title: Misreading patterns
  bullets:
  - A one-day sales spike may be a promotion, not a trend
  - Weak correlations become overstated when charts are tuned to impress
  - Example 6.5's weather cue still needs confirmatory analysis, not instant causation
    claims
  notes: A one-day sales spike may be a promotion, not a trend. Weak correlations
    become overstated when charts are tuned to impress. Example 6.5's weather cue
    still needs confirmatory analysis—not instant causation claims.
- type: bullets
  title: Ignoring data quality issues
  bullets:
  - Skipping missingness
  - Section 6.4 exists to prevent exploring broken tables as if they were ground truth
  notes: Skipping missingness, duplicates, or inconsistent labels undermines every
    plot built on top. Section 6.4 exists to prevent exploring broken tables as if
    they were ground truth.
- type: bullets
  title: Confirmation bias and lack of iteration
  bullets:
  - Searching only for evidence that supports a favored hypothesis hides contradictory
    views
  - 'EDA should be iterative: new plots after cleaning, new questions after surprises'
  - Example 6.4 warns against forcing linear stories on nonlinear data
  notes: 'Searching only for evidence that supports a favored hypothesis hides contradictory
    views. EDA should be iterative: new plots after cleaning, new questions after
    surprises. Example 6.4 warns against forcing linear stories on nonlinear data.'
- type: bullets
  title: Takeaways
  bullets:
  - Simplify visuals, validate patterns, fix quality first, and iterate
  - Pitfalls are cognitive as much as technical, process discipline reduces them
  notes: Simplify visuals, validate patterns, fix quality first, and iterate. Pitfalls
    are cognitive as much as technical—process discipline reduces them.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to domain case studies
  notes: Pause for the quiz, then continue to domain case studies.
