title: Chapter 6 — EDA workflow and tools
footer: Chapter 6 — 07 Eda Workflow And Tools
slides:
- type: title
  title: Chapter 6 — EDA workflow and tools
  subtitle: Exploration needs a repeatable sequence and a tool stack
  notes: Exploration needs a repeatable sequence and a tool stack. This part walks
    four linked steps and maps them to pandas, matplotlib, seaborn, and automated
    profiling helpers.
- type: bullets
  title: Learning objectives
  bullets:
  - Pass
  notes: By the end of this part, you should outline the four-step EDA process, name
    core Python libraries for tables and plots, and recognize when automated profiling
    accelerates a first pass.
- type: bullets
  title: Step 1 — Data understanding
  bullets:
  - Review structure with head, dtypes, and missing or duplicate flags
  - Know which columns are numeric, categorical, or temporal before summarizing
  - Example 6.1 begins here on the e-commerce customer table
  notes: Review structure with head, dtypes, and missing or duplicate flags. Know
    which columns are numeric, categorical, or temporal before summarizing. Example
    6.1 begins here on the e-commerce customer table.
- type: bullets
  title: Step 2 — Descriptive statistics
  bullets:
  - Compute means, medians, modes, variance, and standard deviation for numerics
  - Describe() in pandas bundles many numeric summaries
  notes: Compute means, medians, modes, variance, and standard deviation for numerics;
    counts and percentages for categories. describe() in pandas bundles many numeric
    summaries—interpret alongside type checks from the previous part.
- type: bullets
  title: Step 3 — Visualization
  bullets:
  - Apply histograms, box plots, scatter plots, and bar charts from earlier parts
  - Visualization reveals patterns summaries alone miss and supports stakeholder communication
  notes: Apply histograms, box plots, scatter plots, and bar charts from earlier parts.
    Visualization reveals patterns summaries alone miss and supports stakeholder communication.
- type: bullets
  title: Step 4 — Data quality checks
  bullets:
  - Use Section 6.4 as a checklist, repair in Chapter 5, then re-explore
  - 'Iteration is normal: a fixed table may expose new relationship questions'
  notes: 'Use Section 6.4 as a checklist, repair in Chapter 5, then re-explore. Iteration
    is normal: a fixed table may expose new relationship questions.'
- type: bullets
  title: Tools — pandas, matplotlib, seaborn
  bullets:
  - Pandas handles tables, read_csv, describe, isnull, drop_duplicates
  - Matplotlib provides base plotting
  - R users mirror many steps with dplyr and ggplot2 mentioned in the chapter
  notes: pandas handles tables—read_csv, describe, isnull, drop_duplicates. matplotlib
    provides base plotting; seaborn adds statistical aesthetics like histplot with
    KDE. R users mirror many steps with dplyr and ggplot2 mentioned in the chapter.
- type: bullets
  title: Automating EDA
  bullets:
  - Libraries such as pandas-profiling or ydata-profiling generate summary reports
    quickly
  - Automation starts exploration; it does not replace domain questions
  notes: Libraries such as pandas-profiling or ydata-profiling generate summary reports
    quickly—useful for wide tables, but review automated outputs critically and document
    overrides. Automation starts exploration; it does not replace domain questions.
- type: bullets
  title: Takeaways
  bullets:
  - Follow understand, summarize, visualize, quality-check in order
  - Pandas plus seaborn cover most chapter workflows
  - Automate the first pass, then drill into anomalies manually
  notes: Follow understand, summarize, visualize, quality-check in order. pandas plus
    seaborn cover most chapter workflows. Automate the first pass, then drill into
    anomalies manually.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to advanced EDA techniques including correlation depth
  notes: Pause for the quiz, then continue to advanced EDA techniques including correlation
    depth.
