title: Chapter 6 — Advanced EDA techniques
footer: Chapter 6 — 08 Advanced Eda Techniques
slides:
- type: title
  title: Chapter 6 — Advanced EDA techniques
  subtitle: High-dimensional structure
  notes: Beyond first-pass plots, analysts need principled correlation analysis and
    related methods for multicollinearity, nonlinear association, and high-dimensional
    structure.
- type: bullets
  title: Learning objectives
  bullets:
  - Contrast Pearson and Spearman correlation, interpret correlation heatmaps cautiously
  - Name additional advanced techniques surveyed in the chapter
  notes: By the end of this part, you should contrast Pearson and Spearman correlation,
    interpret correlation heatmaps cautiously, and name additional advanced techniques
    surveyed in the chapter.
- type: bullets
  title: Correlation analysis
  bullets:
  - Pearson correlation measures linear association between continuous pairs
  - Spearman uses ranks and tolerates monotonic nonlinear relationships better
  - Coefficients live on minus one to plus one
  notes: Pearson correlation measures linear association between continuous pairs.
    Spearman uses ranks and tolerates monotonic nonlinear relationships better. Coefficients
    live on minus one to plus one—magnitude and sign guide which pairs deserve scatter
    follow-up.
- type: bullets
  title: Reading heatmaps
  bullets:
  - Correlation heatmaps make strong pairs easy to scan but do not prove causation
  - Confounding and small samples can inflate or hide relationships
  - Confirm interesting cells with scatter plots and domain reasoning
  notes: Correlation heatmaps make strong pairs easy to scan but do not prove causation.
    Confounding and small samples can inflate or hide relationships. Confirm interesting
    cells with scatter plots and domain reasoning.
- type: bullets
  title: Example 6.4 — Linear versus nonlinear patterns
  bullets:
  - Example 6.4 — hands-on module
  - Example 6.4 reminds you that high Pearson correlation implies linearity
  - Explore the chapter example module
  - 'View files: `modules/chapter6/example4/`'
  notes: Example 6.4 reminds you that high Pearson correlation implies linearity;
    curved relationships may show low Pearson but strong Spearman—or need transformation.
    Open the example 4 module to compare linear and nonlinear scatter patterns.
- type: bullets
  title: Additional advanced techniques
  bullets:
  - Links PCA and t-SNE from visualization to structural exploration
  - Use these when pairwise screens are insufficient for dimensionality or temporal
    dependence
  notes: The chapter surveys partial correlation, mutual information, autocorrelation
    for time series, and links PCA and t-SNE from visualization to structural exploration.
    Use these when pairwise screens are insufficient for dimensionality or temporal
    dependence.
- type: bullets
  title: When to stop exploring
  bullets:
  - Advanced methods still serve exploration, not final inference
  - Document which correlations or components motivated feature selection or transforms
    before
  notes: Advanced methods still serve exploration—not final inference. Document which
    correlations or components motivated feature selection or transforms before modeling
    chapters.
- type: bullets
  title: Takeaways
  bullets:
  - Choose Pearson or Spearman based on shape and scale
  - Heatmaps screen; scatter plots verify
  - Advanced tools extend EDA when many features or time order matter
  notes: Choose Pearson or Spearman based on shape and scale. Heatmaps screen; scatter
    plots verify. Advanced tools extend EDA when many features or time order matter.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to best practices for reproducible, clear EDA
  notes: Pause for the quiz, then continue to best practices for reproducible, clear
    EDA.
