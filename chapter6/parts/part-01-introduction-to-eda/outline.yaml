title: Chapter 6 — Introduction to EDA
footer: Chapter 6 — Introduction To Eda
slides:
- type: title
  title: Chapter 6 — Introduction to EDA
  subtitle: Chapter 5 repaired defects in a table; this chapter asks how to explore
    that table before formal modeling
  notes: Chapter 5 repaired defects in a table; this chapter asks how to explore that
    table before formal modeling. Exploratory Data Analysis summarizes and visualizes
    datasets to understand structure, spot anomalies, and form questions—not to confirm
    pre-chosen hypotheses.
- type: bullets
  title: Learning objectives
  bullets:
  - Define EDA, explain how it differs from confirmatory analysis
  - Describe how exploration and cleaning iterate in practice
  notes: By the end of this part, you should define EDA, explain how it differs from
    confirmatory analysis, and describe how exploration and cleaning iterate in practice.
- type: bullets
  title: What EDA does
  bullets:
  - EDA combines descriptive statistics, graphical plots, and light transformations
  - Typical steps include summarizing variables, visualizing relationships
  - The objective is to understand the data itself before choosing models or tests
  notes: EDA combines descriptive statistics, graphical plots, and light transformations.
    Typical steps include summarizing variables, visualizing relationships, and flagging
    missing values, outliers, or inconsistencies for repair. The objective is to understand
    the data itself before choosing models or tests.
- type: bullets
  title: EDA versus earlier chapters
  bullets:
  - Chapter 1 introduced a minimal exploration mindset
  - This chapter is the authoritative home for exploration
  notes: 'Chapter 1 introduced a minimal exploration mindset; Chapter 5 covered repairing
    defects once found. This chapter is the authoritative home for exploration: plots
    and summaries reveal problems, and cleaning restores a table you can explore again
    with confidence.'
- type: bullets
  title: Example 6.1 — E-commerce customer EDA pass
  bullets:
  - Example 6.1 — hands-on module
  - Example 6.1 sketches a first pass on a customer table
  - Explore the chapter example module
  - 'View files: `modules/chapter6/example1/`'
  notes: 'Example 6.1 sketches a first pass on a customer table: review mean, median,
    and standard deviation for age, income, and purchase frequency, then histogram
    age and scatter income versus spending. Open the example 1 module for this chapter
    to walk through that sequence.'
- type: bullets
  title: Why EDA matters
  bullets:
  - Guides hypothesis formation from patterns you did not expect
  - Example 6.4 contrasts linear and nonlinear cues
  notes: EDA clarifies data structure, surfaces quality issues for Chapter 5 repair,
    informs model choice, and guides hypothesis formation from patterns you did not
    expect. Example 6.4 contrasts linear and nonlinear cues; Example 6.5 shows a sales–weather
    relationship prompting seasonal questions.
- type: bullets
  title: Example 6.4 — Linear versus nonlinear patterns
  bullets:
  - Example 6.4 — hands-on module
  - Example 6.4 notes that a strong linear scatter suggests linear regression may
    fit
  - Shape checks from Example 6.2 should precede algorithm selection
  - 'View files: `modules/chapter6/example4/`'
  notes: Example 6.4 notes that a strong linear scatter suggests linear regression
    may fit, while curved or clustered patterns may favor trees or neural networks.
    Shape checks from Example 6.2 should precede algorithm selection.
- type: bullets
  title: Takeaways
  bullets:
  - EDA is observation-first exploration before modeling
  - It iterates with cleaning
  - Summaries plus plots form the core toolkit introduced in the parts that follow
  notes: EDA is observation-first exploration before modeling. It iterates with cleaning.
    Summaries plus plots form the core toolkit introduced in the parts that follow.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Continue to data types and measures of central tendency
  notes: Pause for the quiz, then continue to data types and measures of central tendency.
