title: Chapter 6 — Advanced topics and future directions
footer: Chapter 6 — 12 Advanced Topics
slides:
- type: title
  title: Chapter 6 — Advanced topics and future directions
  subtitle: Notebook EDA on static CSVs is the baseline; large and streaming datasets
    push new tooling and pipeline integration
  notes: Notebook EDA on static CSVs is the baseline; large and streaming datasets
    push new tooling and pipeline integration.
- type: bullets
  title: Learning objectives
  bullets:
  - Name trends in automated EDA, outline challenges for streaming exploration
  - Describe how EDA hooks into ML pipelines
  notes: By the end of this part, you should name trends in automated EDA, outline
    challenges for streaming exploration, and describe how EDA hooks into ML pipelines.
- type: bullets
  title: Automated EDA tools
  bullets:
  - Report generators and AutoML front-ends accelerate first passes on wide tables
  - Fairness implications connected to Chapter 7
  notes: Report generators and AutoML front-ends accelerate first passes on wide tables.
    They help triage columns and missingness but require human review for domain validity,
    leakage, and fairness implications connected to Chapter 7.
- type: bullets
  title: EDA in big data and streaming
  bullets:
  - Batch assumptions fail when data never stops arriving
  - Sliding windows, online summaries, and sampled visualizations replace full-table
    scans
  - Latency and consistency constraints mirror Chapter 5 streaming preprocessing themes
  notes: Batch assumptions fail when data never stops arriving. Sliding windows, online
    summaries, and sampled visualizations replace full-table scans. Latency and consistency
    constraints mirror Chapter 5 streaming preprocessing themes.
- type: bullets
  title: Integration with ML pipelines
  bullets:
  - Exploration informs feature stores, train-validation splits, and monitoring baselines
  - Documented EDA artifacts become regression tests when production data drifts
  notes: Exploration informs feature stores, train-validation splits, and monitoring
    baselines. Documented EDA artifacts become regression tests when production data
    drifts—summary stats and plot templates detect shift early.
- type: bullets
  title: Looking ahead
  bullets:
  - Chapter 7 deepens bias and fairness analysis once exploration reveals segment
    disparities
  - Strong EDA logs make later modeling and auditing more trustworthy
  notes: Chapter 7 deepens bias and fairness analysis once exploration reveals segment
    disparities. Strong EDA logs make later modeling and auditing more trustworthy.
- type: bullets
  title: Takeaways
  bullets:
  - Automation scales the first pass; humans keep domain judgment
  - Streaming and pipeline integration extend EDA beyond one-off notebooks
  notes: Automation scales the first pass; humans keep domain judgment. Streaming
    and pipeline integration extend EDA beyond one-off notebooks.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Pause for the quiz
  notes: Pause for the quiz. You have completed the Chapter 6 learning path—return
    to the chapter landing page for the full deck or browse module examples.
