title: Chapter 13 — Documentation and metadata
footer: Chapter 13 — Documentation And Metadata
slides:
- type: title
  title: Chapter 13 — Documentation and metadata
  subtitle: Standards require concrete records
  notes: Standards require concrete records. Undocumented methods and unpinned dataset
    versions break replication even when code is public. This part covers research
    documentation, repository metadata for discovery, and why dataset versions must
    be pinned for published analyses.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to explain why undocumented
    methodology blocks replication; describe publication-grade repository metadata
    that supports discovery; state why the exact dataset version used in a published
    analysis must be identifiable; and distinguish Chapter 8’s operational documentation
    toolkit from this chapter’s research-facing reuse requirements.
- type: bullets
  title: Research documentation demands
  bullets:
  - Beyond the documentation components listed in Chapter 8
  - The goal is a checkable published path, not only an internal ops record
  notes: 'Beyond the documentation components listed in Chapter 8, reproducible research
    documentation should record the exact conditions of the published analysis: which
    dataset version was used, which transformations were applied in which order, and
    which known limitations—such as missing values or biases—could alter downstream
    conclusions. The goal is a checkable published path, not only an internal ops
    record.'
- type: bullets
  title: Example 13.9 — Undocumented Methodology Blocks Replication
  bullets:
  - Example 13.9 — hands-on module
  - Example 13.9 shows the cost of unclear methods
  - In a medical study
  - Surveys of researchers have long found that inadequate documentation of methods
    and data
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example9/`'
  notes: Example 13.9 shows the cost of unclear methods. In a medical study, if the
    methodology for collecting patient data is unclear, another researcher cannot
    evaluate reliability or replicate the study. Surveys of researchers have long
    found that inadequate documentation of methods and data is among the leading causes
    of failed reproduction attempts. The example 9 module for this chapter summarizes
    that documentation failure mode.
- type: bullets
  title: Example 13.10 — Repository Metadata Enables Discovery
  bullets:
  - Example 13.10 — hands-on module
  - Metadata types and roles are covered in Chapter 8
  - What matters for open science is publication-grade metadata
  - License, so related searches can discover it beyond the original study
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example10/`'
  notes: 'Metadata types and roles are covered in Chapter 8. What matters for open
    science is publication-grade metadata: standardized formats and controlled vocabularies
    that let repositories index a dataset so others can find it. Example 13.10 shows
    a plant-genetics dataset uploaded with standards-compliant metadata—title, keywords,
    methodology, and license—so related searches can discover it beyond the original
    study. The example 10 module for this chapter covers that discovery pattern.'
- type: bullets
  title: Example 13.11 — Unpinned Dataset Versions Break Replication
  bullets:
  - Example 13.11 — hands-on module
  - Versioning tools are developed in Chapters 8 and 12
  - The exact dataset version used in a published analysis must be identifiable and
  - Example 13.11 shows what breaks without pinned versions
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example11/`'
  notes: 'Versioning tools are developed in Chapters 8 and 12; for reproducibility
    the essential requirement is narrower. The exact dataset version used in a published
    analysis must be identifiable and retrievable even as the data continues to evolve.
    Example 13.11 shows what breaks without pinned versions: if a dataset is updated
    after publication and the original version was never archived, replication attempts
    silently compare against different data. The example 11 module for this chapter
    frames that pinning requirement.'
- type: bullets
  title: Takeaways
  bullets:
  - Undocumented methods leave published findings checkable only in name
  - Publication-grade metadata turns repositories into discovery systems, not dump
    sites
  - Pinning the exact dataset version used in a paper is required for faithful replication
  - Chapter 8 and Chapter 12 supply the operational toolkit
  notes: Undocumented methods leave published findings checkable only in name. Publication-grade
    metadata turns repositories into discovery systems, not dump sites. Pinning the
    exact dataset version used in a paper is required for faithful replication. Chapter
    8 and Chapter 12 supply the operational toolkit; this chapter asks what those
    records must prove for open, research-facing reuse.
