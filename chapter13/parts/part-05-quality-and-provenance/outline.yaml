slides:
- type: title
  title: Chapter 13 — Data quality and provenance
  subtitle: FAIR sharing without quality and provenance still yields fragile science
  notes: FAIR sharing without quality and provenance still yields fragile science.
    This part covers data-quality standards for reproducibility and research-facing
    provenance that tracks how datasets were created and updated. Platform-scale lineage
    catalogs remain a Chapter 12 operational topic; here provenance is evidence for
    open, checkable research.
- type: bullets
  title: Learning objectives
  bullets:
  - Context; and describe how tracking updates preserves integrity across dataset
    versions
  notes: By the end of this part, learners should be able to explain why quality decisions
    must be documented for reproducibility; illustrate completeness documentation
    with clinical trial dropouts; define provenance as origin, transforms, and context;
    and describe how tracking updates preserves integrity across dataset versions.
- type: bullets
  title: Quality standards for reproducibility
  bullets:
  - Data quality dimensions and cleaning procedures are treated in earlier chapters
  - For reproducibility
  - Completeness, consistency, and accuracy support that goal
  - Not silent omission
  notes: Data quality dimensions and cleaning procedures are treated in earlier chapters.
    For reproducibility, quality decisions—imputation, exclusion, correction—must
    be documented so the published analysis can be repeated under the same conditions.
    Completeness, consistency, and accuracy support that goal. Completeness in particular
    requires clear documentation of missing data and the reasons for absence, not
    silent omission.
