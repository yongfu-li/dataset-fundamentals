  notes: Example 13.18 shows completeness documentation for missing participants.
    In clinical trials, if certain participants dropped out of the study, that should
    be noted in the dataset along with the impact on the analysis. Future users need
    those facts to interpret results and to repeat the analysis under comparable conditions.
    The example 18 module for this chapter covers that dropout documentation pattern.
- type: bullets
  title: Provenance as research evidence
  bullets:
  - Data provenance is the documentation and tracking of origin and transformations
    throughout
  - It records where data came from, how they were collected, what processes were
    applied
  - Provenance provides transparency and accountability so researchers can verify
    credibility
  - The emphasis here is evidence for reproducible research and open science
  notes: Data provenance is the documentation and tracking of origin and transformations
    throughout a dataset’s lifecycle. It records where data came from, how they were
    collected, what processes were applied, and the decisions made during processing.
    Provenance provides transparency and accountability so researchers can verify
    credibility and locate biases introduced during cleaning or errors from specific
    analytical steps. Unlike Chapter 12’s enterprise lineage catalogs, the emphasis
    here is evidence for reproducible research and open science.
- type: bullets
  title: Example 13.24 — Genomics Provenance for Sequencing Pipelines
  bullets:
  - Example 13.24 — hands-on module
  - Example 13.24 shows the provenance fields a genomics study should record
  - Provenance should capture the sequencing technology, preprocessing steps
  - Without such documentation
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example24/`'
  notes: Example 13.24 shows the provenance fields a genomics study should record.
    Provenance should capture the sequencing technology, preprocessing steps, and
    curation decisions so future researchers can validate findings or repeat the analysis
    on related datasets. Without such documentation, a dataset becomes a black box
    whose reliability cannot be assessed. The example 24 module for this chapter summarizes
    those genomics provenance fields.
- type: bullets
  title: Example 13.25 — Tracking Dataset Updates Over Time
  bullets:
  - Example 13.25 — hands-on module
  - Provenance also improves traceability when datasets change
  - Example 13.25 shows that if a dataset undergoes modifications or updates
  - In regulated fields such as healthcare or finance
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example25/`'
  notes: Provenance also improves traceability when datasets change. Example 13.25
    shows that if a dataset undergoes modifications or updates, tracking those changes
    preserves integrity and lets future users understand how the dataset evolved.
    In regulated fields such as healthcare or finance, provenance further supports
    auditability and compliance by showing ethical collection and appropriate processing.
    The example 25 module for this chapter frames update tracking over time.
- type: bullets
  title: Takeaways
  bullets:
  - Quality decisions must be documented if published analyses are to be repeated
    faithfully
  - Completeness includes recording dropouts and other missingness with analytical
    impact
  - Provenance records origin, transforms, context
  - Tracking updates links versions so integrity and audits remain possible
  - Distinguish Chapter 12 platform lineage from this chapter’s research-facing provenance
  notes: Quality decisions must be documented if published analyses are to be repeated
    faithfully. Completeness includes recording dropouts and other missingness with
    analytical impact. Provenance records origin, transforms, context, and processing
    decisions as research evidence. Tracking updates links versions so integrity and
    audits remain possible. Distinguish Chapter 12 platform lineage from this chapter’s
    research-facing provenance record.
