slides:
- type: title
  title: Chapter 13 — Automation and continuous integration
  subtitle: Manual reruns drift
  notes: Manual reruns drift. Continuous integration and automated tests catch broken
    preprocessing, environment mismatches, and model regressions before results are
    published. This part covers CI checks and automated workflow documentation.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to explain continuous integration
    for research pipelines; describe CI checks on preprocessing and inputs; recognize
    cross-environment consistency tests; and state why CI should retest model training
    after updates.
- type: bullets
  title: CI for reproducible research
  bullets:
  - For research workflows, tests and validates changes to code or data pipelines
  - Services such as GitHub Actions, GitLab CI
  - The goal is to catch silent breaks early
  notes: 'Continuous integration automatically integrates contributor changes into
    a shared repository and, for research workflows, tests and validates changes to
    code or data pipelines. Services such as GitHub Actions, GitLab CI, and Travis
    CI can run tests whenever code or data pipelines change. The goal is to catch
    silent breaks early: a small edit should not quietly alter published results.'
