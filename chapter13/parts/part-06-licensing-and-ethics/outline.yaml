title: Chapter 13 — Licensing and ethical considerations
footer: Chapter 13 — Licensing And Ethics
slides:
- type: title
  title: Chapter 13 — Licensing and ethical considerations
  subtitle: Openness is not unlimited
  notes: Openness is not unlimited. Licenses, privacy, bias, and community control
    constrain what can be shared. This part covers open-data licensing families, balancing
    openness with privacy, ethical risks in open science, and a use-case license chooser.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to match common Creative
    Commons and Open Data Commons licenses to reuse goals; explain why sensitive or
    community-controlled data need restricted access; distinguish dataset licenses
    from companion software licenses; describe the openness-versus-privacy trade-off;
    recognize ethical risks of reinforcing bias with open datasets; and state why
    communities, including Indigenous communities, should control how their data are
    shared.
- type: bullets
  title: Open license menu
  bullets:
  - Creative Commons covers CC0, CC BY, CC BY-SA, CC BY-NC, and CC BY-NC-SA
  - 'Open Data Commons adds database-oriented paths: ODC-By, ODbL, and PDDL'
  - Companion code beside a dataset usually needs a software license such as MIT
  - License choice follows the intended reuse, not the row layout of a CSV
  notes: 'Creative Commons covers CC0, CC BY, CC BY-SA, CC BY-NC, and CC BY-NC-SA.
    Open Data Commons adds database-oriented paths: ODC-By, ODbL, and PDDL. Companion
    code beside a dataset usually needs a software license such as MIT, BSD-3-Clause,
    Apache-2.0, or GPL-3.0—not a Creative Commons deed by default. License choice
    follows the intended reuse, not the row layout of a CSV.'
- type: bullets
  title: Choosing from the use case
  bullets:
  - Ask whether the release is sensitive or community-controlled
  - Public-domain paths suit government tables
  - Practice these paths in the course license chooser
  notes: Ask whether the release is sensitive or community-controlled; whether commercial
    reuse is allowed; whether attribution is required; whether derivatives must ShareAlike;
    and whether the artifact is data or companion code. Public-domain paths suit government
    tables; CC BY or ODC-By suit research data that need credit; ShareAlike suits
    collaborative commons; NonCommercial suits education-only releases; restricted
    access suits health and community-controlled data. Practice these paths in the
    course license chooser.
- type: bullets
  title: Licenses and the privacy trade-off
  bullets:
  - Responsible open science depends on clear licenses and ethical constraints
  - Some teams draft custom or restricted licenses that limit redistribution
  - Privacy principles and techniques are developed in Chapter 3
  - An unrestricted open license signals broad reuse and is appropriate only after
    privacy
  notes: Responsible open science depends on clear licenses and ethical constraints.
    Some teams draft custom or restricted licenses that limit redistribution, require
    ethical use, or control who may access the data. Privacy principles and techniques
    are developed in Chapter 3; the open-science question is how those constraints
    interact with license choice. An unrestricted open license signals broad reuse
    and is appropriate only after privacy techniques have made that reuse safe.
- type: bullets
  title: Example 13.26 — Restricted Licenses for Health Data
  bullets:
  - Example 13.26 — hands-on module
  - Example 13.26 illustrates restricted licensing for sensitive health data
  - Use may be limited to qualified researchers or specific contexts such as academic
    or
  - Even de-identified data may remain re-identifiable when combined with other releases
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example26/`'
  notes: Example 13.26 illustrates restricted licensing for sensitive health data.
    Use may be limited to qualified researchers or specific contexts such as academic
    or non-profit use. Clinical trial data and patient records cannot carry an unrestricted
    open license when regulation requires de-identification first, and even de-identified
    data may remain re-identifiable when combined with other releases. The example
    26 module for this chapter summarizes that restricted-license pattern.
- type: bullets
  title: Ethical obligations after sharing
  bullets:
  - Ethical principles for collection and privacy are covered in Chapter 3
  - Open science adds obligations that arise from making data public
  - Researchers should document scope and limitations
  - Consent obtained during collection must also cover the intended public release
  notes: 'Ethical principles for collection and privacy are covered in Chapter 3.
    Open science adds obligations that arise from making data public: minimize risk
    to participants, and state what the published data can and cannot support. Researchers
    should document scope and limitations, including biases or collection gaps that
    could affect downstream research or policy. Consent obtained during collection
    must also cover the intended public release.'
- type: bullets
  title: Example 13.27 — Avoid Reinforcing Bias with Open Data
  bullets:
  - Example 13.27 — hands-on module
  - Ethical concerns do not end when data are shared; they extend to reuse
  - Example 13.27 warns against discriminatory reuse of hiring or healthcare datasets
  - Such data should not be used to reinforce biases or perpetuate systemic inequalities
  - If data reveal disparities
  - 'View files: `modules/chapter13/example27/`'
  notes: Ethical concerns do not end when data are shared; they extend to reuse. Example
    13.27 warns against discriminatory reuse of hiring or healthcare datasets. Such
    data should not be used to reinforce biases or perpetuate systemic inequalities.
    If data reveal disparities, analysis should proceed with care to avoid reinforcing
    stereotypes or unjust practices. The example 27 module for this chapter frames
    that non-discrimination obligation.
- type: bullets
  title: Example 13.28 — Indigenous Control Over Shared Data
  bullets:
  - Example 13.28 — hands-on module
  - Open science must respect the rights and wishes of people and communities whose
    data are
  - Communities involved in collection
  - Example 13.28 emphasizes that Indigenous communities involved in ecological or
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example28/`'
  notes: Open science must respect the rights and wishes of people and communities
    whose data are used. Communities involved in collection, especially marginalized
    or vulnerable populations, should have a say in how their data are used and shared.
    Example 13.28 emphasizes that Indigenous communities involved in ecological or
    environmental research should control how their data are used and shared so that
    sharing aligns with cultural values and ethical standards. The example 28 module
    for this chapter covers community authority over shared data.
- type: bullets
  title: Takeaways
  bullets:
  - Match the license family to the artifact
  - Restricted access, not an open deed, for sensitive health or community-controlled
    data
  - License choice must follow a privacy assessment, not precede it
  - Open release creates ongoing ethical duties around bias, security, attribution,
    and scope
  - Including Indigenous communities, retain legitimate control over sharing decisions
  notes: 'Match the license family to the artifact: Creative Commons or Open Data
    Commons for data, software licenses for companion code. Restricted access—not
    an open deed—for sensitive health or community-controlled data. License choice
    must follow a privacy assessment, not precede it. Open release creates ongoing
    ethical duties around bias, security, attribution, and scope. Communities, including
    Indigenous communities, retain legitimate control over sharing decisions.'
