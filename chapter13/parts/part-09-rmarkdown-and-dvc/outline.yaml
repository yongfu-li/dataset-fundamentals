  - Explore the chapter example module
  - 'View files: `modules/chapter13/example45/`'
  notes: DVC also supports data pipelines that automate flow through the research
    process. Example 13.45 defines a versioned pipeline across preprocessing, model
    training, and evaluation. Each step’s inputs and outputs are tracked so regenerating
    results is a single pipeline run rather than a fragile sequence of manual scripts.
    The example 45 module for this chapter frames that preprocess–train–evaluate pipeline.
- type: bullets
  title: Takeaways
  bullets:
  - R Markdown couples narrative and executable analysis so published reports recompile
  - DVC keeps large training data and model weights retrievable alongside code
  - Versioned DVC pipelines encode preprocess, train
  - Literate reports plus data versioning close the gap between papers and the artifacts
    they
  notes: R Markdown couples narrative and executable analysis so published reports
    recompile faithfully. DVC keeps large training data and model weights retrievable
    alongside code. Versioned DVC pipelines encode preprocess, train, and evaluate
    stages as a single reproducible path. Literate reports plus data versioning close
    the gap between papers and the artifacts they claim.
