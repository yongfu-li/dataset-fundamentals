slides:
- type: title
  title: Chapter 13 — R Markdown and DVC tools
  subtitle: CI keeps pipelines green; literate tools and data-versioning systems keep
    analyses and large artifacts aligned
  notes: CI keeps pipelines green; literate tools and data-versioning systems keep
    analyses and large artifacts aligned. This part covers R Markdown reports and
    DVC for tracking training data, weights, and pipeline stages. Chapter 8 introduces
    DVC mechanistically; here the focus is research-facing reports and published ML
    artifacts.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to explain how R Markdown
    keeps code, narrative, and results synchronized; describe DVC tracking of training
    data and model weights; and outline a DVC pipeline that versions preprocess, train,
    and evaluate stages.
- type: bullets
  title: Literate reporting with R Markdown
  bullets:
  - R Markdown creates dynamic, reproducible reports that integrate code, data
  - When the document is compiled, embedded code executes and tables, figures
  - That coupling keeps analysis, narrative
  - Outputs can include HTML, PDF, or Word for flexible sharing
  notes: R Markdown creates dynamic, reproducible reports that integrate code, data,
    and results in a single document. When the document is compiled, embedded code
    executes and tables, figures, and statistical outputs are inserted automatically.
    That coupling keeps analysis, narrative, and visualization synchronized and supports
    version control so collaborators track changes over time. Outputs can include
    HTML, PDF, or Word for flexible sharing.
- type: bullets
  title: Example 13.41 — RMarkdown Public Health Analysis Report
  bullets:
  - Example 13.41 — hands-on module
  - Example 13.41 regenerates an analysis report from an R Markdown source
  - Generate visualizations in one document
  - As the report compiles
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example41/`'
  notes: Example 13.41 regenerates an analysis report from an R Markdown source. A
    researcher analyzing a public health dataset might load data, clean it, run statistical
    analyses, and generate visualizations in one document. As the report compiles,
    code and narrative stay synchronized, reducing the risk that a paper figure drifts
    from the script that produced it. The example 41 module for this chapter covers
    that public-health report pattern.
- type: bullets
  title: DVC for large research artifacts
  bullets:
  - Large datasets in genomics
  - DVC versions large datasets and models so they remain reproducible and shareable
  - Every modification remains traceable
  notes: 'Large datasets in genomics, climate modeling, or machine learning are difficult
    to track with Git alone. DVC versions large datasets and models so they remain
    reproducible and shareable: metadata and pointers live in the repository, while
    the bytes live in external storage such as cloud object stores. Every modification
    remains traceable, improving integrity for published results that depend on heavy
    artifacts.'
- type: bullets
  title: Example 13.44 — DVC Tracks Training Data and Weights
  bullets:
  - Example 13.44 — hands-on module
  - Example 13.44 versions training data, model weights, and evaluation outputs with
    DVC
  - In a machine learning project
  - Without that linkage
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example44/`'
  notes: Example 13.44 versions training data, model weights, and evaluation outputs
    with DVC. In a machine learning project, managing these dependencies helps ensure
    that the data and models used to produce published results can be retrieved later.
    Without that linkage, a paper may cite results that cannot be rebuilt from the
    current repository. The example 44 module for this chapter summarizes tracking
    data and weights together.
