  notes: Example 13.5 shows how privacy law can block open sharing of clinical data.
    Clinical research often involves sensitive patient data that cannot be shared
    openly under rules such as HIPAA. Open science therefore pairs sharing goals with
    de-identification and anonymization so data can be released safely and ethically.
    The example 5 module for this chapter summarizes that privacy constraint and the
    need for protective release practices.
- type: bullets
  title: Example 13.6 — Missing Hyperparameters Block Replication
  bullets:
  - Example 13.6 — hands-on module
  - Example 13.6 shows how undocumented methods prevent replication of a machine learning
  - Making it impossible for others to replicate the experiment
  - Either way, the computational path cannot be checked
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example6/`'
  notes: Example 13.6 shows how undocumented methods prevent replication of a machine
    learning experiment. A researcher might describe a model in a paper without providing
    hyperparameters or data preprocessing steps, making it impossible for others to
    replicate the experiment. Incomplete method records can be intentional competitive
    withholding or simply poor practice; either way, the computational path cannot
    be checked. The example 6 module for this chapter frames that documentation gap.
- type: bullets
  title: Example 13.7 — Incompatible Bioinformatics Naming Standards
  bullets:
  - Example 13.7 — hands-on module
  - Example 13.7 shows how missing community standards hinder cross-lab comparison
  - In bioinformatics
  - Not optional polish
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example7/`'
  notes: Example 13.7 shows how missing community standards hinder cross-lab comparison.
    In bioinformatics, different labs may use different standards for naming genes
    or describing experimental conditions, making it hard to integrate and compare
    datasets from multiple studies. Shared naming and metadata conventions are therefore
    part of reproducibility infrastructure, not optional polish. The example 7 module
    for this chapter covers that interoperability failure mode.
- type: bullets
  title: Example 13.8 — Drug Decisions Depend on Reproducible Trials
  bullets:
  - Example 13.8 — hands-on module
  - Example 13.8 ties reproducibility standards to high-stakes decisions
  - A pharmaceutical company may base drug development on clinical trial results
  - They reinforce research integrity when findings affect policy and public health
  - Explore the chapter example module
  - 'View files: `modules/chapter13/example8/`'
  notes: Example 13.8 ties reproducibility standards to high-stakes decisions. A pharmaceutical
    company may base drug development on clinical trial results; if those results
    cannot be reproduced, the approval process can be compromised. Standards also
    support interdisciplinary collaboration through clear methods and standardized
    repositories, and they reinforce research integrity when findings affect policy
    and public health. The example 8 module for this chapter highlights that trust
    requirement.
