title: Chapter 13 — Challenges and why standards matter
footer: Chapter 13 — Challenges And Standards
slides:
- type: title
  title: Chapter 13 — Challenges and why standards matter
  subtitle: Definitions alone do not make studies checkable
  notes: Definitions alone do not make studies checkable. Privacy limits, missing
    hyperparameters, and incompatible standards still block replication. This part
    covers those barriers, why reproducibility standards matter for high-stakes decisions,
    and how documentation and versioning form the bridge into the rest of the chapter.
- type: bullets
  title: Learning objectives
  bullets:
  - By the end of this part
  notes: By the end of this part, learners should be able to name inaccessible data,
    undocumented methods, and missing standards as recurring barriers; explain how
    privacy rules such as HIPAA constrain clinical sharing; recognize why missing
    hyperparameters and incompatible naming block reuse; and state why reproducibility
    standards support trust, collaboration, and research integrity.
- type: bullets
  title: Three recurring barriers
  bullets:
  - Achieving reproducibility in practice remains difficult
  - Three barriers recur across fields
  - Datasets may be unavailable because of privacy
  - Methods may be published without enough detail to rerun the analysis
  - Without shared conventions for documentation, versioning
  notes: 'Achieving reproducibility in practice remains difficult. Three barriers
    recur across fields: inaccessible datasets, undocumented methods, and lack of
    standards. Datasets may be unavailable because of privacy, proprietary restrictions,
    or poor management. Methods may be published without enough detail to rerun the
    analysis. Without shared conventions for documentation, versioning, and metadata,
    teams invent incompatible practices that hinder comparison and collaboration.'
