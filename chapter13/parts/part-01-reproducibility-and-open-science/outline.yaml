  notes: Example 13.4 shows transparency through released analysis assets. Researchers
    may release the scripts or notebooks used to process their data so others can
    follow the exact workflow. Transparency also encourages accountability through
    disclosure of conflicts of interest, funding sources, and methodological limitations.
    The example 4 module for this chapter covers publishing executable analysis artifacts.
