  title: Reproducibility versus replicability
  bullets:
  - Reproducibility and replicability are often used interchangeably
  - Reproducibility is obtaining the same results from the same dataset when the same
  - Often with a new dataset or under different conditions
  - 'Both matter: reproducibility checks that a published computational path is faithful'
  notes: 'Reproducibility and replicability are often used interchangeably, but they
    mean different things. Reproducibility is obtaining the same results from the
    same dataset when the same computational methods are applied. Replicability is
    obtaining consistent findings when the research is conducted independently, often
    with a new dataset or under different conditions. Both matter: reproducibility
    checks that a published computational path is faithful, while replicability tests
    whether the finding holds under new data or independent conditions.'
