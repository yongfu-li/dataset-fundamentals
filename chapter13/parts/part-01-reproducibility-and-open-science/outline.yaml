  notes: Example 13.2 contrasts replicability. A climate model may be replicated by
    a different team using a new set of environmental data to see whether the original
    findings hold under a different context or dataset. Replicability can thus be
    seen as an extension of reproducibility, testing generalizability across conditions
    or data sources. The example 2 module for this chapter frames that independent-team
    check.
- type: bullets
  title: Core principles of open science
  bullets:
  - Open science seeks to make research and data publicly accessible, transparent
  - Accessibility means research outputs, datasets, software
  - Transparency means making processes visible
  - Collaboration means sharing knowledge and resources across disciplines and institutions
    so
  notes: 'Open science seeks to make research and data publicly accessible, transparent,
    and collaborative. Accessibility means research outputs—datasets, software, and
    methods—are available beyond journal articles alone. Transparency means making
    processes visible: which data were used, which methods were applied, and how analyses
    were conducted. Collaboration means sharing knowledge and resources across disciplines
    and institutions so complex problems can be tackled jointly.'
