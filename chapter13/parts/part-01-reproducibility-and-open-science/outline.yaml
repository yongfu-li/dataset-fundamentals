  notes: Example 13.3 names widely used platforms for open sharing. The Open Science
    Framework and Zenodo provide places where researchers can share datasets, code,
    and preprints with the global community. Accessibility is not only about publishing
    a paper; it includes providing the tools and data that underpin the findings.
    The example 3 module for this chapter summarizes that repository pattern.
