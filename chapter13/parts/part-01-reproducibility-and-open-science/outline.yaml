  - 'View files: `modules/chapter13/example1/`'
  notes: Example 13.1 illustrates methods reproducibility. If a researcher publishes
    a study using a dataset and a specific analytical technique, other researchers
    should be able to use the exact same dataset and method to obtain identical results.
    That identity is a measure of transparency and robustness in the scientific process.
    The example 1 module for this chapter demonstrates how fixing a seed and transform
    can make processed results match by hash.
- type: code
  title: Example 13.1 — listing
  code: "\"\"\"Example 13.1 — same data and methods yield identical results.\n\nDemonstrates\
    \ computational (methods) reproducibility with the standard library:\na seeded\
    \ pipeline produces a byte-identical result across runs, while changing\nthe seed\
    \ or a step breaks that guarantee.\n\"\"\"\n\nfrom __future__ import annotations\n\
    \nimport hashlib\nimport random\nimport statistics\n\n\ndef analysis(seed: int,\
    \ transform: str = \"zscore\") -> str:\n    \"\"\"Run a small deterministic 'analysis'\
    \ and return a hash of its result.\n\n    Args:\n        seed: Random seed fixing\
    \ the synthetic dataset and any sampling.\n        transform: Processing step\
    \ applied to the data ('zscore' or 'minmax')."
