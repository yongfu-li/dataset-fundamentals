  bullets:
  - Reproducibility checks the same data and methods
  - Open science rests on accessibility, transparency, and collaboration
  - Repositories such as the Open Science Framework and Zenodo support open sharing
    of data
  - Publishing scripts and notebooks makes workflows checkable by others
  - This chapter’s focus is research-facing practice
  notes: Reproducibility checks the same data and methods; replicability tests findings
    with new data or independent teams. Open science rests on accessibility, transparency,
    and collaboration. Repositories such as the Open Science Framework and Zenodo
    support open sharing of data, code, and preprints. Publishing scripts and notebooks
    makes workflows checkable by others. This chapter’s focus is research-facing practice,
    building on—but not repeating—Chapter 8 and Chapter 12 operations.
